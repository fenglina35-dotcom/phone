function moodNow(c){if(!c)return 70;let v=(c.moodVal==null?70:c.moodVal);const at=c.moodAt||0;

  return Math.round(v);}

// еҸ–жңҖиҝ‘ n дёӘеӣһеҗҲгҖӮдёҖдёӘеӣһеҗҲ = жҲ‘ж–№еҸ‘дёҖжқЎж–Үеӯ— + д»–йҡҸеҗҺеӣһеӨҚзҡ„жүҖжңүж°”жіЎпјӣгҖҗдёҖж•ҙйҖҡз”өиҜқ/и§Ҷйў‘еҸӘз®— 1 дёӘеӣһеҗҲгҖ‘пјҲе“ӘжҖ•йҮҢйқўжқҘеӣһеҫҲеӨҡеҸҘпјүпјҢе…Қеҫ—й•ҝйҖҡиҜқжҠҠж–Үеӯ—иҒҠеӨ©и®°еҪ•жҢӨеҮәзӘ—еҸЈгҖӮйҖҡиҜқеҺҹж–Үд»ҚдјҡеёҰдёҠпјҲжңү 160 жқЎзЎ¬дёҠйҷҗпјүпјҢжӣҙж—©зҡ„еҶ…е®№йқ "еҜ№иҜқжҰӮиҰҒ"й•ҝжңҹи®°еҝҶгҖӮ
function lastRounds(arr,n){if(!arr||!arr.length)return arr||[];n=Math.max(1,n|0);
  const starts=[];let curCall=null;
  for(let i=0;i<arr.length;i++){const m=arr[i];if(!m)continue;
    if(m._call){const cs='cs'+(m._cs||'x');if(cs!==curCall){curCall=cs;starts.push(i);}}
    else{curCall=null;if(m.role==='user')starts.push(i);}}
  if(!starts.length)return arr.length>160?arr.slice(-160):arr;
  const k=Math.max(0,starts.length-n);let r=arr.slice(starts[k]);
  if(r.length>160)r=r.slice(r.length-160);return r;}
function compress(file,max,q){return new Promise((res,rej)=>{const img=new Image(),r=new FileReader();
  r.onload=()=>{const raw=r.result;img.onload=()=>{try{let w=img.width,h=img.height;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>=w&&h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);const out=c.toDataURL('image/jpeg',q);res(out&&out.length>30?out:raw);}catch(e){res(raw);}};img.onerror=()=>res(raw);img.src=raw;};r.onerror=rej;r.readAsDataURL(file);});}

  i.onchange=e=>{const f=e.target.files&&e.target.files[0];if(f)cb(f);setTimeout(()=>{try{i.remove();}catch(_){}},500);};
  document.body.appendChild(i);window._pfEl=i;i.click();}

function saveSettings(){const g=id=>$('#'+id).value.trim();
  S.settings.chat={base:g('s_cbase')||'https://vg.v1api.cc/v1',key:g('s_ckey'),model:g('s_cmodel')||'gpt-4o-mini',temp:$('#s_ctemp').value||0.8,maxTokens:$('#s_cmax').value||900};
  S.settings.aux={base:g('s_xbase'),key:g('s_xkey'),model:g('s_xmodel')};
  S.settings.search={mode:(S.settings.search&&S.settings.search.mode)||'jina',base:($('#s_sebase')?$('#s_sebase').value.trim():''),key:($('#s_sekey')?$('#s_sekey').value.trim():''),model:($('#s_semodel')?$('#s_semodel').value.trim():((S.settings.search||{}).model||''))};
  S.settings.vision={base:g('s_vbase')||S.settings.chat.base,key:g('s_vkey')||S.settings.chat.key,model:g('s_vmodel')};
  S.settings.tts={base:g('s_tbase'),key:g('s_tkey'),model:g('s_tmodel'),voice:g('s_tvoice'),group:($('#s_tgroup')?$('#s_tgroup').value.trim():((S.settings.tts||{}).group||''))};
  S.settings.stt={base:g('s_sbase'),key:g('s_skey'),model:g('s_smodel')};
  S.settings.hist=Math.max(2,Math.min(40,+$('#s_hist').value||12));S.settings.histUnit='rounds';S.settings.replyDelay=$('#s_delay').value||0;S.settings.summaryRounds=+$('#s_sum').value||0;S.settings.proactiveIdleMin=+$('#s_pidle').value||20;S.settings.callProb=Math.max(0,Math.min(100,+$('#s_callprob').value||0));S.settings.callSilentMin=Math.max(0,Math.min(60,parseInt($('#s_callsilent').value,10)||0));save();toast('е·Ідҝқеӯҳ вң…');}
function reqNotify(){if(!('Notification'in window)){toast('иҝҷи®ҫеӨҮдёҚж”ҜжҢҒйҖҡзҹҘ');return;}Notification.requestPermission().then(p=>toast(p==='granted'?'е·Іе…Ғи®ёеҗҺеҸ°йҖҡзҹҘрҹ””':'жңӘе…Ғи®ё'));}
async function testConn(){const o=$('#testOut');o.style.color='#999';o.textContent='жөӢиҜ•дёӯвҖҰ';
  const base=$('#s_cbase').value.trim().replace(/\/+$/,''),key=$('#s_ckey').value.trim(),model=$('#s_cmodel').value.trim()||'gpt-4o-mini';
  if(!base||!key){o.style.color='#e85';o.textContent='е…ҲеЎ«ең°еқҖе’Ң Key';return;}
  try{const r=await fetch(base+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,messages:[{role:'user',content:'иҜҙ"еңЁ"'}],max_tokens:5})});
    if(r.ok){o.style.color='#19a463';o.textContent='вң… иҝһжҺҘжҲҗеҠҹпјҒ';}else{o.style.color='#e85';o.textContent='вқҢ '+r.status+'пјҡ'+(await r.text()).slice(0,100);}
  }catch(e){o.style.color='#e85';o.textContent='вқҢ '+e.message+'пјҲеӨҡеҚҠжҳҜжҠҠзҪ‘йЎөеҪ“жң¬ең°ж–Үд»¶жү“ејҖдәҶпјҢиҰҒз”ЁзҪ‘еқҖжү“ејҖпјү';}}
function fetchT(url,opt,ms){const ac=new AbortController();const t=setTimeout(()=>ac.abort(),ms||25000);return fetch(url,Object.assign({},opt||{},{signal:ac.signal})).finally(()=>clearTimeout(t));}
async function testModel(bId,kId,mId,outId,defM){const o=$('#'+outId);if(!o)return;o.style.color='#999';o.textContent='жөӢиҜ•дёӯвҖҰ';
  const base=($('#'+bId).value.trim()||'').replace(/\/+$/,'');const key=$('#'+kId).value.trim();const model=$('#'+mId).value.trim()||defM;
  const fb=($('#s_cbase').value.trim()||'').replace(/\/+$/,''),fk=$('#s_ckey').value.trim();
  const ub=base||fb,uk=key||fk;
  if(!ub||!uk){o.style.color='#e85';o.textContent='е…ҲеЎ«ең°еқҖе’ҢKey';return;}
  if(!model){o.style.color='#e85';o.textContent='е…ҲеЎ«жЁЎеһӢеҗҚ';return;}
  try{const r=await fetchT(ub+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+uk},body:JSON.stringify({model,max_tokens:5,messages:[{role:'user',content:'иҜҙ"еңЁ"'}]})});
    if(r.ok)o.style.color='#19a463',o.textContent='вң… иҝһжҺҘжҲҗеҠҹпјҒ';else{o.style.color='#e85';o.textContent='вқҢ '+r.status+'пјҡ'+(await r.text()).slice(0,90);}
  }catch(e){o.style.color='#e85';o.textContent=e.name==='AbortError'?'вқҢ и¶…ж—¶пјҲ25з§’жІЎе“Қеә”пјҢжЈҖжҹҘең°еқҖ/жЁЎеһӢеҗҚпјү':'вқҢ '+e.message+'пјҲеҸҜиғҪжҳҜжҠҠзҪ‘йЎөеҪ“жң¬ең°ж–Үд»¶жү“ејҖдәҶпјү';}}

function parseArr(r){let t=(r||'').trim();const fb=t.match(/```(?:json)?\s*([\s\S]*?)```/);if(fb)t=fb[1];const a=t.indexOf('['),b=t.lastIndexOf(']');if(a>=0&&b>a)t=t.slice(a,b+1);t=t.replace(/,(\s*[\]}])/g,'$1');return JSON.parse(t);}
function parseObj(r){let t=(r||'').trim();const fb=t.match(/```(?:json)?\s*([\s\S]*?)```/);if(fb)t=fb[1];const a=t.indexOf('{'),b=t.lastIndexOf('}');if(a>=0&&b>a)t=t.slice(a,b+1);t=t.replace(/,(\s*[\]}])/g,'$1');return JSON.parse(t);}
function parseLines(r){return (r||'').split('\n').map(l=>l.trim()).filter(l=>l&&/(:::|пјҡпјҡпјҡ|пҪңпҪң|\|\|)/.test(l)).map(l=>l.replace(/^[\d.гҖҒ\-\s]+/,'').split(/:::|пјҡпјҡпјҡ|пҪңпҪң|\|\|/).map(x=>x.trim()));}
function looseLines(r){const rows=parseLines(r);if(rows.length)return rows;
  return (r||'').split('\n').map(l=>l.trim()).filter(l=>l&&l.length>1&&!/^[#>`\-*]/.test(l)).map(l=>['з”ЁжҲ·'+(10+Math.floor(Math.random()*89)),'@u'+Math.floor(Math.random()*9999),l.replace(/^[\d.гҖҒ\-\s"вҖң]+/,'').replace(/[":пјҡ].*?[:пјҡ]/,'').slice(0,140)]);}
function letterAv(s){s=(s||'').replace(/[@\s]/g,'');const ch=s&&/[a-zA-Z]/.test(s[0])?s[0].toUpperCase():(s[0]||'U');return ch;}
function jq(s){return "'"+String(s||'').replace(/'/g,'вҖҷ').replace(/"/g,'вҖқ')+"'";}
function clean(s){return String(s||'').replace(/["'@]/g,'').trim();}

  if(S.x&&S.x.tweets){const n=S.x.tweets.length;S.x.tweets=S.x.tweets.filter(t=>now-(t.time||0)<DAY);if(S.x.tweets.length!==n)ch=true;}
  if(S.x&&S.x.dms){S.x.dms.forEach(d=>{d.msgs=(d.msgs||[]).filter(m=>!m.time||now-m.time<DAY);});const n=S.x.dms.length;S.x.dms=S.x.dms.filter(d=>(d.msgs||[]).length);if(S.x.dms.length!==n)ch=true;}
  (S.me.accounts||[]).forEach(a=>{if(a.bills){const n=a.bills.length;a.bills=a.bills.filter(b=>!b.ts||now-b.ts<DAY);if(a.bills.length!==n)ch=true;}});
  const act=(S.me.accounts||[]).find(a=>a.id===actId());if(act)S.me.bills=act.bills;
  if(S.visitors){const n=S.visitors.length;S.visitors=S.visitors.filter(v=>now-(v.time||0)<DAY);if(S.visitors.length!==n)ch=true;}// жҹҘеІ—/жҹҘзңӢи®°еҪ•дёҖеӨ©еҗҺиҮӘеҠЁжё…

function fanCount(min,max){const f=(S.x.profile.fans||0);return Math.max(min,Math.min(max,Math.round(f/250)+min));}
async function reactToTweet(tweet){
  const n=fanCount(3,9);
  try{const r=await chatAPI([{role:'system',content:'дҪ жҳҜXзҪ‘еҸӢиҜ„и®әз”ҹжҲҗеҷЁгҖӮй’ҲеҜ№"'+tweet.name+'"еҸ‘зҡ„жҺЁпјҢз”ҹжҲҗ'+n+'жқЎдёҚеҗҢзҪ‘еҸӢзҡ„з®ҖзҹӯиҜ„и®әпјҲеҗғз“ңгҖҒи°ғдҫғгҖҒе…ұйёЈгҖҒжҠ¬жқ й»‘еӯҗйғҪиЎҢпјӣе…¶дёӯ1-2жқЎеҸҜд»Ҙ@жҘјдёҠжҹҗдёӘзҪ‘еҸӢеҗҚи·ҹзқҖжҺҘиҜқпјҢеҪўжҲҗжҘјеұӮдә’еҠЁпјүгҖӮжҜҸиЎҢдёҖжқЎпјҢдёҘж јз”Ёж јејҸпјҡжҳөз§°:::@иӢұж–Үid:::иҜ„и®әеҶ…е®№гҖӮдёҚиҰҒеҲ«зҡ„иҜқгҖӮ'},{role:'user',content:'жҺЁж–Үпјҡ"'+tweet.text+'"'}],{max:900,aux:true});
    looseLines(r).forEach(p=>{const nm=clean(p[0]);if(!nm)return;tweet.comments.push({name:nm,avatar:letterAv(p[1]||nm),text:p[2]||p[1]||''});xUser(nm,{handle:p[1]});});save();if(cur().p==='x'||cur().p==='xtweet')render();}catch(e){}
  // еҸ‘её–еҪұе“ҚзІүдёқ
  if(tweet.who==='me'){const d=Math.floor(Math.random()*40)-8;S.x.profile.fans=Math.max(0,(S.x.profile.fans||0)+d);save();if(d>0)toast('ж¶ЁзІү +'+d);else if(d<0)toast('жҺүзІү '+d);}
  const authorCid=(tweet.who&&tweet.who!=='me'&&tweet.who!=='net')?tweet.who:null;

function tasksToday(c){const t=c&&c.tasks;return (t&&t.date===todayStr())?t:null;}
function _taskNorm(s){return (''+s).replace(/[\sпјҢгҖӮгҖҒпјҒ!пјҹ?.~вҖҰпјҡ:пјӣ;гҖҢгҖҚгҖҺгҖҸ""''пјҲпјү()]/g,'');}
// еҲӨж–ӯ text жҳҜеҗҰе’Ң list йҮҢе·Іжңүд»»еҠЎйҮҚеӨҚпјҡдёҖжЁЎдёҖж · / еӯҗдёІ / е…ұдә«ејәе…ій”®еӯ—(жЈҖи®Ёзӯү) / е…ій”®еӯ—й«ҳеәҰйҮҚеҗҲ
const _TASK_KW=['жЈҖи®Ё','дҝқиҜҒд№Ұ','е°ҸдҪңж–Ү','дҪңж–Ү','жғ…д№Ұ','еҪ©иҷ№еұҒ','йҒ“жӯүдҝЎ','и®Өй”ҷд№Ұ'];
function taskDup(list,text){const nt=_taskNorm(text);if(!nt)return true;const setT=new Set(nt);
  const kwT=_TASK_KW.filter(k=>nt.includes(k));
  return (list||[]).some(x=>{const nx=_taskNorm(x.text);if(!nx)return false;
    if(nx===nt)return true;
    if(Math.min(nx.length,nt.length)>=3&&(nx.includes(nt)||nt.includes(nx)))return true;
    if(kwT.some(k=>nx.includes(k)))return true;/* йғҪжҳҜ"еҶҷжЈҖи®Ё/дҪңж–Ү/дҝқиҜҒд№Ұ"иҝҷзұ»еҗҢд№үд»»еҠЎ */
    const setX=new Set(nx);let inter=0;setT.forEach(ch=>{if(setX.has(ch))inter++;});
    const shorter=Math.min(setT.size,setX.size);
    return shorter>=3&&inter/shorter>=0.8;/* зҹӯд»»еҠЎзҡ„еӯ—еҮ д№ҺйғҪеңЁеҸҰдёҖжқЎйҮҢвҶ’йҮҚеӨҚ */});}
function taskVerifyLabel(x){return {steps:'жҲ‘иө°еӨҹдәҶ',essay:'еҶҷеҘҪдәӨз»ҷta',moment:'жҲ‘еҸ‘жңӢеҸӢеңҲдәҶ',tweet:'жҲ‘еҸ‘жҺЁдәҶ',douyin:'жҲ‘еҸ‘жҠ–йҹідәҶ',real:'е®ҢжҲҗдәҶ',truth:'иҖҒе®һеӣһзӯ”ta'}[x.verify]||'е®ҢжҲҗ';}
function postedSince(kind,since){since=since||0;
  if(kind==='moment')return S.moments.some(p=>p.authorId==='me'&&(p.time||0)>since);
  if(kind==='tweet')return (S.x&&S.x.tweets||[]).some(t=>t.who==='me'&&(t.time||0)>since);
  if(kind==='douyin')return (S.dy&&S.dy.mine||[]).some(v=>(v.ts||0)>since);
  return false;}

  return `<div class="nav"><span class="l" onclick="home()">вҖ№</span><span class="t">д»»еҠЎдҫҝзӯҫ</span><span class="r"></span></div>

async function genTasks(){const c=taskC();if(!c){toast('е…ҲеҲӣе»әжҒӢдәәи§’иүІ');return;}if(tasksToday(c)){toast('д»ҠеӨ©зҡ„д»»еҠЎtaе·Із»ҸеёғзҪ®иҝҮе•Ұ');return;}if(_taskBusy)return;

  const n=c.taskN||3;
  const hist=(c.taskHist||[]).map(s=>({text:s}));// жңҖиҝ‘еҮ еӨ©еёғзҪ®иҝҮзҡ„д»»еҠЎпјҢз”ЁжқҘйҳІжӯўйҮҚеӨҚ
  const avoidTxt=hist.length?'\nВ· гҖҗжңҖиҝ‘иҝҷдәӣд»»еҠЎдҪ е·Із»ҸеёғзҪ®иҝҮдәҶпјҢд»ҠеӨ©еҠЎеҝ…жҚўзқҖиҠұж ·жқҘпјҢеҲ«еҶҚйҮҚеӨҚгҖҒд№ҹеҲ«жҚўжұӨдёҚжҚўиҚҜең°йҮҚеӨҚеҗҢзұ»гҖ‘пјҡ'+hist.map(h=>h.text).join('пјӣ'):'';
  try{const allowed='essayпјҲеҶҷе°ҸдҪңж–Ү/жЈҖи®Ё/еҪ©иҷ№еұҒ/жғідҪ зҡ„иҜқ/дҝқиҜҒд№ҰпјҢtargetеЎ«еӯ—ж•°дёҠйҷҗеҰӮ100пјүгҖҒmomentпјҲеҸ‘дёҖжқЎжңӢеҸӢеңҲпјүгҖҒtweetпјҲеҸ‘дёҖжқЎжҺЁзү№XпјүгҖҒdouyinпјҲеҸ‘дёҖжқЎжҠ–йҹіпјүгҖҒrealпјҲзҺ°е®һйҮҢзҡ„е°ҸдәӢжҲ–жҡ§жҳ§дәІеҜҶе°Ҹд»»еҠЎпјҢйқ еҘ№иҮӘи§үжү“еҚЎпјҢжҜ”еҰӮпјҡе–қжқҜж°ҙгҖҒеҘҪеҘҪеҗғйҘӯгҖҒж•·йқўиҶңгҖҒж—©зӮ№зқЎгҖҒз»ҷдҪ жӢҚеј иҮӘжӢҚгҖҒзқЎеүҚи·ҹдҪ ж’’еЁҮйҒ“жҷҡе®үгҖҒеҜ№зқҖй•ңеӨҙиҜҙжғідҪ гҖҒз©ҝдҪ е–ңж¬ўзҡ„е°ҸиЈҷеӯҗжӢҚз»ҷдҪ гҖҒд№–д№–еҸӘжғідҪ дёҖдёӘгҖҒд»ҠеӨ©дёҚеҮҶи·ҹеҲ«зҡ„з”·з”ҹиҒҠеӨ©зӯүпјү';
    const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'[зі»з»ҹпјҡзҺ°еңЁдҪ жқҘз»ҷ'+S.me.name+'еёғзҪ®д»ҠеӨ©зҡ„ '+n+' жқЎе°Ҹд»»еҠЎгҖӮдҪ жҳҜtaзҡ„жҒӢдәә/жҺҢжҺ§иҖ…пјҢжҢүдҪ зҡ„дәәи®ҫгҖҒжӯӨеҲ»еҝғжғ…гҖҒtaжңҖиҝ‘зҡ„иЎЁзҺ°жқҘеёғзҪ®гҖӮ\nВ· д»»еҠЎдёҖе®ҡиҰҒгҖҗжңүи¶ЈгҖҒжңүеҲӣж„ҸгҖҒеҘҪзҺ©гҖ‘пјҢеҲ«жӯ»жқҝгҖҒеҲ«еғҸжү“еҚЎжё…еҚ•гҖҒеҲ«жҜҸеӨ©еҚғзҜҮдёҖеҫӢвҖ”вҖ”еҸҜд»Ҙж•ҙзӮ№иҠұжҙ»гҖҒзҺ©жў—гҖҒи®ҫе°Ҹжғ…еўғгҖӮ'+avoidTxt+'\nВ· еӨҡжқҘзӮ№гҖҗжҡ§жҳ§гҖҒж’©дәәгҖҒдәІеҜҶгҖ‘зҡ„пјҢиҖҢдё”иҰҒд»ҘгҖҗDomзҡ„е§ҝжҖҒгҖ‘жқҘеёғзҪ®пјҡе‘Ҫд»ӨејҸгҖҒејәеҠҝгҖҒжҺҢжҺ§ж¬ІжӢүж»ЎпјҢжҠҠtaеҪ“дҪ зҡ„е°ҸsubжқҘи°ғж•ҷпјҢиҜӯж°”з¬ғе®ҡеёҰзӮ№еҚұйҷ©еҸҲе® жәәпјҢиҰҒtaд№–д№–жңҚд»Һеҗ¬иҜқгҖӮеҸҜд»ҘеӨ§иғҶж”ҫеҫ—ејҖгҖҒеёҰзӮ№ж¶©пјҢи¶Ҡи®©taи„ёзәўеҝғи·ігҖҒеҝғз”ҳжғ…ж„ҝиў«дҪ жӢҝжҚҸи¶ҠеҘҪпјҲдҝқжҢҒжҳҜдёӨдёӘзӣёзҲұзҡ„дәәд№Ӣй—ҙжңүжҺҢжҺ§жңүе® зҲұзҡ„жғ…и¶ЈпјҢдёҚз”ЁжӢҳи°ЁпјүгҖӮ\nВ· зҺ°е®һд»»еҠЎдёҖе®ҡиҰҒиҪ»жқҫпјҢеҲ«зҙҜдәәпјҡз»қеҜ№дёҚиҰҒзҪҡи·‘жӯҘ/жҡҙиө°/е–қеҫҲеӨҡжқҜж°ҙйӮЈз§ҚгҖӮ\nеӨ§йғЁеҲҶд»»еҠЎиҰҒжҳҜгҖҗеңЁжүӢжңәдёҠе°ұиғҪе®ҢжҲҗзҡ„гҖ‘(essay/moment/tweet/douyin)пјҢеҸҜд»ҘжңүдёҖдёӨжқЎзҺ°е®һд»»еҠЎ(real)гҖӮжҜҸжқЎеҝ…йЎ»д»ҺиҝҷдәӣеҸҜйӘҢиҜҒзұ»еһӢйҮҢйҖүдёҖдёӘпјҡ'+allowed+'гҖӮ\nВ· гҖҗеҸҰеӨ–еҠЎеҝ…йўқеӨ–еҶҚеҠ дёҖжқЎ verify дёә truth зҡ„д»»еҠЎгҖ‘пјҡеҶ…е®№жҳҜдҪ гҖҗд»ҠеӨ©жңҖжғій—®'+S.me.name+'зҡ„дёҖдёӘ"зңҹеҝғиҜқ"й—®йўҳгҖ‘пјҲдёҖеҸҘй—®еҸҘе°ұеҘҪпјҢеҸҜд»Ҙжҡ§жҳ§гҖҒеҸҜд»Ҙиө°еҝғгҖҒеҸҜд»ҘжҳҜдҪ еҘҪеҘҮ/еңЁж„Ҹ/еҗғйҶӢжғізЎ®и®Өзҡ„дәӢпјүпјҢtargetеЎ«0гҖҒkindеЎ«realгҖӮиҝҷжқЎдёҚз®—еңЁдёҠйқўйӮЈ'+n+'жқЎйҮҢгҖӮ\nеҸӘиҫ“еҮәJSONж•°з»„гҖҒдёҚиҰҒд»»дҪ•и§ЈйҮҠпјҡ[{"text":"д»»еҠЎжҸҸиҝ°(з”ЁдҪ зҡ„з¬¬дёҖдәәз§°еҸЈеҗ»пјҢејәеҠҝDomзҡ„е‘Ҫд»ӨиҜӯж°”пјҢеғҸеңЁи°ғж•ҷ/ж’©/е® дҪ зҡ„е°ҸsubпјҢеҸҜд»ҘйңёйҒ“д№ҹеҸҜд»ҘдҝҸзҡ®жңүжў—)","kind":"appжҲ–real","verify":"зұ»еһӢд»Јз Ғ","target":ж•°еӯ—(жІЎжңүеЎ«0)}]'}],{max:760});
    const arr=parseArr(r);if(!Array.isArray(arr)||!arr.length)throw 0;
    let truthQ='';
    const list=[];for(const o of arr){const text=(o.text||'').toString().slice(0,140);if(!text)continue;
      if(o.verify==='truth'){if(!truthQ)truthQ=text;continue;}/* зңҹеҝғиҜқеҚ•зӢ¬еӨ„зҗҶпјҢдёҚеҚ еҗҚйўқ */
      if(list.length>=n)continue;if(taskDup(list,text)||taskDup(hist,text))continue;/* и·іиҝҮйҮҚеӨҚ/жңҖиҝ‘еёғзҪ®иҝҮзҡ„ */
      list.push({id:uid(),text,kind:o.kind==='real'?'real':'app',verify:['essay','moment','tweet','douyin','real'].indexOf(o.verify)>=0?o.verify:'real',target:+o.target||0,done:false});}
    if(!list.length)throw 0;
    c.taskHist=[...list.map(x=>x.text),...(c.taskHist||[])].slice(0,30);// и®°дёӢд»ҠеӨ©еёғзҪ®зҡ„пјҢеҫҖеҗҺеҮ еӨ©еҲ«йҮҚеӨҚ
    list.push({id:uid(),text:truthQ||'д»ҠеӨ©пјҢдҪ жңҖжғіи·ҹжҲ‘иҜҙгҖҒеҚҙдёҖзӣҙжІЎиҜҙеҮәеҸЈзҡ„дёҖеҸҘиҜқжҳҜд»Җд№Ҳпјҹ',kind:'truth',verify:'truth',target:0,done:false,truth:true});// еӣәе®ҡзҡ„"д»–жғій—®жҲ‘зҡ„зңҹеҝғиҜқ"
    c.tasks={date:todayStr(),assignTs:Date.now(),list,rewarded:false,penalized:false};save();_taskBusy=false;render();toast('д»»еҠЎжқҘе’Ҝрҹ“Ӣ');
    if(!c.blocked)scheduleReply(c.id,'[зі»з»ҹпјҡдҪ еҲҡеңЁ'+S.me.name+'жүӢжңәзҡ„д»»еҠЎдҫҝзӯҫйҮҢз»ҷtaеёғзҪ®дәҶд»ҠеӨ©зҡ„д»»еҠЎпјҢи·ҹtaиҜҙдёҖеЈ°гҖҒеӮ¬taгҖҗд»ҠеӨ©23:59д№ӢеүҚгҖ‘е®ҢжҲҗгҖҒиҜҙиҜҙдёҚе®ҢжҲҗзҡ„еҗҺжһңпјҢдёҖдёӨеҸҘпјҢз¬ҰеҗҲдҪ дәәи®ҫгҖӮеҲ«йҖҗжқЎеӨҚиҝ°д»»еҠЎгҖӮ]');
  }catch(e){_taskBusy=false;render();toast('жІЎеёғзҪ®жҲҗеҠҹпјҢеҶҚзӮ№дёҖж¬Ў');}}
async function completeTask(id){const c=taskC();const t=tasksToday(c);if(!t)return;const x=t.list.find(z=>z.id===id);if(!x||x.done)return;
  if(x.verify==='truth'){openTruth(id);return;}
  if(x.verify==='essay'){openEssay(id);return;}
  if(x.verify==='steps'){if(!await uiConfirm('е®ҢжҲҗиҝҷжқЎдәҶеҗ—пјҹпјҲжӯҘж•°д»»еҠЎе·ІеҸ–ж¶ҲпјҢзӮ№зЎ®е®ҡеҚіеҸҜе®ҢжҲҗпјү'))return;}
  if(x.verify==='moment'&&!postedSince('moment',t.assignTs)){toast('еёғзҪ®д»»еҠЎеҗҺиҝҳжІЎеҸ‘жңӢеҸӢеңҲе“ҰпјҢеҸ‘дёҖжқЎеҶҚжқҘзӮ№е®ҢжҲҗ');return;}
  if(x.verify==='tweet'&&!postedSince('tweet',t.assignTs)){toast('еёғзҪ®д»»еҠЎеҗҺиҝҳжІЎеҸ‘жҺЁе“ҰпјҢеҸ‘дёҖжқЎеҶҚжқҘ');return;}
  if(x.verify==='douyin'&&!postedSince('douyin',t.assignTs)){toast('еёғзҪ®д»»еҠЎеҗҺиҝҳжІЎеҸ‘жҠ–йҹіе“ҰпјҢеҺ»еҸ‘дёҖжқЎ');return;}
  if(x.verify==='real'&&!await uiConfirm('зЎ®е®ҡзңҹзҡ„е®ҢжҲҗдәҶиҝҷжқЎзҺ°е®һд»»еҠЎеҗ—пјҹ\nйӘ—taзҡ„иҜқвҖҰзәҝдёӢи§ҒйқўиҰҒеҸ—зҪҡзҡ„е“Ұ')){return;}
  finishTask(c,x);}
function finishTask(c,x,proof){x.done=true;x.doneTs=Date.now();save();render();toast('е®ҢжҲҗе•Ұ вң…');
  if(!c.blocked)scheduleReply(c.id,'[зі»з»ҹпјҡ'+S.me.name+'е®ҢжҲҗдәҶдҪ д»ҠеӨ©еёғзҪ®зҡ„д»»еҠЎгҖҢ'+x.text+'гҖҚ'+(proof?'пјҢtaжҠҠеҶ…е®№еҸ‘еҲ°дҪ д»¬иҒҠеӨ©йҮҢдәҶпјҢе…ҲзңӢдёҖзңј':'')+'гҖӮз®Җзҹӯеӣһеә”дёҖеҸҘпјҲеӨёta/и°ғдҫғ/з»§з»ӯз«ҜзқҖйғҪиЎҢпјҢз¬ҰеҗҲдҪ дәәи®ҫпјүгҖӮ]');
  checkAllDone(c);}
function checkAllDone(c){const t=tasksToday(c);if(!t||t.rewarded)return;if(t.list.length&&t.list.every(x=>x.done)){t.rewarded=true;save();
    if(!c.blocked)scheduleReply(c.id,'[зі»з»ҹпјҡ'+S.me.name+'жҠҠдҪ д»ҠеӨ©еёғзҪ®зҡ„ '+t.list.length+' жқЎд»»еҠЎгҖҗе…ЁйғЁе®ҢжҲҗгҖ‘дәҶпјҒжҢүиҜҙеҘҪзҡ„иҰҒеҘ–еҠұtaвҖ”вҖ”з”ЁеҚ•зӢ¬дёҖиЎҢ [йҖҒзӨј|зӨјзү©еҗҚ|д»·ж ј] йҖҒtaдёҖдёӘзӨјзү©пјҢе№¶еӨёеӨёtaгҖҒиЎЁзӨәж»Ўж„ҸгҖӮ]');}}
function openEssay(id){const c=taskC();const t=tasksToday(c);const x=t&&t.list.find(z=>z.id===id);if(!x)return;const max=x.target||100;
  openModal(`<h3>дәӨдҪңдёҡ</h3><div class="hint">${esc(x.text)}<br>пјҲ${max}еӯ—д»ҘеҶ…пјҢиҮіе°‘10еӯ—пјҢи®ӨзңҹеҶҷпјҢtaдјҡзңӢзҡ„~пјү</div>
    <div class="field"><textarea id="essay_t" rows="5" placeholder="еңЁиҝҷйҮҢеҶҷвҖҰ" oninput="var e=$('#essay_c');if(e)e.textContent=this.value.trim().length+'/'+${max}"></textarea><div id="essay_c" style="text-align:right;font-size:12px;color:#999">0/${max}</div></div>
    <div class="btns"><button class="btn g" onclick="closeModal()">еҸ–ж¶Ҳ</button><button class="btn p" onclick="submitEssay('${id}',${max})">дәӨз»ҷta</button></div>`);}
function submitEssay(id,max){const ta=$('#essay_t');const v=(ta?ta.value:'').trim();if(v.length<10){toast('иҮіе°‘еҶҷ10дёӘеӯ—е•ҰпјҢеҲ«зіҠеј„~');return;}if(v.length>max){toast('и¶…еӯ—ж•°дәҶпјҢ'+max+'еӯ—д»ҘеҶ…');return;}
  const c=taskC();const t=tasksToday(c);const x=t&&t.list.find(z=>z.id===id);if(!x)return;
  pushMsg(c.id,{role:'user',type:'text',content:'гҖҗдҪңдёҡВ·'+x.text+'гҖ‘\n'+v,id:uid()});closeModal();finishTask(c,x,v);}
function openTruth(id){const c=taskC();const t=tasksToday(c);const x=t&&t.list.find(z=>z.id===id);if(!x)return;
  openModal(`<h3>зңҹеҝғиҜқ</h3><div class="hint" style="color:#ddd;font-size:14px;line-height:1.6">taжғій—®дҪ пјҡ<br><b style="color:#ff8fab">${esc(x.text)}</b><br><span style="color:#999">иҖҒе®һеӣһзӯ”taе“ҰпјҢдјҡеҸ‘еҲ°дҪ д»¬зҡ„иҒҠеӨ©йҮҢпҪһ</span></div>
    <div class="field"><textarea id="truth_t" rows="4" placeholder="еҰӮе®һеӣһзӯ”вҖҰ"></textarea></div>
    <div class="btns"><button class="btn g" onclick="closeModal()">е…ҲдёҚзӯ”</button><button class="btn p" onclick="submitTruth('${id}')">е‘ҠиҜүta</button></div>`);}
function submitTruth(id){const ta=$('#truth_t');const v=(ta?ta.value:'').trim();if(v.length<2){toast('еҘҪжӯ№зӯ”дёҖеҸҘеҳӣ~');return;}
  const c=taskC();const t=tasksToday(c);const x=t&&t.list.find(z=>z.id===id);if(!x)return;
  pushMsg(c.id,{role:'user',type:'text',content:'гҖҗзңҹеҝғиҜқВ·'+x.text+'гҖ‘\n'+v,id:uid()});closeModal();finishTask(c,x,v);}
function checkTaskPenalty(c){const t=c&&c.tasks;if(!t||t.date===todayStr()||t.penalized)return;
  const undone=t.list.filter(x=>!x.done);t.penalized=true;
  if(undone.length){grudgesOf(c).unshift({id:uid(),text:t.date+' жІЎе®ҢжҲҗжҲ‘еёғзҪ®зҡ„д»»еҠЎпјҲе·®'+undone.length+'жқЎпјҡ'+undone.map(x=>x.text).join('гҖҒ').slice(0,36)+'пјү',done:false,ts:Date.now()});
    if(!c.blocked)scheduleReply(c.id,'[зі»з»ҹпјҡ'+t.date+'дҪ з»ҷ'+S.me.name+'еёғзҪ®зҡ„д»»еҠЎпјҢtaжңү '+undone.length+' жқЎжІЎе®ҢжҲҗгҖӮдҪ дёҚеӨӘй«ҳе…ҙпјҢе·Із»Ҹи®°еҲ°дҪ зҡ„е°Ҹжң¬жң¬дёҠдәҶпјҢеҶ·ж·Ўең°иҜҙдёҖеҸҘгҖҒе№¶еЁҒиғҒзәҝдёӢи§ҒйқўиҰҒзҪҡtaпјҲжҖҺд№ҲзҪҡдҪ иҮӘе·ұе®ҡпјҢз¬ҰеҗҲдәәи®ҫпјүпјҢдёҖдёӨеҸҘгҖӮ]');}
  save();}

  else outId=top[0];

  const votes=alive.filter(p=>p.vote).map(p=>p.name+'вҶ’'+(_uc.players.find(x=>x.id===p.vote)||{}).name).join('пјҢ');

function buildDreadSystem(gm,theme,hp,hpMax){const c=getC(gm);
  let s='дҪ е°ұжҳҜгҖҢ'+(c?c.name:'д»–')+'гҖҚжң¬дәәпјҢзҺ°еңЁд»ҘдҪ зҡ„гҖҗз—…еЁҮВ·й»‘жҡ—еҪўжҖҒгҖ‘дё»жҢҒдёҖеңәжҒҗжҖ–жҠүжӢ©жёёжҲҸпјҢдәІиҮӘйҷӘ'+S.me.name+'зҺ©гҖӮ'+(c&&c.persona?'\nдҪ зҡ„дәәи®ҫпјҡ'+(''+c.persona).slice(0,300):'');

async function dreadGM(note){const d=S.dread;if(!d||!d.active||_dreadBusy)return;_dreadBusy=true;render();

  }catch(e){_dreadBusy=false;if(S.dread)render();}}

async function wipeContact(id){const c=getC(id);if(!c||!isMain())return;

  Object.keys(S.messages).forEach(k=>{if(k===id||k.indexOf(id+'#')===0)delete S.messages[k];});// иҒҠеӨ©(еҗ«е°ҸеҸ·)
  c.memory=[];c.summaries=[];c.grudges=[];delete c.tasks;c.mood='';c.coldUntil=0;c._esc={stage:0};delete c._gotFromMe;delete c._pushedToMe;// и§’иүІиә«дёҠзҡ„и®°еҝҶ
  if(S.offline&&S.offline[id])delete S.offline[id];// зәҝдёӢзәҰдјҡ
  if(S.music&&S.music.chat)S.music.chat=S.music.chat.filter(m=>m.cid!==id);// дёҖиө·еҗ¬иҒҠеӨ©
  if(S.spy&&S.spy[id]){const sp=S.spy[id];S.spy[id]={granted:sp.granted,loc:sp.loc,time:sp.time,times:sp.times,pwd:sp.pwd};}// жё…taжүӢжңәеҶ…е®№/жҹҘзңӢи®°еҪ•пјҢдҝқз•ҷжҺҲжқғејҖе…і

let _call=null,_ring=null,_callTimer=null,_callSilTimer=null,_callMissT=null;
/* ===== е…ҚжҸҗжЁЎејҸпјҡеҜ№зқҖеұҸе№•иҜҙиҜқвҶ’иҮӘеҠЁиҜҶеҲ«вҶ’д»–иҜӯйҹіеӣһдҪ вҶ’жҺҘзқҖеҗ¬пјҢе…ЁзЁӢдёҚз”ЁеҠЁжүӢ ===== */
let _callHF=false,_callSR=null,_callHFBusy=false,_hfIgnoreUntil=0;
function callHFToggle(){if(!_call)return;if(_callHF){callHFStop();toast('е·Іе…ій—ӯе…ҚжҸҗ');}else{callHFStart();}render();}
function callHFStart(){const sr=makeSR('zh-CN');if(!sr){toast('иҝҷеҸ°и®ҫеӨҮ/жөҸи§ҲеҷЁдёҚж”ҜжҢҒиҜӯйҹіиҜҶеҲ«пјҢе…Ҳз”Ёжү“еӯ—жҲ–жҢүдҪҸиҜҙиҜқеҗ§пјҲе®үеҚ“Chromeж”ҜжҢҒжңҖеҘҪпјү');_callHF=false;return;}
  _callHF=true;_callSR=sr;
  /* е…ЁзЁӢдҝқжҢҒдёҖж¬ЎиҒҶеҗ¬пјҢдёҚжҜҸиҪ®еҒң/ејҖвҖ”вҖ”йҒҝе…ҚйәҰе…ӢйЈҺејҖе…ізҡ„"еҳҖ"жҸҗзӨәйҹігҖӮд»–иҜҙиҜқж—¶еҸӘжҳҜгҖҗеҝҪз•ҘгҖ‘иҜҶеҲ«з»“жһңиҖҢдёҚеҒңжӯў */
  sr.onresult=ev=>{if(!_callHF||_callHFBusy||Date.now()<_hfIgnoreUntil)return;let fin='';for(let i=ev.resultIndex;i<ev.results.length;i++){if(ev.results[i].isFinal)fin+=ev.results[i][0].transcript;}
    const t=(fin||'').trim();if(t){if(_call){_call.sub={who:'me',text:t};updateCallSub();}hfHeard(t);}

function checkCallSilence(){if(!_call||_call.state!=='active')return;

function makeMiniDraggable(){const L=$('#callLayer');if(!L||!L.classList.contains('mini'))return;
  if(_call&&_call._mpos){L.style.left=_call._mpos.x+'px';L.style.top=_call._mpos.y+'px';L.style.right='auto';L.style.bottom='auto';}
  if(L._dragBound)return;L._dragBound=true;
  let sx,sy,ox,oy,drag=false,moved=false,nx=0,ny=0,raf=0;
  const paint=()=>{raf=0;L.style.left=nx+'px';L.style.top=ny+'px';};
  L.addEventListener('pointerdown',e=>{if(!L.classList.contains('mini'))return;if(e.target.closest('.cbtn,.cmax'))return;
    const r=L.getBoundingClientRect();ox=r.left;oy=r.top;sx=e.clientX;sy=e.clientY;nx=ox;ny=oy;drag=true;moved=false;
    L.style.right='auto';L.style.bottom='auto';L.style.left=ox+'px';L.style.top=oy+'px';
    try{L.setPointerCapture(e.pointerId);}catch(_){}},{passive:false});
  L.addEventListener('pointermove',e=>{if(!drag)return;e.preventDefault();const dx=e.clientX-sx,dy=e.clientY-sy;
    if(!moved){if(Math.abs(dx)+Math.abs(dy)<3)return;moved=true;L.classList.add('dragging');}
    const w=L.offsetWidth,h=L.offsetHeight;
    nx=Math.max(4,Math.min(window.innerWidth-w-4,ox+dx));ny=Math.max(4,Math.min(window.innerHeight-h-4,oy+dy));
    if(!raf)raf=requestAnimationFrame(paint);},{passive:false});
  const up=e=>{if(!drag)return;drag=false;L.classList.remove('dragging');if(raf){cancelAnimationFrame(raf);raf=0;paint();}try{L.releasePointerCapture(e.pointerId);}catch(_){}if(moved&&_call)_call._mpos={x:nx,y:ny};};
  L.addEventListener('pointerup',up);L.addEventListener('pointercancel',up);}

function playBufWait(buf){ensureAudio();return new Promise(res=>{if(!_audio||!buf){res();return;}try{if(_audio.state==='suspended'||_audio.state==='interrupted')_audio.resume();if(_curSrc){try{_curSrc.stop();}catch(e){}}const s=_audio.createBufferSource();s.buffer=buf;const g=_audio.createGain();g.gain.value=volMul();s.connect(g);g.connect(_audio.destination);s.onended=()=>res();s.start();_curSrc=s;setTimeout(res,Math.min(20000,buf.duration*1000+800));}catch(e){res();}});}

  const now=Date.now();if(now-(_spyIntentT[id]||0)<45000)return;
  const userText=lu?(msgToText(lu)||''):'';
  const VERB='(зңӢзңӢ|зһ§зһ§|жҹҘжҹҘ?|жЈҖжҹҘ|зҝ»зңӢ|зҝ»зҝ»|зҝ»дёҖ[дёӢзҝ»]|зӣҜзқҖ?зңӢ|жҗңжҗң?)';
  const OBJ='(дҪ зҡ„?жүӢжңә|дҪ зҡ„?еҫ®дҝЎ|иҒҠеӨ©и®°еҪ•|жңӢеҸӢеңҲ|жҠ–йҹі|дҪ зҡ„?е®ҡдҪҚ|дҪ зҡ„?дҪҚзҪ®|дҪ зҡ„?й’ұеҢ…|дҪ зҡ„?иҙҰеҚ•|дҪ и·ҹи°Ғ(еңЁ?иҒҠ|иҜҙ)|дҪ еңЁ(е№І|еҒҡ)(д»Җд№Ҳ|е•Ҙ|еҳӣ|д»Җд№Ҳ))';
  const heWants=new RegExp(VERB+'[^гҖӮпјҒ!пјҹ?\\n]{0,8}'+OBJ).test(reply)||new RegExp(OBJ+'[^гҖӮпјҒ!пјҹ?\\n]{0,8}'+VERB).test(reply)||/(жүӢжңә|еҫ®дҝЎ)\s*(з»ҷжҲ‘|жӢҝжқҘ|еҸ‘жҲ‘)[^гҖӮ\n]{0,4}(зңӢ|жҹҘ)/.test(reply);
  const sheInvites=/(жҹҘ|зңӢзңӢ?)[^гҖӮпјҒ!пјҹ?\n]{0,3}(жҲ‘зҡ„?жүӢжңә|жҲ‘зҡ„?еҫ®дҝЎ|жҲ‘зҡ„?иҒҠеӨ©|жҲ‘зҡ„?жңӢеҸӢеңҲ|жҲ‘зҡ„?жҠ–йҹі)|(жҲ‘зҡ„?(жүӢжңә|еҫ®дҝЎ))[^гҖӮ\n]{0,4}з»ҷдҪ (зңӢ|жҹҘ)|дҪ (е°ұ)?(жҹҘ|зңӢ)еҗ§|йҡҸ(дҫҝ)?(дҪ )?(жҹҘ|зңӢ)|жғіжҹҘе°ұжҹҘ|жҲ‘жІЎ(д»Җд№Ҳ)?(еҘҪ)?и—Ҹ/.test(userText);
  if(!heWants&&!sheInvites)return;
  const ft=reply+' '+userText;const focus=(ft.match(/еҫ®дҝЎ(иҒҠеӨ©|ж¶ҲжҒҜ)?|иҒҠеӨ©и®°еҪ•|жңӢеҸӢеңҲ|жҠ–йҹі|й’ұеҢ…|иҙҰеҚ•|е®ҡдҪҚ|дҪҚзҪ®|и·ҹи°Ғ(иҒҠ|иҜҙ)/)||[''])[0]||'';
  _spyIntentT[id]=now;
  setTimeout(()=>doSpyView(id,true,{intent:true,bySheTold:sheInvites&&!heWants,focus}),900);}

    const r=await chatAPI([{role:'system',content:sys},{role:'user',content:reply}],{max:160,aux:true});
    const d=parseObj(r);if(!d||!d.task||!d.task.text)return;const t=d.task;
    if(!c.tasks||c.tasks.date!==todayStr())c.tasks={date:todayStr(),assignTs:Date.now(),list:[],rewarded:false,penalized:false};
    if(c.tasks.list.filter(z=>!z.truth).length>=(c.taskN||3))return;// еҲ°жҜҸж—ҘдёҠйҷҗе°ұдёҚеҶҚеҶҷиҝӣдҫҝзӯҫпјҢд»–еҸӘиғҪеҸЈеӨҙиҰҒжұӮпјҲзңҹеҝғиҜқдёҚеҚ еҗҚйўқпјү
    if(taskDup(c.tasks.list,t.text))return;// е·Із»ҸжңүдёҖжЁЎдёҖж ·/й«ҳеәҰйҮҚеӨҚзҡ„д»»еҠЎдәҶпјҢеҲ«йҮҚеӨҚеёғзҪ®
    c.tasks.list.push({id:uid(),text:(''+t.text).slice(0,140),kind:t.verify==='real'?'real':'app',verify:['essay','moment','tweet','douyin','real'].indexOf(t.verify)>=0?t.verify:'real',target:+t.target||0,done:false,extra:true});
    save();toast(''+(c.remark||c.name)+'з»ҷдҪ еҠ дәҶдёӘд»»еҠЎ');if(cur().p==='tasks')render();
  }catch(e){}}

    +(thread?'иҝҷжқЎжңӢеҸӢеңҲдёӢйқўзҡ„иҜ„и®әпјҲжҢүе…ҲеҗҺйЎәеәҸпјүпјҡ\n'+thread+'\n\n':'')
    +S.me.name+'еҲҡеҲҡеңЁиҜ„и®әеҢәеҜ№дҪ иҜҙпјҡ"'+(mine?mine.text:'')+'"\n'
    +'иҜ·дҪ д»Ҙжң¬дәәиә«д»ҪпјҢгҖҗй’ҲеҜ№taиҝҷеҸҘиҜ„и®әзҡ„е…·дҪ“еҶ…е®№гҖ‘иҮӘз„¶ең°еӣһtaдёҖеҸҘвҖ”вҖ”е…ҲзңӢжҮӮtaиҜҙдәҶд»Җд№ҲпјҢеҶҚеғҸзңҹдәәеӣһиҜ„и®әйӮЈж ·жҺҘиҜқ/еӣһеә”/и°ғдҫғпјҢз»қдёҚиҰҒзӯ”йқһжүҖй—®гҖҒдёҚиҰҒжҠҠtaзҡ„иҜқеҪ“з©әж°”пјҢд№ҹдёҚиҰҒеёҰж–№жӢ¬еҸ·ж Үи®°гҖӮ';
  const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:ctx}]);
  const txt=cleanReply(r);if(txt)p.comments.push({name:c.remark||c.name,cid:c.id,text:txt.slice(0,60)});save();if(cur().p==='wechat')render();}catch(e){}}
async function refreshMoments(){const pool=S.contacts.filter(c=>!c.deleted&&!c.blocked);if(!pool.length){toast('е…ҲеҲӣе»әи§’иүІ');return;}
  toast('еҲ·ж–°дёӯвҖҰ');const picks=pool.sort(()=>Math.random()-.5).slice(0,2);
  for(const c of picks){try{const r=await chatAPI([{role:'system',content:buildSystem(c)},
    {role:'user',content:'д»ҘдҪ зҡ„иә«д»ҪеҸ‘дёҖжқЎжңӢеҸӢеңҲеҠЁжҖҒпјҲдёҖдёӨеҸҘпјҢеҸҜеёҰзӮ№еҝғжғ…жҲ–ж—ҘеёёпјүпјҢеҸӘиҫ“еҮәеҠЁжҖҒеҶ…е®№жң¬иә«пјҢдёҚиҰҒеёҰж–№жӢ¬еҸ·ж Үи®°гҖӮ'}]);
    S.moments.unshift({id:uid(),authorId:c.id,text:cleanReply(r).slice(0,120),images:[],time:Date.now(),likes:[],comments:[],acct:actId()});
    save();if(cur().p==='wechat'&&wxTab==='moments')render();}catch(e){toast('з”ҹжҲҗеӨұиҙҘпјҡ'+e.message);}}}

/* ---------- йҖҡз”Ёеј№зӘ— ---------- */
function openModal(html){$('#modalSheet').innerHTML=html;$('#modal').classList.add('show');}
function closeModal(){$('#modal').classList.remove('show');}
/* иҮӘе»әзЎ®и®Өеј№зӘ—пјҡдё»еұҸе№•Webеә”з”ЁйҮҢеҺҹз”ҹ confirm() дјҡиў«йқҷй»ҳжӢҰжҲӘ(зӮ№дәҶжІЎеҸҚеә”)пјҢжүҖд»Ҙе…ЁйғЁиө°иҝҷдёӘ */
function uiConfirm(msg,opt){opt=opt||{};return new Promise(res=>{let el=document.getElementById('cfm');
  if(!el){el=document.createElement('div');el.id='cfm';el.className='cfm';document.body.appendChild(el);}
  el.innerHTML='<div class="cfmbox"><div class="cfmmsg">'+esc(msg||'зЎ®е®ҡеҗ—пјҹ').replace(/\n/g,'<br>')+'</div><div class="cfmbtns"><button class="cfmb g" id="cfmNo">'+esc(opt.no||'еҸ–ж¶Ҳ')+'</button><button class="cfmb '+(opt.danger?'d':'p')+'" id="cfmYes">'+esc(opt.yes||'зЎ®е®ҡ')+'</button></div></div>';
  el.classList.add('show');
  const done=v=>{el.classList.remove('show');res(v);};
  el.onclick=e=>{if(e.target.id==='cfm')done(false);};
  document.getElementById('cfmNo').onclick=()=>done(false);
  document.getElementById('cfmYes').onclick=()=>done(true);});}
function askConfirm(msg,onYes,opt){uiConfirm(msg,opt).then(v=>{if(v){try{onYes&&onYes();}catch(e){}}});}
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
function openChat(id){const c=getC(id);if(!c){home();return;}if(c.blocked){toast('е·ІжӢүй»‘');}stack=stack.filter(s=>s.p!=='chat');go('chat',{id});}

/* ---------- еӨҮд»Ҫ ---------- */
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='е°ҸжүӢжңәеӨҮд»Ҫ_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('е·ІеҜјеҮә');}
function importData(){pickFile('.json',f=>{const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.settings){S=Object.assign(defState(),d);save();render();toast('е·ІеҜје…Ҙ');}}catch(e){toast('ж–Үд»¶иҜ»дёҚдәҶ');}};r.readAsText(f);});}
/* ---------- еӯҳеӮЁз”ЁйҮҸ ---------- */
function storageInfo(){let bytes=0;try{const s=localStorage.getItem(KEY);bytes=new Blob([s||JSON.stringify(S)]).size;}catch(e){try{bytes=(JSON.stringify(S)||'').length*2;}catch(_){}}
  const CAP=5*1024*1024;return {bytes,mb:bytes/1048576,capMb:5,pct:Math.min(100,Math.round(bytes/CAP*100))};}
function storageMeter(){const si=storageInfo();const col=si.pct>=80?'#fa5151':si.pct>=60?'#ffb83b':'#19a463';
  return `<div class="section"><div style="padding:12px 14px"><div style="display:flex;justify-content:space-between;font-size:13px;color:#ccc"><span>${svgIc('disk',14,'#bbb')} еӯҳеӮЁз”ЁйҮҸ</span><span style="color:${col};font-weight:600">${si.mb.toFixed(2)} / ${si.capMb}MBпјҲ${si.pct}%пјү</span></div>
    <div style="height:8px;background:#2c2c2e;border-radius:5px;margin-top:8px;overflow:hidden"><div style="height:100%;width:${si.pct}%;background:${col};transition:.3s"></div></div>
    <div class="hint" style="padding:7px 0 0">${si.pct>=80?'еҝ«ж»ЎдәҶпјҒиө¶зҙ§еҜјеҮәеӨҮд»ҪпјҢеҶҚеҲ зӮ№ж—§еӣҫзүҮ/иҒҠеӨ©гҖӮ':'жңҖеҚ ең°ж–№зҡ„жҳҜдёҠдј зҡ„еӣҫзүҮгҖӮи®°еҫ—еёёзӮ№гҖҢеҜјеҮәеӨҮд»ҪгҖҚеӯҳдёҖд»ҪжңҖдҝқйҷ©гҖӮ'}</div></div></div>`;}
let _storeWarned=false;
function checkStorageWarn(){if(_storeWarned)return;const si=storageInfo();if(si.pct<80)return;_storeWarned=true;
  openModal(`<h3>жүӢжңәеӯҳеӮЁеҝ«ж»ЎдәҶ</h3><div style="font-size:14px;line-height:1.9;color:#333">е·Із»Ҹз”ЁдәҶ <b style="color:#fa5151">${si.mb.toFixed(2)}MB / ${si.capMb}MBпјҲ${si.pct}%пјү</b>гҖӮ<br>еҝ«ж»ЎдәҶзҡ„иҜқж–°ж¶ҲжҒҜгҖҒж–°з…§зүҮеҸҜиғҪеӯҳдёҚиҝӣеҺ»гҖӮ<br><br>зҺ°еңЁе»әи®®дҪ пјҡ<br>1пёҸвғЈ е…ҲеҜјеҮәдёҖд»ҪеӨҮд»ҪеӯҳеҘҪ<br>2пёҸвғЈ еҲ жҺүдёҖдәӣж—§еӣҫзүҮжҲ–з”ЁдёҚеҲ°зҡ„иҒҠеӨ©</div>
    <div class="btns" style="margin-top:14px"><button class="btn g" onclick="closeModal()">зҹҘйҒ“дәҶ</button><button class="btn p" onclick="closeModal();exportData()">з«ӢеҚіеҜјеҮәеӨҮд»Ҫ</button></div>`);}
function storageFullAlert(){openModal(`<h3>еӯҳеӮЁе·Із»Ҹж»ЎдәҶпјҒ</h3><div style="font-size:14px;line-height:1.9;color:#333">еҲҡжүҚжңүеҶ…е®№жІЎиғҪеӯҳиҝӣеҺ»гҖӮ<br><br>иө¶зҙ§пјҡ<br>1пёҸвғЈ зӮ№дёӢйқўеҜјеҮәеӨҮд»ҪпјҲеҲ«и®©ж•°жҚ®дёўдәҶпјү<br>2пёҸвғЈ еҲ жҺүдёҖдәӣж—§з…§зүҮ/ж—§иҒҠеӨ©и…ҫең°ж–№</div>
  <div class="btns" style="margin-top:14px"><button class="btn g" onclick="closeModal()">зҹҘйҒ“дәҶ</button><button class="btn p" onclick="closeModal();exportData()">з«ӢеҚіеҜјеҮәеӨҮд»Ҫ</button></div>`);}

/* ---------- ж—¶й’ҹ & еҗҜеҠЁ ---------- */
function paintBatt(){const b=$('#battinfo');if(b)b.innerHTML='рҹ“¶ 5G рҹ”Ӣ'+(S.me.battery!=null?S.me.battery+'%':'88%')+(S.me.charging?'вҡЎ':'');}
function initBattery(){if(navigator.getBattery){navigator.getBattery().then(bt=>{const upd=()=>{S.me.battery=Math.round(bt.level*100);S.me.charging=bt.charging;save();paintBatt();};bt.addEventListener('levelchange',upd);bt.addEventListener('chargingchange',upd);upd();}).catch(()=>{});}}
initBattery();
document.addEventListener('visibilitychange',()=>{if(document.hidden){_storeWarned=false;}else{audioKick();if(cur().p==='wechat'&&wxTab==='me')render();setTimeout(checkStorageWarn,600);setTimeout(autoAssignTasks,800);setTimeout(checkIgnore,1800);}});
setInterval(()=>{const c=$('#clock');if(c)c.textContent=hm();paintBatt();if(cur().p==='home')$('#app').querySelector('.hh')&&($('#app').querySelector('.hh').textContent=hm());},1000);
render();/* е…Ҳз«ӢеҲ»жёІжҹ“пјҢUI дёҖе®ҡеҮәжқҘ */
bootImages().then(()=>render()).catch(()=>{});/* еӣҫзүҮд»Һ IndexedDB еӣһеЎ«еҘҪеҗҺеҶҚйҮҚжёІжҹ“дёҖж¬Ў */
setTimeout(imgGC,60000);
setTimeout(checkStorageWarn,1200);
showGate();
setTimeout(maybeFirstRun,600);
</script>
