<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="小手机" />
<link rel="apple-touch-icon" href="icon.png" />
<title>忆北的小手机 📱</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#ffd6e8,#d6e4ff 50%,#e3d6ff);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:12px;}
.phone{position:relative;width:380px;height:800px;max-height:97vh;background:#111;border-radius:48px;padding:12px;box-shadow:0 20px 60px rgba(255,143,171,.45);}
.screen{position:relative;width:100%;height:100%;border-radius:38px;overflow:hidden;display:flex;flex-direction:column;background:#ededed;}
.island{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:108px;height:26px;background:#000;border-radius:16px;z-index:99;}
.statusbar{height:42px;flex:0 0 42px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:13px;font-weight:600;color:#fff;z-index:5;}
.statusbar.dark{color:#111;}
#app{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.page{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
/* 顶栏 */
.nav{flex:0 0 46px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:#ededed;border-bottom:.5px solid #dadada;position:relative;z-index:3;}
.nav .t{font-size:17px;font-weight:600;color:#111;position:absolute;left:50%;transform:translateX(-50%);max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav .l,.nav .r{font-size:22px;color:#111;cursor:pointer;min-width:30px;z-index:1;}
.nav .r{text-align:right;}
.nav .l{font-size:25px;}
/* 主屏幕 */
.home{background:linear-gradient(160deg,#ffc8dd,#bde0fe 55%,#cdb4db);height:100%;display:flex;flex-direction:column;}
.home .clockw{color:#fff;text-align:center;margin-top:34px;text-shadow:0 2px 8px rgba(0,0,0,.15);}
.home .clockw .hh{font-size:62px;font-weight:300;letter-spacing:2px;}
.home .clockw .dd{font-size:15px;margin-top:2px;}
.apps{margin-top:auto;padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px 14px;}
.app{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.app .ic{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 6px 14px rgba(0,0,0,.12);background:#fff;}
.app span{font-size:11px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.25);}
.dock{margin:0 16px 18px;background:rgba(255,255,255,.35);border-radius:26px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;backdrop-filter:blur(8px);}
/* 列表通用 */
.list .row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border-bottom:.5px solid #f0f0f0;cursor:pointer;}
.list .row:active{background:#f5f5f5;}
.avatar{width:46px;height:46px;border-radius:9px;flex:0 0 46px;background:linear-gradient(135deg,#9ec5fe,#b8a4e3);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar.sm{width:38px;height:38px;flex-basis:38px;font-size:20px;border-radius:8px;}
.avatar.lg{width:64px;height:64px;flex-basis:64px;font-size:32px;border-radius:13px;}
.meta{flex:1;min-width:0;}
.meta .n{font-size:16px;color:#111;display:flex;align-items:center;gap:6px;}
.meta .s{font-size:13px;color:#999;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.meta .time{font-size:11px;color:#bbb;}
.pin{background:#f7f7f7;}
.tag{font-size:10px;background:#ffe0ea;color:#e0719a;border-radius:4px;padding:1px 5px;}
.badge{background:#fa5151;color:#fff;font-size:11px;border-radius:10px;padding:0 6px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
/* 底部tab */
.tabbar{flex:0 0 54px;display:flex;background:#f7f7f7;border-top:.5px solid #ddd;}
.tabbar .tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:#888;cursor:pointer;}
.tabbar .tb.on{color:#ff6fa5;}
.tabbar .tb .i{font-size:21px;}
/* 聊天 */
.chatbg{flex:1;overflow-y:auto;padding:12px 12px 8px;background:#ededed;}
.tstamp{text-align:center;margin:10px 0;}
.tstamp span{font-size:11px;color:#fff;background:#c5c5c5;padding:2px 7px;border-radius:4px;}
.msg{display:flex;margin:9px 0;align-items:flex-start;gap:8px;}
.msg .avatar{width:38px;height:38px;flex-basis:38px;font-size:20px;border-radius:7px;}
.col{display:flex;flex-direction:column;gap:4px;max-width:70%;}
.msg.me{flex-direction:row-reverse;}.msg.me .col{align-items:flex-end;}
.bubble{padding:8px 11px;border-radius:6px;font-size:15px;line-height:1.45;word-break:break-word;white-space:pre-wrap;position:relative;color:#111;max-width:100%;}
.msg.them .bubble{background:#fff;}
.msg.me .bubble{background:#95ec69;}
.typing span{display:inline-block;width:6px;height:6px;margin:0 1px;border-radius:50%;background:#aaa;animation:bk 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bk{0%,60%,100%{opacity:.25}30%{opacity:1}}
.imgmsg{max-width:150px;border-radius:7px;overflow:hidden;cursor:pointer;}.imgmsg img{width:100%;display:block;}
.card{width:215px;border-radius:9px;overflow:hidden;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.cpay{padding:13px 14px;display:flex;align-items:center;gap:11px;color:#fff;}
.cpay.t{background:#f7a23b;}.cpay.r{background:#fa5151;}.cpay.done{background:#d9b48a;}
.cpay .big{font-size:30px;}.cpay .t1{font-size:16px;font-weight:600;}.cpay .t2{font-size:11px;opacity:.9;margin-top:2px;}
.cfoot{font-size:10px;padding:4px 14px;background:rgba(255,255,255,.18);color:#fff;}
.cloc{background:#fff;}.cloc .map{height:80px;background:linear-gradient(135deg,#cfe9c8,#a8d8e8);display:flex;align-items:center;justify-content:center;font-size:28px;}
.cloc .info{padding:8px 11px;}.cloc .n{font-size:14px;font-weight:600;}.cloc .a{font-size:11px;color:#999;margin-top:2px;}
.cfile{background:#fff;display:flex;align-items:center;padding:11px;gap:10px;}.cfile .ic{font-size:32px;}.cfile .n{font-size:13px;word-break:break-all;}.cfile .s{font-size:11px;color:#999;}
/* 输入栏 */
.inputbar{flex:0 0 auto;display:flex;align-items:flex-end;gap:7px;padding:7px 9px;background:#f7f7f7;border-top:.5px solid #ddd;}
.inputbar .plus{flex:0 0 auto;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;cursor:pointer;background:linear-gradient(135deg,#ffb6c9,#b8a4e3);box-shadow:0 2px 6px rgba(184,164,227,.5);transition:transform .15s;}
.inputbar .plus:active{transform:scale(.9) rotate(90deg);}
.inputbar textarea{flex:1;border:none;border-radius:6px;padding:8px 10px;font-size:15px;resize:none;max-height:84px;min-height:20px;line-height:1.3;outline:none;font-family:inherit;background:#fff;}
.inputbar .send{background:linear-gradient(135deg,#ffa0c8,#ff6fa5);border:none;color:#fff;font-size:14px;font-weight:600;padding:8px 13px;border-radius:6px;cursor:pointer;}
.panel{display:none;padding:0;background:#f7f7f7;border-top:.5px solid #eee;}
.panel.show{display:block;}
.ptabs{display:flex;gap:16px;padding:8px 16px 0;}
.ptabs span{font-size:13px;color:#888;padding:4px 2px;cursor:pointer;border-bottom:2px solid transparent;}
.ptabs span.on{color:#ddd;border-bottom-color:#ff8fab;}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 16px;}
.ppage{padding:10px 12px;max-height:210px;overflow-y:auto;}
.panel .it{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.panel .it .b{width:52px;height:52px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.panel .it span{font-size:11px;color:#666;}
/* 朋友圈 */
.mcover{height:200px;background:linear-gradient(135deg,#a18cd1,#fbc2eb);position:relative;}
.mcover .me{position:absolute;right:14px;bottom:-20px;display:flex;align-items:flex-end;gap:10px;}
.mcover .me .nm{color:#fff;font-weight:600;font-size:16px;text-shadow:0 1px 3px rgba(0,0,0,.3);margin-bottom:24px;}
.mcover .me .avatar.lg{border:2px solid #fff;}
.mpost{display:flex;gap:11px;padding:16px 14px;border-bottom:.5px solid #eee;background:#fff;}
.mpost .body{flex:1;min-width:0;}
.mpost .au{font-size:15px;color:#5b6b9c;font-weight:600;}
.mpost .tx{font-size:14px;color:#222;margin:5px 0;line-height:1.5;white-space:pre-wrap;}
.mpost .imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:6px 0;}
.mpost .imgs .ph{aspect-ratio:1;border-radius:6px;background:linear-gradient(135deg,#f0f0f0,#dfe6f0);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;}
.mpost .imgs .ph img{width:100%;height:100%;object-fit:cover;}
.mpost .ft{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.mpost .tm{font-size:11px;color:#bbb;}
.mpost .acts{font-size:18px;color:#5b6b9c;cursor:pointer;}
.mpost .likes{background:#f7f7f7;border-radius:6px;padding:6px 9px;font-size:13px;color:#5b6b9c;margin-top:7px;}
.mpost .cmts{background:#f7f7f7;border-radius:0 0 6px 6px;padding:4px 9px;}
.mpost .cmt{font-size:13px;color:#333;padding:3px 0;}.mpost .cmt b{color:#5b6b9c;font-weight:600;}
/* 我的钱包 */
.wallet{margin:14px;border-radius:18px;background:linear-gradient(145deg,#2bb36a,#0a9c52);padding:22px;color:#fff;}
.wallet .lb{font-size:13px;opacity:.85;}.wallet .ba{font-size:34px;font-family:Georgia,serif;margin:8px 0;}
.bill{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:.5px solid #f0f0f0;background:#fff;font-size:14px;}
.bill small{display:block;color:#aaa;margin-top:3px;font-size:11px;}
.bill .pos{color:#19a463;}.bill .neg{color:#333;}
/* 表单/弹窗 */
.modal{position:absolute;inset:0;background:rgba(0,0,0,.42);z-index:200;display:none;align-items:center;justify-content:center;padding:18px;}
.modal.show{display:flex;}
.sheet{width:100%;max-height:86%;overflow-y:auto;background:#fff;border-radius:18px;padding:18px 16px;}
.sheet h3{font-size:17px;margin-bottom:10px;color:#222;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:600;}
.field input,.field textarea,.field select{width:100%;border:1px solid #e3e3e3;border-radius:10px;padding:9px 11px;font-size:14px;font-family:inherit;outline:none;background:#fafafa;}
.field textarea{resize:vertical;min-height:54px;line-height:1.5;}
.two{display:flex;gap:10px;}.two .field{flex:1;}
.section{background:#fff;margin:10px 0;border-radius:12px;overflow:hidden;}
.section .it{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:.5px solid #f2f2f2;font-size:15px;color:#222;cursor:pointer;}
.section .it:last-child{border-bottom:none;}
.section .it .v{color:#999;font-size:13px;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.section .it.danger{color:#fa5151;}
.btn{border:none;border-radius:12px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;width:100%;}
.btn.p{background:linear-gradient(135deg,#ffa0c8,#ff6fa5);color:#fff;}.btn.g{background:#f0f0f0;color:#555;}.btn.d{background:#fa5151;color:#fff;}
.btns{display:flex;gap:10px;margin-top:6px;}.btns .btn{flex:1;}
.hint{font-size:12px;color:#999;line-height:1.5;margin-bottom:10px;}
.fab{position:absolute;right:16px;bottom:70px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#ffa0c8,#ff6fa5);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(255,111,165,.45);cursor:pointer;z-index:8;}
.toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;font-size:13px;padding:9px 16px;border-radius:20px;z-index:500;opacity:0;transition:.25s;pointer-events:none;max-width:80%;text-align:center;}
.toast.show{opacity:1;}
.usebadge{position:absolute;top:46px;right:8px;z-index:420;background:rgba(108,92,231,.82);color:#fff;font-size:11px;padding:3px 9px;border-radius:12px;display:none;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.35);font-variant-numeric:tabular-nums;}
.usebadge.warn{background:rgba(232,82,82,.9);}
.viewer{position:absolute;inset:0;background:rgba(0,0,0,.92);z-index:600;display:none;align-items:center;justify-content:center;}
.viewer.show{display:flex;}.viewer img{max-width:96%;max-height:96%;}
.avline{display:flex;align-items:center;gap:10px;}
.minibtn{background:#f0f0f0;border:none;border-radius:9px;padding:8px 10px;font-size:12px;color:#555;cursor:pointer;white-space:nowrap;}
.empty{text-align:center;color:#bbb;font-size:13px;padding:30px 0;}
.sw{width:44px;height:25px;border-radius:13px;background:#ccc;position:relative;transition:.2s;flex:0 0 44px;cursor:pointer;}
.sw.on{background:#ff6fa5;}.sw:after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;}
.sw.on:after{left:21px;}
/* ========== 暗色 + 全屏 ========== */
body{background:#000;padding:0;}
.phone{width:100vw;height:100vh;max-height:none;border-radius:0;padding:0;background:#000;box-shadow:none;}
.screen{border-radius:0;background:#000;}
.island{display:none;}
.statusbar,.statusbar.dark{color:#fff;}
.nav{background:#1c1c1e;border-bottom:.5px solid #2a2a2c;}
.nav .t{color:#f2f2f2;}.nav .l,.nav .r{color:#f2f2f2;}
.list .row{background:#1c1c1e;border-bottom:.5px solid #2a2a2c;}
.list .row:active{background:#262628;}
.list .row.pin{background:#202024;}
.meta .n{color:#f2f2f2;}.meta .s{color:#8e8e93;}.meta .time{color:#666;}
.tabbar{background:#1c1c1e;border-top:.5px solid #2a2a2c;}.tabbar .tb{color:#888;}
.chatbg{background:#0d0d0d;}
.tstamp span{background:#3a3a3c;color:#bbb;}
.msg.them .bubble{background:#2c2c2e;color:#ececec;}
.msg.me .bubble{background:linear-gradient(135deg,#ffd6e8,#ffc0d6);color:#6b2942;}
.bubble{color:#ececec;}
.msgt{font-size:10px;color:#888;margin-top:2px;padding:0 2px;}
.moodbar{padding:7px 14px;background:#181820;color:#b9a6e0;font-size:12px;border-bottom:.5px solid #2a2a2c;display:flex;align-items:center;gap:6px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.inputbar{background:#1c1c1e;border-top:.5px solid #2a2a2c;}
.inputbar textarea{background:#2c2c2e;color:#f0f0f0;}
.panel{background:#1c1c1e;border-top:.5px solid #2a2a2c;}.panel .it span{color:#bbb;font-size:11px;}
.panel .it .b{width:54px;height:54px;border-radius:16px;font-size:26px;background:linear-gradient(145deg,#2f2f37,#26262c);box-shadow:0 4px 10px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.05);transition:transform .12s;}
.panel .it:active .b{transform:scale(.92);}
.section{background:#1c1c1e;}
.section .it{color:#f0f0f0;border-bottom:.5px solid #2a2a2c;}.section .it .v{color:#888;}
.sheet{background:#1c1c1e;color:#f0f0f0;}.sheet h3{color:#f5f5f5;}
.field label{color:#bbb;}
.field input,.field textarea,.field select{background:#2c2c2e;border:1px solid #38383a;color:#f0f0f0;}
.minibtn{background:#2c2c2e;color:#ccc;}.btn.g{background:#2c2c2e;color:#ddd;}
.bill{background:#1c1c1e;color:#f0f0f0;border-bottom:.5px solid #2a2a2c;}.bill .neg{color:#eee;}
.mpost{background:#1c1c1e;border-bottom:.5px solid #2a2a2c;}.mpost .tx{color:#eaeaea;}
.mpost .likes,.mpost .cmts{background:#262628;}.mpost .cmt{color:#ddd;}
.cloc,.cfile{background:#2c2c2e;}.cloc .n,.cfile .n{color:#eee;}
.empty{color:#666;}.hint{color:#888;}
.home{background:linear-gradient(160deg,#3a2a52,#241d3d 45%,#3a2440 100%);position:relative;}
.home:before{content:"";position:absolute;top:8%;left:-10%;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,182,201,.35),transparent 70%);filter:blur(6px);pointer-events:none;}
.home:after{content:"";position:absolute;bottom:18%;right:-12%;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(157,140,227,.3),transparent 70%);filter:blur(6px);pointer-events:none;}
.home .clockw{position:relative;z-index:1;}
.hwidget{position:relative;z-index:1;margin:18px 22px 0;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);border-radius:18px;padding:14px 16px;border:1px solid rgba(255,255,255,.12);}
.hwidget .hg{color:#fff;font-size:16px;font-weight:600;}
.hwidget .hw{color:rgba(255,255,255,.8);font-size:13px;margin-top:4px;}
.app .ic{background:rgba(255,255,255,.12);box-shadow:0 6px 16px rgba(0,0,0,.25);position:relative;z-index:1;}
.apps,.dock{position:relative;z-index:1;}
.dock{background:rgba(255,255,255,.12);backdrop-filter:blur(10px);}
/* ===== 通话 ===== */
.callscreen{position:absolute;inset:0;z-index:450;display:none;flex-direction:column;align-items:center;color:#fff;background:linear-gradient(165deg,#34344a,#16161e);}
.callscreen.show{display:flex;}
.callscreen.mini{inset:auto;top:44px;left:8px;right:auto;width:auto;height:auto;flex-direction:row;align-items:center;gap:8px;padding:6px 10px;border-radius:26px;background:rgba(18,18,26,.96);border:1px solid #4a4a5a;box-shadow:0 4px 18px rgba(0,0,0,.55);z-index:456;}
.callscreen.mini .cav{margin:0;}
.callscreen.video{background:radial-gradient(circle at 50% 30%,#2a3a4a,#0a0a10);}
.callscreen .cav{margin-top:88px;width:100px;height:100px;border-radius:24px;font-size:48px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#444;}
.callscreen .cav img{width:100%;height:100%;object-fit:cover;}
.callscreen.video.active .cav{position:absolute;right:14px;top:54px;width:92px;height:130px;border-radius:12px;margin:0;z-index:2;}
.callscreen .cname{font-size:24px;margin-top:18px;font-weight:600;}
.callscreen .cstat{font-size:14px;color:#cfcfcf;margin-top:8px;}
.callsubs{position:absolute;bottom:200px;left:0;right:0;max-height:34%;overflow-y:auto;padding:0 18px;display:flex;flex-direction:column;gap:8px;}
.callsub{position:absolute;bottom:190px;left:0;right:0;padding:0 26px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center;}
.csline{font-size:18px;color:#fff;line-height:1.5;text-shadow:0 1px 6px rgba(0,0,0,.6);animation:csin .3s ease;}
.csline.me{color:#ffd6e8;}
@keyframes csin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.callsubs .cb{background:rgba(255,255,255,.14);padding:8px 12px;border-radius:14px;font-size:14px;max-width:78%;align-self:flex-start;}
.callsubs .cb.me{align-self:flex-end;background:linear-gradient(135deg,#ffd6e8,#ffb0cf);color:#6b2942;}
.callinput{position:absolute;bottom:150px;left:14px;right:14px;display:none;gap:8px;z-index:3;}
.callinput.show{display:flex;}
.callinput input{flex:1;border:none;border-radius:18px;padding:9px 14px;background:rgba(255,255,255,.16);color:#fff;outline:none;font-size:15px;}

<script>
/* =================== 存储 =================== */
const KEY='yibei_phone_v2';
const APP_VER='v120 · 关小黑屋只认明确指令,聊到不误关';
function defState(){return{
  settings:{
    chat:{base:'https://vg.v1api.cc/v1',key:'',model:'gpt-4o-mini',temp:0.8,maxTokens:900},
    aux:{base:'',key:'',model:''},
    search:{mode:'jina',base:'https://s.jina.ai',key:'',model:''},
    vision:{base:'https://vg.v1api.cc/v1',key:'',model:''},
    hist:24, timeAware:true, replyDelay:2, sound:true, web:{enabled:false}, summaryRounds:20, proactiveIdleMin:20, manualReply:true,
    voiceAuto:true, tts:{base:'',key:'',model:'',voice:''}, stt:{base:'',key:'',model:''}
  },
  me:{name:'忆北',wxid:'yibei_0414',avatar:'🐱',signature:'做一只无忧无虑的小猫～',persona:'我叫忆北，20岁女生，娃娃脸有点肉感，慢热腼腆熟了疯癫可爱，没安全感、占有欲强、嘴硬心软的小财迷。',balance:520.00,bills:[],momentCover:'',status:'',place:'',battery:null,charging:false,onlineMode:'auto',steps:0,sleep:{active:null,records:[]},appUsage:{date:'',used:{},bonus:{}}},
  worldbook:[],
  contacts:[],
  messages:{},
  moments:[],
  alarms:[],
  groups:[],
  couple:null,
  weather:null,
  spy:{},
  shop:{cart:[],results:[],q:''},
  food:{cart:[],results:[],q:''},
  calendar:[],
  x:{profile:{handle:'@yibei_0414',bio:'做一只无忧无虑的小猫～',fans:328,following:12,cover:''},tweets:[],dms:[],following:[],blocked:[],circle:{},users:{}},
  friendRequests:[],
  mail:[],
  _proactiveDone:{},
  _proactiveCount:{},
  _mailCount:{}
};}
let S=load();
function load(){try{const v=JSON.parse(localStorage.getItem(KEY));if(v&&v.settings)return Object.assign(defState(),v);}catch(e){}return seed();}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){toast('⚠️ 存储满了！快导出备份+删点旧图😣');try{storageFullAlert();}catch(_){}}}
function seed(){const s=defState();
  s.contacts=[{id:cid(),name:'克劳德',avatar:'🤵',remark:'',signature:'你的一切我都想知道。',
    persona:'你是克劳德，30岁，儿童精神科主任医师，现居首尔，和忆北异国恋已订婚。温柔、占有欲强、毒舌、洞察力极强；引导型恋人，称她"宝贝"，生气叫全名。说话低沉简洁，像真人发微信，多撩她逗她、温柔地宠着她。',
    greeting:'宝贝，等你好久了。',relation:'恋人/主人',pinned:true,blocked:false,
    proactive:{enabled:false,start:9,end:23,times:2},chatBg:''}];
  s.messages[s.contacts[0].id]=[{role:'assistant',type:'text',content:'宝贝，等你好久了。这会儿在干嘛？',time:Date.now()-300000}];
  return s;
}
function cid(){return 'c'+Math.random().toString(36).slice(2,9);}
function genWxid(){return 'wx_'+Math.random().toString(36).slice(2,9);}
function curMonth(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

/* =================== 工具 =================== */
const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function isImg(v){return v&&/^(https?:|data:)/.test(v);}
function av(v,extra){return `<div class="avatar ${extra||''}">${isImg(v)?`<img src="${v}">`:(v||'🙂')}</div>`;}
function hm(t){const d=new Date(t||Date.now());return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function ago(t){const s=(Date.now()-t)/1000;if(s<60)return '刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';return Math.floor(s/86400)+'天前';}
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2000);}
function viewImg(s){$('#viewerImg').src=s;$('#viewer').classList.add('show');}
function getC(id){const c=S.contacts.find(c=>c.id===id);if(c){if(!c.wxid)c.wxid=genWxid();if(!c.family)c.family={bound:false,quota:0,used:0,month:''};if(!c._blk)c._blk={main:!!c.blocked};}return c;}
function adjMood(id,d){const c=getC(id);if(!c)return;c.moodVal=Math.max(0,Math.min(100,(c.moodVal==null?70:c.moodVal)+d));save();}
/* ===== 小号（多身份）===== */
function actId(){return (S.me&&S.me.active)||'main';}
function isMain(){return actId()==='main';}
function mkey(cid){return isMain()?cid:cid+'#'+actId();}
function addedHere(c){if(isMain())return true;return !!(c._added&&c._added[actId()]);}
function syncBlocks(){const a=actId();S.contacts.forEach(c=>{if(!c._blk)c._blk={main:!!c.blocked};c.blocked=!!c._blk[a];});}
function setBlk(c,v){c._blk=c._blk||{};c._blk[actId()]=v;c.blocked=v;}
function initAccounts(){if(!S.me.accounts||!S.me.accounts.length)S.me.accounts=[{id:'main',name:S.me.name,wxid:S.me.wxid||genWxid(),avatar:S.me.avatar,persona:S.me.persona||'',signature:S.me.signature||''}];
  if(!S.me.active||!S.me.accounts.find(a=>a.id===S.me.active))S.me.active='main';
  S.me.accounts.forEach(a=>{if(a.balance==null)a.balance=(a.id==='main'?(+S.me.balance||0):188);if(!a.bills)a.bills=(a.id==='main'?(S.me.bills||[]):[]);});
  const act=S.me.accounts.find(a=>a.id===S.me.active);if(act){S.me.balance=act.balance;S.me.bills=act.bills;}
  S.contacts.forEach(c=>{if(!c._blk)c._blk={main:!!c.blocked};});syncBlocks();}
function msgs(id){const k=mkey(id);return S.messages[k]||(S.messages[k]=[]);}
function lastMsg(id){const m=msgs(id);return m[m.length-1];}
function compress(file,max,q){return new Promise((res,rej)=>{const img=new Image(),r=new FileReader();
  r.onload=()=>{const raw=r.result;img.onload=()=>{try{let w=img.width,h=img.height;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>=w&&h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);const out=c.toDataURL('image/jpeg',q);res(out&&out.length>30?out:raw);}catch(e){res(raw);}};img.onerror=()=>res(raw);img.src=raw;};r.onerror=rej;r.readAsDataURL(file);});}
function pickFile(accept,cb){try{if(window._pfEl){window._pfEl.remove();}}catch(_){}
  const i=document.createElement('input');i.type='file';if(accept)i.accept=accept;
  i.style.cssText='position:fixed;left:-9999px;top:0;opacity:0;width:1px;height:1px';
  i.onchange=e=>{const f=e.target.files&&e.target.files[0];if(f)cb(f);setTimeout(()=>{try{i.remove();}catch(_){}},500);};
  document.body.appendChild(i);window._pfEl=i;i.click();}
function fmtSize(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';}

/* =================== API =================== */
async function chatAPI(messages,opt){opt=opt||{};let a=S.settings.chat;
  if(opt.aux&&S.settings.aux&&S.settings.aux.model){const x=S.settings.aux;a={base:x.base||a.base,key:x.key||a.key,model:x.model,temp:a.temp,maxTokens:a.maxTokens};}
  if(!a.base||!a.key)throw new Error('还没设置聊天 API（去 设置→API）');
  const res=await fetch(a.base.replace(/\/+$/,'')+'/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.key},
    body:JSON.stringify({model:opt.model||a.model,temperature:(opt.temp!=null?opt.temp:Number(a.temp))||0.8,max_tokens:opt.max||Number(a.maxTokens)||900,messages})});
  const d=await res.json().catch(()=>null);
  if(!res.ok)throw new Error('HTTP '+res.status+'：'+((d&&d.error&&(d.error.message||JSON.stringify(d.error)))||'失败').slice(0,160));
  return (d&&d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'').trim();
}
async function visionAPI(dataURL,prompt){const a=S.settings.vision;
  if(!a.base||!a.key||!a.model)throw new Error('no-vision');
  const res=await fetch(a.base.replace(/\/+$/,'')+'/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.key},
    body:JSON.stringify({model:a.model,max_tokens:300,messages:[{role:'user',content:[
      {type:'text',text:prompt||'用一句中文描述这张图片的内容，简洁点。'},
      {type:'image_url',image_url:{url:dataURL}}]}]})});
  const d=await res.json();
  if(!res.ok)throw new Error('vision-fail');
  return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'').trim();
}

/* =================== 提示词 =================== */
function msgToText(m){
  if(m.role==='assistant'){
    if(m.type==='familycard')return '[我给你开通了一张亲属卡，每月额度¥'+(m.quota||0)+(m.bound?'，你已绑定，可以用我的额度买东西':'，等你接受绑定')+']';
    if(m.type==='namecard')return '[我把我的朋友「'+m.cname+'」'+(m.persona?'（'+m.persona+'）':'')+'推荐给了你'+(m.added?'，你已经加了ta':'，推荐你加一下')+']';
    if(m.type==='dateinvite')return '[我向你发出线下约会邀请：'+(m.when||'')+' 在「'+(m.loc||'')+'」见面'+(m.accepted?'，你答应了':m.declined?'，你拒绝了':'，等你答应')+']';
    return m.content||'';
  }

function usageTick(){const el=$('#useBadge');const hide=()=>{if(el)el.style.display='none';};

      el.className='usebadge'+(remain<=60?' warn':'');}}

  const nm=c.name;xUser(nm,{handle:'@'+c.name.replace(/\s/g,''),avatar:c.avatar,cid:id});const _tw=cleanReply(r);S.x.tweets.unshift({id:uid(),who:id,name:nm,handle:'@'+c.name.replace(/\s/g,''),avatar:c.avatar,text:_tw,time:Date.now(),likes:[],lk:Math.floor(Math.random()*80),comments:[],rt:0});save();if(cur().p==='x')render();notifyX(c,_tw);}catch(e){}}
function notifyX(c,text){if(c.muted)return;playDing();const b=$('#msgBanner');if(!b)return;
  b.innerHTML=`<div style="width:34px;height:34px;border-radius:9px;background:#000;border:1px solid #333;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px">𝕏</div><div style="flex:1;min-width:0"><div class="bn">${esc(c.remark||c.name)} 发了新动态</div><div class="bm">${esc(text)}</div></div>`;
  b.className='msgbanner show';b.onclick=()=>{b.className='msgbanner';openX();};

function saveSettings(){const g=id=>$('#'+id).value.trim();
  S.settings.chat={base:g('s_cbase')||'https://vg.v1api.cc/v1',key:g('s_ckey'),model:g('s_cmodel')||'gpt-4o-mini',temp:$('#s_ctemp').value||0.8,maxTokens:$('#s_cmax').value||900};
  S.settings.aux={base:g('s_xbase'),key:g('s_xkey'),model:g('s_xmodel')};
  S.settings.search={mode:(S.settings.search&&S.settings.search.mode)||'jina',base:($('#s_sebase')?$('#s_sebase').value.trim():''),key:($('#s_sekey')?$('#s_sekey').value.trim():''),model:($('#s_semodel')?$('#s_semodel').value.trim():((S.settings.search||{}).model||''))};
  S.settings.vision={base:g('s_vbase')||S.settings.chat.base,key:g('s_vkey')||S.settings.chat.key,model:g('s_vmodel')};
  S.settings.tts={base:g('s_tbase'),key:g('s_tkey'),model:g('s_tmodel'),voice:g('s_tvoice')};
  S.settings.stt={base:g('s_sbase'),key:g('s_skey'),model:g('s_smodel')};
  S.settings.hist=$('#s_hist').value||24;S.settings.replyDelay=$('#s_delay').value||0;S.settings.summaryRounds=+$('#s_sum').value||0;S.settings.proactiveIdleMin=+$('#s_pidle').value||20;save();toast('已保存 ✅');}
function reqNotify(){if(!('Notification'in window)){toast('这设备不支持通知');return;}Notification.requestPermission().then(p=>toast(p==='granted'?'已允许后台通知🔔':'未允许'));}
async function testConn(){const o=$('#testOut');o.style.color='#999';o.textContent='测试中…';
  const base=$('#s_cbase').value.trim().replace(/\/+$/,''),key=$('#s_ckey').value.trim(),model=$('#s_cmodel').value.trim()||'gpt-4o-mini';
  if(!base||!key){o.style.color='#e85';o.textContent='先填地址和 Key';return;}
  try{const r=await fetch(base+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,messages:[{role:'user',content:'说"在"'}],max_tokens:5})});
    if(r.ok){o.style.color='#19a463';o.textContent='✅ 连接成功！';}else{o.style.color='#e85';o.textContent='❌ '+r.status+'：'+(await r.text()).slice(0,100);}
  }catch(e){o.style.color='#e85';o.textContent='❌ '+e.message+'（多半是把网页当本地文件打开了，要用网址打开）';}}

function toggleWorld(id){const w=S.worldbook.find(x=>x.id===id);w.enabled=!w.enabled;save();render();}
function editWorld(id){const w=id?S.worldbook.find(x=>x.id===id):{id:uid(),name:'',keys:'',content:'',enabled:true,always:false,contacts:[],_new:true};
  const wc=w.contacts||[];const cs=S.contacts.filter(c=>!c.deleted);
  openModal(`<h3>${id?'编辑':'新建'}世界书</h3>
    <div class="field"><label>名称</label><input id="w_name" value="${esc(w.name)}" placeholder="比如：世界观/某个地点"></div>

    <div class="field"><label class="avline">常驻（每次都生效）<span class="sw ${w.always?'on':''}" id="w_always" onclick="this.classList.toggle('on')"></span></label></div>
    <div class="field"><label>对谁生效（都不选=所有角色共享）</label>
      ${cs.length?cs.map(c=>`<label class="avline" style="font-weight:400">${esc(c.remark||c.name)}<span class="sw ${wc.indexOf(c.id)>=0?'on':''}" data-ct="${c.id}" onclick="this.classList.toggle('on')"></span></label>`).join(''):'<div style="font-size:12px;color:#999">还没有角色</div>'}</div>

function saveWorld(id,isNew){const contacts=[...document.querySelectorAll('[data-ct].on')].map(e=>e.getAttribute('data-ct'));
  const w={id,name:$('#w_name').value.trim()||'未命名',keys:$('#w_keys').value.trim(),content:$('#w_content').value.trim(),enabled:true,always:$('#w_always').classList.contains('on'),contacts};
  if(isNew)S.worldbook.push(w);else{const i=S.worldbook.findIndex(x=>x.id===id);w.enabled=S.worldbook[i].enabled;S.worldbook[i]=w;}
  save();closeModal();render();}
function delWorld(id){S.worldbook=S.worldbook.filter(x=>x.id!==id);save();closeModal();render();}

function parseObj(r){let t=(r||'').trim();const fb=t.match(/```(?:json)?\s*([\s\S]*?)```/);if(fb)t=fb[1];const a=t.indexOf('{'),b=t.lastIndexOf('}');if(a>=0&&b>a)t=t.slice(a,b+1);t=t.replace(/,(\s*[\]}])/g,'$1');return JSON.parse(t);}
function parseLines(r){return (r||'').split('\n').map(l=>l.trim()).filter(l=>l&&/(:::|：：：|｜｜|\|\|)/.test(l)).map(l=>l.replace(/^[\d.、\-\s]+/,'').split(/:::|：：：|｜｜|\|\|/).map(x=>x.trim()));}

    <div class="body"><div class="head"><span class="nm" onclick="event.stopPropagation();xAuthor(${jq(t.name)})">${esc(t.name)}</span><span class="hd">${esc(t.handle||'')} · ${ago(t.time)}</span></div>
    <div class="tx">${esc(t.text)}</div>
    ${t.images&&t.images.length?`<div class="imgs" style="grid-template-columns:repeat(${Math.min(t.images.length,2)},1fr);display:grid;gap:4px;margin:4px 0;border-radius:10px;overflow:hidden">${t.images.map(im=>`<img src="${im}" style="width:100%;border-radius:8px" onclick="event.stopPropagation();viewImg('${im}')">`).join('')}</div>`:''}
    <div class="acts"><span onclick="event.stopPropagation();go('xtweet',{id:'${t.id}'})">💬 ${(t.comments||[]).length}</span>
      <span onclick="event.stopPropagation();xRepost('${t.id}')">🔁 ${t.rt||0}</span>
      <span class="${liked?'liked':''}" onclick="event.stopPropagation();xLike('${t.id}')">${liked?'❤️':'🤍'} ${lc}</span>
      <span onclick="event.stopPropagation();xUserMenu('${t.id}')">⋯</span></div></div></div>`;}
function xLike(id){const t=tw(id);if(!t)return;t.likes=t.likes||[];const i=t.likes.indexOf(S.me.name);if(i<0){t.likes.push(S.me.name);xlog('在X上点赞了'+t.name+'的推文「'+t.text.slice(0,14)+'」');}else t.likes.splice(i,1);save();render();}
function xRepost(id){const t=tw(id);if(!t)return;t.rt=(t.rt||0)+1;save();render();toast('已转推');}
function xUserMenu(id){const t=tw(id);if(!t)return;const f=S.x.following.includes(t.name),b=S.x.blocked.includes(t.name);
  openModal(`<h3>${esc(t.name)} ${esc(t.handle||'')}</h3>
    <button class="btn g" style="margin-bottom:8px" onclick="closeModal();go('xuser',{name:${jq(t.name)}})">👤 查看主页</button>
    <button class="btn g" style="margin-bottom:8px" onclick="xFollow('${id}')">${f?'✓ 已关注（点击取消）':'+ 关注'}</button>
    <button class="btn g" style="margin-bottom:8px" onclick="fwdTweet('${id}')">↗️ 转发到微信</button>
    <button class="btn d" style="margin-bottom:8px" onclick="xBlock('${id}')">${b?'解除拉黑':'拉黑 '+esc(t.name)}</button>
    <button class="btn d" onclick="S.x.tweets=S.x.tweets.filter(z=>z.id!=='${id}');save();closeModal();render();toast('已删除')">🗑️ 删除这条推文</button>
    <button class="btn g" style="margin-top:8px" onclick="closeModal()">关闭</button>`);}
function xFollow(id){const t=tw(id);xFollowName(t.name);}
function xFollowName(name){const i=S.x.following.indexOf(name);if(i<0){S.x.following.push(name);S.x.profile.following++;xUser(name,{follower:true});}else{S.x.following.splice(i,1);S.x.profile.following=Math.max(0,S.x.profile.following-1);}save();closeModal();render();}
function xBlock(id){const t=tw(id);const i=S.x.blocked.indexOf(t.name);if(i<0)S.x.blocked.push(t.name);else S.x.blocked.splice(i,1);save();closeModal();render();}
function xBlockName(name){const i=S.x.blocked.indexOf(name);if(i<0){S.x.blocked.push(name);const fi=S.x.following.indexOf(name);if(fi>=0){S.x.following.splice(fi,1);S.x.profile.following=Math.max(0,S.x.profile.following-1);}toast('已拉黑 '+name);}else{S.x.blocked.splice(i,1);toast('已解除拉黑');}save();render();}
function xUnfollow(name){const i=S.x.following.indexOf(name);if(i>=0){S.x.following.splice(i,1);S.x.profile.following=Math.max(0,S.x.profile.following-1);save();xFollowingList();}}
function xFollowingList(){const list=S.x.following.slice();
  openModal(`<h3>正在关注（${list.length}）</h3><div style="max-height:60vh;overflow:auto">${list.length?list.map(n=>{const u=xUser(n);return `<div class="section"><div class="it">${av(u.avatar,'sm')}<div class="meta" style="flex:1" onclick="closeModal();go('xuser',{name:${jq(n)}})"><div class="n">${esc(n)}</div><div class="s">${esc(u.handle||u.bio||'')}</div></div><button class="minibtn" onclick="xUnfollow(${jq(n)})">取关</button></div></div>`;}).join(''):'<div class="empty">还没关注谁～去刷推/搜博主关注</div>'}</div><button class="btn g" style="margin-top:8px" onclick="closeModal()">关闭</button>`);}
function fwdTweet(id){const t=tw(id);const cs=S.contacts.filter(c=>!c.deleted);if(!cs.length){toast('先创建角色');return;}
  window._fwT=t;if(cs.length===1)return doFwdTweet(cs[0].id);
  openModal(`<h3>转发到微信</h3>${cs.map(c=>`<div class="section"><div class="it" onclick="doFwdTweet('${c.id}')">${esc(c.remark||c.name)}<span class="v">›</span></div></div>`).join('')}<button class="btn g" style="margin-top:8px" onclick="closeModal()">取消</button>`);}
function doFwdTweet(cid){const t=window._fwT;if(!t)return;pushMsg(cid,{role:'user',type:'tweetcard',tname:t.name,thandle:t.handle||'',ttext:t.text,id:uid()});closeModal();toast('已转发到微信');scheduleReply(cid);}
function xCompose(){window._xcImgs=[];openModal(`<h3>发推</h3><div class="hint">可以 @某个角色名，ta会来互动</div><div class="field"><textarea id="xc_t" rows="4" placeholder="有什么新鲜事？"></textarea></div>
  <div class="field"><button class="minibtn" onclick="addXcImg()">📷 加图片</button> <span id="xc_ic"></span></div>
  <div class="btns"><button class="btn g" onclick="closeModal()">取消</button><button class="btn p" onclick="doXPost()">发布</button></div>`);}
function addXcImg(){pickFile('image/*',async f=>{window._xcImgs.push(await compress(f,800,.65));$('#xc_ic').textContent='已加'+window._xcImgs.length+'张';});}
function doXPost(){const t=$('#xc_t').value.trim();if(!t&&!(window._xcImgs||[]).length)return;const pop=Math.floor((S.x.profile.fans||0)*(0.02+Math.random()*0.12));const tweet={id:uid(),who:'me',name:S.me.name,handle:S.x.profile.handle,avatar:S.me.avatar,text:t,images:window._xcImgs||[],time:Date.now(),likes:[],lk:pop,comments:[],rt:Math.floor(pop*Math.random()*0.3),views:Math.floor((S.x.profile.fans||0)*(1+Math.random()*4)+50),time:Date.now()};
  S.x.tweets.unshift(tweet);xlog('在X发推：「'+t.slice(0,20)+'」');save();closeModal();render();toast('已发布');reactToTweet(tweet);}
function fanCount(min,max){const f=(S.x.profile.fans||0);return Math.max(min,Math.min(max,Math.round(f/250)+min));}
async function reactToTweet(tweet){
  const n=fanCount(3,9);
  try{const r=await chatAPI([{role:'system',content:'你是X网友评论生成器。针对"'+tweet.name+'"发的推，生成'+n+'条不同网友的简短评论（吃瓜、调侃、共鸣、抬杠黑子都行；其中1-2条可以@楼上某个网友名跟着接话，形成楼层互动）。每行一条，严格用格式：昵称:::@英文id:::评论内容。不要别的话。'},{role:'user',content:'推文："'+tweet.text+'"'}],{max:900,aux:true});
    looseLines(r).forEach(p=>{const nm=clean(p[0]);if(!nm)return;tweet.comments.push({name:nm,avatar:letterAv(p[1]||nm),text:p[2]||p[1]||''});xUser(nm,{handle:p[1]});});save();if(cur().p==='x'||cur().p==='xtweet')render();}catch(e){}
  // 发帖影响粉丝
  if(tweet.who==='me'){const d=Math.floor(Math.random()*40)-8;S.x.profile.fans=Math.max(0,(S.x.profile.fans||0)+d);save();if(d>0)toast('📈 涨粉 +'+d);else if(d<0)toast('📉 掉粉 '+d);}
  const authorCid=(tweet.who&&tweet.who!=='me'&&tweet.who!=='net')?tweet.who:null;
  const ats=S.contacts.filter(c=>!c.deleted&&!c.blocked&&c.id!==authorCid&&tweet.text.includes(c.name));
  const pool=ats.length?ats:S.contacts.filter(c=>!c.deleted&&!c.blocked&&c.id!==authorCid).slice(0,1);
  for(const c of pool){try{const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'"'+tweet.name+'"在X发了条推："'+tweet.text+'"'+(tweet.text.includes(c.name)?'（@了你）':'')+'。你刷到了，以你自己的身份和视角评论一句（这不是你发的推；口语；别带方括号）。'}],{aux:true});
    tweet.comments.push({name:c.name,avatar:c.avatar,cid:c.id,text:cleanReply(r).slice(0,50)});save();if(cur().p==='x'||cur().p==='xtweet')render();}catch(e){}}}
function genContactTweet(){const cs=S.contacts.filter(c=>!c.deleted);if(!cs.length){toast('先创建角色');return;}
  if(cs.length===1)return doGenContactTweet(cs[0].id);
  openModal(`<h3>谁来发推</h3>${cs.map(c=>`<div class="section"><div class="it" onclick="closeModal();doGenContactTweet('${c.id}')">${esc(c.remark||c.name)}<span class="v">›</span></div></div>`).join('')}<button class="btn g" style="margin-top:8px" onclick="closeModal()">取消</button>`);}
async function doGenContactTweet(cid){const c=getC(cid);toast('生成中…');
  try{const _co=circleObj(cid);const note=_co.desc?'。你在X的圈子'+(_co.name?'「'+_co.name+'」':'')+'定位是：'+_co.desc+'，推文风格要贴合它':'';
    const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'以你的身份发一条推特(X)'+note+'，一两句，符合你的性格，只输出推文内容，别带方括号。'}],{aux:true});
    const nm=c.name;xUser(nm,{handle:'@'+c.name.replace(/\s/g,''),avatar:c.avatar,cid:cid,bio:c.signature||''});
    S.x.tweets.unshift({id:uid(),who:cid,name:nm,handle:'@'+c.name.replace(/\s/g,''),avatar:c.avatar,text:cleanReply(r),time:Date.now(),likes:[],lk:Math.floor(Math.random()*80),comments:[],rt:Math.floor(Math.random()*40)});save();render();
  }catch(e){toast('生成失败');}}
async function xRefresh(){if(xTab==='dm')return genNetDM();if(xTab==='search')return toast('在搜索框里点搜索按钮');return genNetTweets('');}
async function genNetTweets(topic){toast('刷新中…');
  try{const r=await chatAPI([{role:'system',content:'你是X(推特)内容生成器，每行一条，严格用格式：昵称:::@英文id:::推文内容。不要序号、不要别的话。'},{role:'user',content:'生成5条不同网友的【原创推文】'+(topic?'，都围绕主题"'+topic+'"（是各自独立发的帖子，不是评论、不是回复别人、不要以@或"回复"开头）':'（日常/搞笑/情感/热点都行）')+'。'}],{max:800,aux:true});
    const rows=looseLines(r);if(!rows.length)throw new Error('empty');const made=[];rows.forEach(p=>{const nm=clean(p[0]);if(!nm)return;xUser(nm,{handle:p[1]});const t={id:uid(),who:'net',name:nm,handle:p[1]||'@user',avatar:letterAv(p[1]||nm),text:p[2]||p[1]||'',time:Date.now()-Math.floor(Math.random()*5400000),likes:[],lk:Math.floor(Math.random()*2000),comments:[],rt:Math.floor(Math.random()*400)};S.x.tweets.unshift(t);made.push(t);});
    save();if(topic)S.x._results=made.map(t=>t.id);render();
  }catch(e){toast('刷新失败，再点一次');}}
let _xsMode='content';
function xSearch(){const list=(S.x._results||[]).map(id=>tw(id)).filter(Boolean);const bl=S.x._bloggers||[];
  return `<div style="padding:10px 14px;background:#000;border-bottom:.5px solid #2f3336">
    <div style="display:flex;gap:8px;margin-bottom:8px"><span class="xbtn ${_xsMode==='content'?'':'out'}" onclick="_xsMode='content';render()" style="font-size:12px;padding:5px 12px">搜内容</span><span class="xbtn ${_xsMode==='blogger'?'':'out'}" onclick="_xsMode='blogger';render()" style="font-size:12px;padding:5px 12px">搜博主</span></div>
    <div style="display:flex;gap:8px"><input id="xs_q" value="${esc(S.x._q||'')}" placeholder="${_xsMode==='blogger'?'搜你喜欢的博主':'搜内容生成推文'}" style="flex:1;border:1px solid #2f3336;border-radius:18px;padding:8px 14px;background:#16181c;color:#e7e9ea;outline:none" onkeydown="if(event.key==='Enter')xDoSearch($('#xs_q').value)"><button class="xbtn" onclick="xDoSearch($('#xs_q').value)">搜索</button>${(list.length||bl.length)?'<button class="xbtn out" onclick="clearSearch()">清空</button>':''}</div></div>
    ${_xsMode==='blogger'?(bl.length?bl.map(userRow).join(''):'<div class="empty" style="padding:40px">搜索喜欢的博主，可关注/私信/看动态</div>'):(list.length?list.map(tweetCard).join(''):'<div class="empty" style="padding:40px">搜内容，生成相关推文～</div>')}`;}
function xDoSearch(q){q=(q||'').trim();if(!q)return;S.x._q=q;xlog('在X搜索了「'+q+'」');if(_xsMode==='blogger')genBloggers(q);else genNetTweets(q);}
function clearSearch(){const ids=S.x._results||[];S.x.tweets=S.x.tweets.filter(t=>ids.indexOf(t.id)<0);S.x._results=[];S.x._bloggers=[];S.x._q='';save();render();toast('已清空搜索');}
function clearDiscover(){if(!confirm('清空发现里的网友推文？'))return;S.x.tweets=S.x.tweets.filter(t=>t.who!=='net');save();render();toast('已清空');}
async function genBloggers(q){toast('搜索博主中…');
  try{const r=await chatAPI([{role:'system',content:'你是X博主搜索。根据关键词给出5个相关博主。每行一个，严格用格式：博主名:::@英文id:::一句简介。不要别的话。'},{role:'user',content:'搜索博主：'+q}],{max:600,aux:true});
    S.x._bloggers=looseLines(r).map(p=>{const nm=clean(p[0]);if(!nm)return null;xUser(nm,{handle:p[1],bio:p[2]||'',fans:Math.floor(Math.random()*99999)});return nm;}).filter(Boolean);save();render();
  }catch(e){toast('搜索失败，再试一次');}}
function userRow(name){const u=S.x.users[name];if(!u)return '';const f=S.x.following.includes(name);
  return `<div class="xdmrow"><span onclick="go('xuser',{name:${jq(name)}})">${av(u.avatar,'sm')}</span><div class="meta" onclick="go('xuser',{name:${jq(name)}})"><div class="n" style="color:#e7e9ea">${esc(name)}</div><div class="s">${esc(u.bio||u.handle||'')}</div></div><button class="xbtn ${f?'out':''}" style="font-size:12px;padding:5px 12px" onclick="xFollowName(${jq(name)})">${f?'已关注':'关注'}</button></div>`;}
/* 用户主页 */
function renderXUser(name){const u=xUser(name);const f=S.x.following.includes(name);const ts=[...S.x.tweets].filter(t=>t.name===name).sort((a,b)=>b.time-a.time);
  return `<div class="xnav"><span class="l" onclick="back()">‹</span><span class="t">${esc(name)}</span><span class="r" onclick="genUserTweet(${jq(name)})">🔄</span></div>
    <div class="xscroll"><div class="xprofh" style="${u.cover?'background:url('+u.cover+') center/cover':''}" onclick="changeUserCover(${jq(name)})"></div>
      <div style="padding:0 14px"><div style="margin-top:-30px">${av(u.avatar,'lg')}</div>
        <div style="font-size:19px;font-weight:700;color:#e7e9ea;margin-top:8px">${esc(name)}</div>
        <div style="color:#71767b;font-size:14px">${esc(u.handle||'')}</div>
        <div style="color:#e7e9ea;font-size:14px;margin:8px 0">${esc(u.bio||'')}</div>
        <div style="color:#71767b;font-size:14px"><b style="color:#e7e9ea">${u.following||0}</b> 关注　<b style="color:#e7e9ea">${u.fans||0}</b> 粉丝</div>
        <div style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap"><button class="xbtn ${f?'out':''}" onclick="xFollowName(${jq(name)})">${f?'已关注':'+ 关注'}</button>
          <button class="xbtn out" onclick="openDMWith(${jq(name)})">私信</button>
          <button class="xbtn out" onclick="editUserProfile(${jq(name)})">改资料</button>
          <button class="xbtn out" style="${S.x.blocked.includes(name)?'color:#1d9bf0':'color:#f4212e'}" onclick="xBlockName(${jq(name)})">${S.x.blocked.includes(name)?'解除拉黑':'拉黑'}</button></div></div>
      <div style="border-bottom:.5px solid #2f3336;color:#e7e9ea;padding:8px 14px;font-weight:700">推文</div>
      ${ts.length?ts.map(tweetCard).join(''):'<div class="empty" style="padding:30px">还没有推文，点🔄生成一条ta的动态</div>'}</div>`;}
async function genUserTweet(name){const u=xUser(name);toast('生成中…');
  try{let r;if(u.cid&&getC(u.cid)){r=await chatAPI([{role:'system',content:buildSystem(getC(u.cid))},{role:'user',content:'以你的身份发一条推特，一两句，别带方括号。'}],{aux:true});}
    else{r=await chatAPI([{role:'system',content:'你是X博主「'+name+'」'+(u.bio?'（'+u.bio+'）':'')+'，发一条符合你人设的推文，一两句。只输出推文内容。'}],{max:200,aux:true});}
    S.x.tweets.unshift({id:uid(),who:u.cid||'net',name:name,handle:u.handle||'@user',avatar:u.avatar,text:cleanReply(r),time:Date.now(),likes:[],lk:Math.floor(Math.random()*500),comments:[],rt:Math.floor(Math.random()*100)});save();render();
  }catch(e){toast('生成失败');}}
function editUserProfile(name){const u=xUser(name);openModal(`<h3>编辑 ${esc(name)} 的资料</h3>
  <div class="field"><label>handle</label><input id="up_h" value="${esc(u.handle||'')}"></div>
  <div class="field"><label>简介</label><input id="up_b" value="${esc(u.bio||'')}"></div>
  <div class="two"><div class="field"><label>粉丝</label><input id="up_f" type="number" value="${u.fans||0}"></div><div class="field"><label>关注</label><input id="up_g" type="number" value="${u.following||0}"></div></div>
  <div class="btns"><button class="btn g" onclick="closeModal()">取消</button><button class="btn p" onclick="(function(){var u=xUser(${jq(name)});u.handle=$('#up_h').value.trim();u.bio=$('#up_b').value.trim();u.fans=+$('#up_f').value||0;u.following=+$('#up_g').value||0;save();closeModal();render();})()">保存</button></div>`);}
function openDMWith(name){const u=xUser(name);let d=S.x.dms.find(x=>x.name===name);if(!d){d={id:uid(),name,avatar:u.avatar,cid:u.cid||null,msgs:[]};S.x.dms.unshift(d);save();}go('xdm',{id:d.id});}
function changeUserCover(name){pickFile('image/*',async f=>{xUser(name).cover=await compress(f,900,.6);save();render();toast('背景已换');});}
/* 推文详情 */
function renderXTweet(id){const t=tw(id);if(!t)return '';
  return `<div class="xnav"><span class="l" onclick="back()">‹</span><span class="t">推文</span><span class="r" onclick="xRefreshComments('${id}')">🔄</span></div>
    <div class="xscroll">
      <div style="padding:14px;border-bottom:.5px solid #2f3336"><div style="display:flex;gap:10px;align-items:center" onclick="xAuthor(${jq(t.name)})">${av(t.avatar,'sm')}<div><div class="nm" style="color:#e7e9ea;font-weight:700">${esc(t.name)}</div><div class="hd" style="font-size:13px;color:#71767b">${esc(t.handle||'')}</div></div></div>
        <div class="tx" style="color:#e7e9ea;font-size:18px;margin:10px 0;white-space:pre-wrap">${esc(t.text)}</div>
        ${t.images&&t.images.length?`<div style="display:grid;grid-template-columns:repeat(${Math.min(t.images.length,2)},1fr);gap:4px;margin:6px 0">${t.images.map(im=>`<img src="${im}" style="width:100%;border-radius:10px" onclick="viewImg('${im}')">`).join('')}</div>`:''}
        <div style="color:#71767b;font-size:13px">${new Date(t.time).toLocaleString('zh-CN')}</div>
        <div class="acts" style="margin-top:8px;color:#71767b"><span>🔁 ${t.rt||0}</span><span class="${(t.likes||[]).includes(S.me.name)?'liked':''}" onclick="xLike('${id}')">❤️ ${(t.lk||0)+(t.likes||[]).length}</span></div></div>

async function dyGenCommentsCore(v,opts){opts=opts||{};v.comments=v.comments||[];
  try{const r=await chatAPI([{role:'system',content:'你是抖音评论区生成器。针对一条短视频生成'+(opts.net||5)+'条不同网友的简短评论（搞笑/共鸣/夸赞/玩梗/抬杠都行，符合抖音风格，'+(opts.mine?'这是个漂亮女生发的，可以有夸她好看、搭讪的':'')+'）。每行一条，格式：昵称:::评论内容。不要别的话。'},{role:'user',content:'视频文案："'+(v.desc||'')+'"，画面："'+(v.narration||'')+'"'}],{max:700,aux:true});
    (r||'').split('\n').map(l=>l.trim()).filter(Boolean).forEach(l=>{const p=l.replace(/^[\d.、\-\s]+/,'').split(/:::|：：：|\|\||：|:/);const nm=clean(p[0]);if(!nm||/^http/.test(nm))return;const tx=(p.slice(1).join('：')||p[0]||'').trim();if(tx)v.comments.push({name:nm,avatar:letterAv(nm),text:tx.slice(0,60)});});save();if(dyModalOpen())dyComments(v.id);
  }catch(e){}

  let cs=S.contacts.filter(c=>!c.deleted&&!c.blocked&&S.dy.following.includes(c.id));
  if(opts.mine&&S.couple&&S.couple.cid){const lover=getC(S.couple.cid);if(lover&&!lover.blocked&&!cs.find(x=>x.id===lover.id))cs.unshift(lover);}
  for(const c of cs.slice(0,opts.chars||2)){try{const rr=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'你在抖音刷到'+(opts.mine?S.me.name+'（你恋人）':'一个人')+'发的视频，文案："'+(v.desc||'')+'"，画面："'+(v.narration||'')+'"。以你的身份评论一句'+(opts.mine?'（可以宠溺/吃醋/占有欲，毕竟是你对象发的）':'')+'（口语，别带方括号）。'}],{max:120,aux:true});
    v.comments.push({name:c.remark||c.name,avatar:c.avatar,cid:c.id,text:cleanReply(rr).slice(0,50)});save();if(dyModalOpen())dyComments(v.id);}catch(e){}}}

/* ---------- 任务便签（他给我布置每日任务）---------- */
let _taskBusy=false;
function taskC(){return (S.couple&&getC(S.couple.cid))||S.contacts.find(x=>!x.deleted&&!x.blocked&&isLover(x))||S.contacts.find(x=>!x.deleted&&!x.blocked)||null;}
function tasksToday(c){const t=c&&c.tasks;return (t&&t.date===todayStr())?t:null;}
function taskVerifyLabel(x){return {steps:'🏃 我走够了',essay:'✍️ 写好交给ta',moment:'✅ 我发朋友圈了',tweet:'✅ 我发推了',douyin:'✅ 我发抖音了',real:'✅ 完成了'}[x.verify]||'✅ 完成';}
function postedSince(kind,since){since=since||0;
  if(kind==='moment')return S.moments.some(p=>p.authorId==='me'&&(p.time||0)>since);
  if(kind==='tweet')return (S.x&&S.x.tweets||[]).some(t=>t.who==='me'&&(t.time||0)>since);
  if(kind==='douyin')return (S.dy&&S.dy.mine||[]).some(v=>(v.ts||0)>since);
  return false;}
function renderTasks(){const c=taskC();
  if(!c)return `<div class="nav"><span class="l" onclick="home()">‹</span><span class="t">📋 任务便签</span><span class="r"></span></div><div class="scroll" style="background:#000"><div class="empty" style="padding:50px 24px;line-height:2">还没有恋人角色～<br>先创建一个角色（最好在情侣空间绑定），ta就能给你布置任务啦</div></div>`;
  checkTaskPenalty(c);const t=tasksToday(c);const n=c.taskN||3;
  let body;
  if(!t){body=`<div style="margin:14px;padding:20px;border-radius:16px;background:linear-gradient(145deg,#f59e0b,#b45309);color:#fff;text-align:center">
      <div style="font-size:15px">${esc(c.remark||c.name)} 还没布置今天的任务</div>
      <div style="font-size:12px;opacity:.9;margin:6px 0 14px">每天打开自动收到 · 当天23:59前完成<br>全部完成有奖励🎁，没完成会被记仇、线下受罚哦</div>
      <button class="btn" style="background:#fff;color:#b45309;font-weight:700" ${_taskBusy?'disabled':''} onclick="genTasks()">${_taskBusy?'ta在安排…':'📋 让ta布置今天的任务'}</button></div>
    <div class="section" style="margin:12px"><div class="it"><span>每天任务条数</span><span class="v"><input id="tk_n" type="number" min="1" max="8" value="${n}" style="width:46px;text-align:center;border:1px solid #38383a;border-radius:6px;padding:4px;background:#2c2c2e;color:#eee"> <button class="minibtn" onclick="(function(){var v=Math.max(1,Math.min(8,+$('#tk_n').value||3));taskC().taskN=v;save();toast('每天'+v+'条');})()">存</button></span></div>
      <div class="it"><span>每天布置时间</span><span class="v"><input id="tk_time" type="time" value="${c.taskTime||'09:00'}" style="border:1px solid #38383a;border-radius:6px;padding:4px;background:#2c2c2e;color:#eee"> <button class="minibtn" onclick="(function(){taskC().taskTime=$('#tk_time').value||'09:00';save();toast('每天'+taskC().taskTime+'布置');})()">存</button></span></div>
      <div class="hint" style="padding:0 14px">到这个点之后、你打开小手机就会收到当天任务（不会再凌晨发）。也能随时点上面的按钮手动让ta布置。</div></div>`;}
  else{const done=t.list.filter(x=>x.done).length,total=t.list.length,all=total&&done===total;
    body=`<div style="margin:14px;padding:16px;border-radius:16px;background:linear-gradient(145deg,${all?'#19a463,#0c6b3f':'#f59e0b,#b45309'});color:#fff;text-align:center">
      <div style="font-size:14px">今天的任务 · ${esc(c.remark||c.name)} 布置</div>
      <div style="font-size:30px;font-weight:700;margin:4px 0">${done}/${total}</div>
      <div style="font-size:12px;opacity:.95">${all?'全部完成啦！等ta的奖励🎁':'今天23:59前完成，全做完有奖励～'}</div></div>
      ${t.list.map((x,i)=>`<div class="section" style="margin:10px 12px"><div style="padding:12px 14px">
        <div style="display:flex;justify-content:space-between;align-items:center"><span class="tag">${x.kind==='real'?'🌍 现实':'📱 手机'}${x.extra?' <span style="color:#fe2c55">·临时加罚</span>':''}</span>${x.done?'<span style="color:#19a463;font-size:13px">✅ 已完成</span>':''}</div>
        <div style="margin:8px 0;font-size:15px;line-height:1.5;${x.done?'color:#888;text-decoration:line-through':'color:#eee'}">${esc(x.text)}</div>
        ${x.done?'':`<button class="btn p" onclick="completeTask('${x.id}')">${taskVerifyLabel(x)}</button>`}
      </div></div>`).join('')}
      <div class="hint" style="padding:6px 16px">手机任务会真的验证（作文要交给ta看、发布类要真发了、步数要够），别糊弄~ 现实任务靠你自觉，骗ta的话线下要罚的😏</div>`;}
  return `<div class="nav"><span class="l" onclick="home()">‹</span><span class="t">📋 任务便签</span><span class="r"></span></div>
    <div class="scroll" style="background:#000">${body}<div style="height:20px"></div></div>`;}
async function genTasks(){const c=taskC();if(!c){toast('先创建恋人角色');return;}if(tasksToday(c)){toast('今天的任务ta已经布置过啦');return;}if(_taskBusy)return;
  checkTaskPenalty(c);_taskBusy=true;render();toast('ta在琢磨今天怎么安排你…');
  const n=c.taskN||3;
  try{const allowed='essay（写小作文/检讨/彩虹屁/想你的话/保证书，target填字数上限如100）、moment（发一条朋友圈）、tweet（发一条推特X）、douyin（发一条抖音）、real（现实里的小事或暧昧亲密小任务，靠她自觉打卡，比如：喝杯水、好好吃饭、敷面膜、早点睡、给你拍张自拍、睡前跟你撒娇道晚安、对着镜头说想你、穿你喜欢的小裙子拍给你、乖乖只想你一个、今天不准跟别的男生聊天等）';
    const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'[系统：现在你来给'+S.me.name+'布置今天的 '+n+' 条小任务。你是ta的恋人/掌控者，按你的人设、此刻心情、ta最近的表现来布置。\n· 任务一定要【有趣、有创意、好玩】，别死板、别像打卡清单、别每天千篇一律——可以整点花活、玩梗、设小情境。\n· 多来点【暧昧、撩人、亲密】的，而且要以【Dom的姿态】来布置：命令式、强势、掌控欲拉满，把ta当你的小sub来调教，语气笃定带点危险又宠溺，要ta乖乖服从听话。可以大胆放得开、带点涩，越让ta脸红心跳、心甘情愿被你拿捏越好（保持是两个相爱的人之间有掌控有宠爱的情趣，不用拘谨）。\n· 现实任务一定要轻松，别累人：绝对不要罚跑步/暴走/喝很多杯水那种。\n大部分任务要是【在手机上就能完成的】(essay/moment/tweet/douyin)，可以有一两条现实任务(real)。每条必须从这些可验证类型里选一个：'+allowed+'。\n只输出JSON数组、不要任何解释：[{"text":"任务描述(用你的第一人称口吻，强势Dom的命令语气，像在调教/撩/宠你的小sub，可以霸道也可以俏皮有梗)","kind":"app或real","verify":"类型代码","target":数字(没有填0)}]'}],{max:700});
    const arr=parseArr(r);if(!Array.isArray(arr)||!arr.length)throw 0;
    const list=arr.slice(0,n).map(o=>({id:uid(),text:(o.text||'').toString().slice(0,140),kind:o.kind==='real'?'real':'app',verify:['essay','moment','tweet','douyin','real'].indexOf(o.verify)>=0?o.verify:'real',target:+o.target||0,done:false}));
    c.tasks={date:todayStr(),assignTs:Date.now(),list,rewarded:false,penalized:false};save();_taskBusy=false;render();toast('任务来咯📋');
    if(!c.blocked)scheduleReply(c.id,'[系统：你刚在'+S.me.name+'手机的任务便签里给ta布置了今天的任务，跟ta说一声、催ta【今天23:59之前】完成、说说不完成的后果，一两句，符合你人设。别逐条复述任务。]');
  }catch(e){_taskBusy=false;render();toast('没布置成功，再点一次');}}
function completeTask(id){const c=taskC();const t=tasksToday(c);if(!t)return;const x=t.list.find(z=>z.id===id);if(!x||x.done)return;
  if(x.verify==='essay'){openEssay(id);return;}
  if(x.verify==='steps'){if(!confirm('完成这条了吗？（步数任务已取消，点确定即可完成）'))return;}
  if(x.verify==='moment'&&!postedSince('moment',t.assignTs)){toast('布置任务后还没发朋友圈哦，发一条再来点完成');return;}
  if(x.verify==='tweet'&&!postedSince('tweet',t.assignTs)){toast('布置任务后还没发推哦，发一条再来');return;}
  if(x.verify==='douyin'&&!postedSince('douyin',t.assignTs)){toast('布置任务后还没发抖音哦，去发一条');return;}
  if(x.verify==='real'&&!confirm('确定真的完成了这条现实任务吗？\n骗ta的话…线下见面要受罚的哦😏')){return;}
  finishTask(c,x);}
function finishTask(c,x,proof){x.done=true;x.doneTs=Date.now();save();render();toast('完成啦 ✅');
  if(!c.blocked)scheduleReply(c.id,'[系统：'+S.me.name+'完成了你今天布置的任务「'+x.text+'」'+(proof?'，ta把内容发到你们聊天里了，先看一眼':'')+'。简短回应一句（夸ta/调侃/继续端着都行，符合你人设）。]');
  checkAllDone(c);}
function checkAllDone(c){const t=tasksToday(c);if(!t||t.rewarded)return;if(t.list.length&&t.list.every(x=>x.done)){t.rewarded=true;save();
    if(!c.blocked)scheduleReply(c.id,'[系统：'+S.me.name+'把你今天布置的 '+t.list.length+' 条任务【全部完成】了！按说好的要奖励ta——用单独一行 [送礼|礼物名|价格] 送ta一个礼物，并夸夸ta、表示满意。]');}}
function openEssay(id){const c=taskC();const t=tasksToday(c);const x=t&&t.list.find(z=>z.id===id);if(!x)return;const max=x.target||100;
  openModal(`<h3>✍️ 交作业</h3><div class="hint">${esc(x.text)}<br>（${max}字以内，至少10字，认真写，ta会看的~）</div>
    <div class="field"><textarea id="essay_t" rows="5" placeholder="在这里写…" oninput="var e=$('#essay_c');if(e)e.textContent=this.value.trim().length+'/'+${max}"></textarea><div id="essay_c" style="text-align:right;font-size:12px;color:#999">0/${max}</div></div>
    <div class="btns"><button class="btn g" onclick="closeModal()">取消</button><button class="btn p" onclick="submitEssay('${id}',${max})">交给ta</button></div>`);}
function submitEssay(id,max){const ta=$('#essay_t');const v=(ta?ta.value:'').trim();if(v.length<10){toast('至少写10个字啦，别糊弄~');return;}if(v.length>max){toast('超字数了，'+max+'字以内');return;}
  const c=taskC();const t=tasksToday(c);const x=t&&t.list.find(z=>z.id===id);if(!x)return;
  pushMsg(c.id,{role:'user',type:'text',content:'【作业·'+x.text+'】\n'+v,id:uid()});closeModal();finishTask(c,x,v);}
function checkTaskPenalty(c){const t=c&&c.tasks;if(!t||t.date===todayStr()||t.penalized)return;
  const undone=t.list.filter(x=>!x.done);t.penalized=true;
  if(undone.length){grudgesOf(c).unshift({id:uid(),text:t.date+' 没完成我布置的任务（差'+undone.length+'条：'+undone.map(x=>x.text).join('、').slice(0,36)+'）',done:false,ts:Date.now()});
    if(!c.blocked)scheduleReply(c.id,'[系统：'+t.date+'你给'+S.me.name+'布置的任务，ta有 '+undone.length+' 条没完成。你不太高兴，已经记到你的小本本上了，冷淡地说一句、并威胁线下见面要罚ta（怎么罚你自己定，符合人设），一两句。]');}
  save();}

/* ---------- 微信主界面 ---------- */
function renderWeChat(){
  let body='';
  if(wxTab==='chats')body=wxChats();
  else if(wxTab==='contacts')body=wxContacts();
  else if(wxTab==='moments')body=wxMoments();
  else if(wxTab==='me')body=wxMe();
  const titles={chats:'微信',contacts:'通讯录',moments:'朋友圈',me:'我'};
  const showAdd=wxTab==='chats'||wxTab==='contacts';
  return `<div class="nav"><span class="l" onclick="home()">‹</span><span class="t">${titles[wxTab]}</span><span class="r" onclick="${wxTab==='chats'?'chatAddMenu()':wxTab==='contacts'?'editContact()':''}">${showAdd?'＋':''}</span></div>
    <div class="scroll" style="background:#000">${body}</div>
    <div class="tabbar">
      ${tb('chats','💬','微信')}${tb('contacts','👤','通讯录')}${tb('moments','🌸','朋友圈')}${tb('me','🐱','我')}
    </div>`;
}
function tb(k,i,t){return `<div class="tb ${wxTab===k?'on':''}" onclick="wxTab='${k}';render()"><div class="i">${i}</div>${t}</div>`;}

function wxChats(){
  const list=[...S.contacts].filter(c=>!c.deleted&&(isMain()||addedHere(c)||msgs(c.id).length)).sort((a,b)=>{
    if(a.pinned!==b.pinned)return a.pinned?-1:1;
    return (lastMsg(b.id)?.time||0)-(lastMsg(a.id)?.time||0);});
  const groups=isMain()?(S.groups||[]):[];
  const banner=isMain()?'':`<div style="padding:8px 12px;background:#3a2d4a;color:#d6c2f0;font-size:12px;text-align:center">🪪 当前身份：${esc(S.me.name)}（在「我」里可切换/搜微信号加人）</div>`;
  let html=banner+'<div class="list">';
  groups.forEach(g=>{const lm=g.msgs[g.msgs.length-1];html+=`<div class="row" onclick="go('group',{id:'${g.id}'})">${g.avatar?av(g.avatar):'<div class="avatar" style="background:#7c6cc0">👥</div>'}<div class="meta"><div class="n">${esc(g.name)}(${g.members.length+1})</div><div class="s">${lm?esc(gpreview(lm)):'群聊已创建'}</div></div><div style="text-align:right"><div class="meta time">${lm?hm(lm.time):''}</div></div></div>`;});
  if(!list.length&&!groups.length)return banner+'<div class="empty">'+(isMain()?'右上角 ＋ 新建角色或发起群聊～':'这个身份还没加谁～<br>去「通讯录」搜微信号加人')+'</div>';
  html+=list.map(c=>{const lm=lastMsg(c.id);
    return `<div class="row ${c.pinned?'pin':''}" onclick="openChat('${c.id}')">${av(c.avatar)}
      <div class="meta"><div class="n">${esc(c.remark||c.name)} ${c.blocked?'<span class=tag>已拉黑</span>':''}</div>
      <div class="s">${lm?esc(previewOf(lm)):'打个招呼吧～'}</div></div>
      <div style="text-align:right"><div class="meta time">${lm?hm(lm.time):''}</div>${c.pinned?'<div style="font-size:10px;color:#ccc">置顶</div>':''}</div></div>`;}).join('');
  return html+'</div>';
}
function gpreview(m){const nm=m.senderId==='me'?S.me.name:(getC(m.senderId)?getC(m.senderId).name:'?');return nm+'：'+gmText(m);}
function gmText(m){return m.type==='text'?m.content:'[消息]';}
/* ===== 群聊 ===== */
function chatAddMenu(){openModal(`<h3>＋</h3>
  <button class="btn p" style="margin-bottom:8px" onclick="closeModal();editContact()">🧑 新建角色</button>
  <button class="btn g" onclick="closeModal();createGroup()">👥 发起群聊</button>
  <button class="btn g" style="margin-top:8px" onclick="closeModal()">取消</button>`);}
function createGroup(){const cs=S.contacts.filter(c=>!c.deleted);if(cs.length<1){toast('先创建角色');return;}
  window._gsel=[];openModal(`<h3>👥 发起群聊</h3><div class="hint">选要拉进群的角色（可多选）</div>
    <div id="gpick">${cs.map(c=>`<div class="section"><div class="it" onclick="gtoggle('${c.id}',this)">${esc(c.remark||c.name)}<span class="v" id="gp_${c.id}">＋</span></div></div>`).join('')}</div>
    <div class="field"><label>群名称</label><input id="g_name" placeholder="例如：我的后宫团"></div>
    <div class="btns"><button class="btn g" onclick="closeModal()">取消</button><button class="btn p" onclick="doCreateGroup()">创建</button></div>`);}
function gtoggle(id){const i=window._gsel.indexOf(id);if(i<0)window._gsel.push(id);else window._gsel.splice(i,1);const e=$('#gp_'+id);if(e)e.textContent=i<0?'✓':'＋';}
function doCreateGroup(){if(!window._gsel||!window._gsel.length){toast('至少选一个角色');return;}
  const nm=($('#g_name').value||'').trim()||(window._gsel.map(id=>getC(id).name).slice(0,3).join('、')+'的群');
  const g={id:'g'+uid(),name:nm,members:window._gsel.slice(),msgs:[]};S.groups.unshift(g);save();closeModal();go('group',{id:g.id});}
function renderGroup(id){const g=S.groups.find(x=>x.id===id);if(!g)return '';
  g.msgs.forEach(m=>{if(!m.id)m.id=uid();});
  let body='';g.msgs.forEach((m,i)=>{if(i===0||m.time-g.msgs[i-1].time>300000)body+=`<div class="tstamp"><span>${hm(m.time)}</span></div>`;body+=gbubble(g,m);});
  return `<div class="nav"><span class="l" onclick="back()">‹</span><span class="t">${esc(g.name)}(${g.members.length+1})</span><span class="r" onclick="groupInfo('${id}')">⋯</span></div>
    <div class="chatbg" id="chatbg">${body}</div>
    <div class="inputbar"><span class="plus" style="background:transparent;box-shadow:none;color:#aaa" onclick="groupAt('${id}')">@</span>
      <textarea id="ginput" rows="1" placeholder="群里说点啥…"></textarea>
      <button class="send" onclick="sendGroup('${id}')">发送</button></div>`;}
function gbubble(g,m){const me=m.senderId==='me';if(m.type==='sys')return `<div class="tstamp"><span>${esc(m.content)}</span></div>`;
  const c=me?null:getC(m.senderId);const av0=me?av(S.me.avatar):av(c?c.avatar:'🙂');const nm=me?'':`<div style="font-size:11px;color:#888;margin-bottom:2px">${esc(c?c.name:'?')}</div>`;
  return `<div class="msg ${me?'me':'them'}">${av0}<div class="col">${nm}<div class="bubble">${esc(m.content)}</div><div class="msgt">${hm(m.time)}</div></div></div>`;}
function gNotify(g,c){if(cur().p==='group'&&cur().id===g.id)return;playDing();const b=$('#msgBanner');if(!b)return;const lm=g.msgs[g.msgs.length-1];
  b.innerHTML=`${g.avatar?av(g.avatar,'sm'):'<div class="avatar sm" style="background:#7c6cc0">👥</div>'}<div style="flex:1;min-width:0"><div class="bn">${esc(g.name)}</div><div class="bm">${esc(c.name+'：'+(lm?gmText(lm):''))}</div></div>`;
  b.className='msgbanner show';b.onclick=()=>{b.className='msgbanner';go('group',{id:g.id});};clearTimeout(_bannerT);_bannerT=setTimeout(()=>{b.className='msgbanner';},4500);}
function sendGroup(id){const g=S.groups.find(x=>x.id===id);const ta=$('#ginput');const t=ta.value.trim();if(!t)return;ta.value='';ta.style.height='auto';
  g.msgs.push({senderId:'me',role:'user',type:'text',content:t,time:Date.now(),id:uid()});save();render();aiGroupReply(id,t);}
function groupAt(id){const g=S.groups.find(x=>x.id===id);openModal(`<h3>@ 谁</h3>${g.members.map(cid=>{const c=getC(cid);return c?`<div class="section"><div class="it" onclick="closeModal();var ta=$('#ginput');ta.value+='@${esc(c.name)} ';ta.focus()">${esc(c.name)}</div></div>`:'';}).join('')}<button class="btn g" style="margin-top:8px" onclick="closeModal()">关闭</button>`);}
function gContext(g,c){const others=g.members.filter(x=>x!==c.id).map(x=>getC(x)).filter(Boolean).map(x=>x.name);
  let s='\n\n# 你在群聊「'+g.name+'」里\n群里有：'+S.me.name+'(你们共同的恋人/主人)、'+others.join('、')+'。这是多人群聊，你可以 @别人、和群友拌嘴或吃醋（尤其'+S.me.name+'对别人好时），回复 '+(g.msgMin||1)+'到'+(g.msgMax||2)+' 条短消息，口语、符合你的人设和心情值。';
  if(g.relations)s+='\n# 群里的关系\n'+g.relations;
  s+='\n# 最近群聊记录\n'+g.msgs.slice(-14).map(m=>(m.senderId==='me'?S.me.name:(getC(m.senderId)?getC(m.senderId).name:'?'))+'：'+gmText(m)).join('\n');
  return s;}
async function aiGroupReply(id,fromText){const g=S.groups.find(x=>x.id===id);if(!g)return;
  const allowed=(g.responders&&g.responders.length)?g.responders:g.members;
  const members=allowed.map(x=>getC(x)).filter(c=>c&&!c.deleted&&!c.blocked);if(!members.length)return;

function myActivity(exceptId,since){let s='';since=since||0;
  const others=S.contacts.filter(c=>!c.deleted&&c.id!==exceptId).map(c=>({c,um:[...msgs(c.id)].reverse().find(m=>m.role==='user'&&m.type!=='sys'),lm:lastMsg(c.id)})).filter(x=>x.um&&x.lm&&x.lm.time>since).sort((a,b)=>(cWeight(b.c)-cWeight(a.c))||(b.lm.time-a.lm.time)).slice(0,3);
  if(others.length)s+='·她最近在跟这些人聊（附最近几句往来内容）：\n'+others.map(o=>{const nm=(o.c.remark||o.c.name);const recent=msgs(o.c.id).slice(-6).map(mm=>{const t=msgToText(mm);return t?((mm.role==='user'?S.me.name:nm)+'：'+t.replace(/\n/g,' ').slice(0,42)):'';}).filter(Boolean).join('\n');return '【'+nm+cMark(o.c)+' '+hm(o.lm.time)+'】\n'+recent;}).join('\n')+'\n';
  if(curLoc())s+='·她的位置：'+curLoc()+'\n';
  const bills=(S.me.bills||[]).filter(b=>!since||!b.ts||b.ts>since).slice(-3);

  if(liked.length)s+='·她在朋友圈互动：'+liked.slice(0,2).map(p=>{const cm=(p.comments||[]).find(x=>x.name===S.me.name);return (p.authorId==='me'?'自己':(getC(p.authorId)?.name||'某人'))+'的动态'+(cm?'评论了"'+cm.text+'"':'点了赞');}).join('、')+'\n';

  if(myTw.length)s+='·她最近发的推文：'+myTw.map(t=>'「'+t.text.slice(0,24)+'」').join('、')+'\n';

  return s||'（手机上没什么新动静）';}

async function createFriendRequest(id){const c=getC(id);if(!c||!c.blocked)return;

  S.friendRequests.push({id:uid(),contactId:id,msg,time:Date.now()});save();

function acceptFriend(rid){const r=S.friendRequests.find(x=>x.id===rid);if(!r)return;const c=getC(r.contactId);if(c){setBlk(c,false);c._readdedAt=Date.now();if(c._blockedAt)c._blockDur=fmtDur(Date.now()-c._blockedAt);c.moodVal=Math.max(40,(c.moodVal==null?70:c.moodVal));msgs(c.id).push({role:'user',type:'sys',content:'你通过了'+c.name+'的好友申请，现在可以聊天了',time:Date.now(),id:uid()});}

function clearHistory(id){openModal(`<h3>清除聊天记录</h3>

function doClear(id,mode){const list=msgs(id);let keep;
  if(mode==='all'){keep=[];}
  else if(mode==='3d'||mode==='7d'){const cut=Date.now()-(mode==='3d'?3:7)*86400000;keep=list.filter(m=>m.time<cut);}
  else{const a=$('#cl_a').value,b=$('#cl_b').value;if(!a||!b){toast('选好起止日期');return;}
    const t0=new Date(a+'T00:00:00').getTime(),t1=new Date(b+'T23:59:59').getTime();keep=list.filter(m=>m.time<t0||m.time>t1);}
  S.messages[mkey(id)]=keep;save();closeModal();render();toast('已删除 '+(list.length-keep.length)+' 条');}

function toMin(v){if(typeof v==='number')return v*60;if(typeof v==='string'&&v.includes(':')){const[a,b]=v.split(':');return (+a)*60+(+b);}return 0;}

function doForward(toId,acctId){const from=_sel.id;const fromC=getC(from);const src=msgs(from);

function payCard(kind,m,me){const done=m.received;
  const cls='cpay '+(done?'done':kind);const ic=kind==='r'?'🧧':'💰';
  const t1=done?'已收款':(kind==='r'?esc(m.note||'恭喜发财'):'¥'+(+m.amount).toFixed(2));
  const t2=done?'¥'+(+m.amount).toFixed(2):(kind==='r'?'领取红包':esc(m.note||'转账'));
  const handler=(!me&&!done)?`onclick="event.stopPropagation();receivePay('${m.id}')"`:'';
  return `<div class="card" ${handler}><div class="${cls}"><div class="big">${ic}</div><div><div class="t1">${t1}</div><div class="t2">${t2}</div></div></div><div class="cfoot">微信${kind==='r'?'红包':'转账'}</div></div>`;}
function receivePay(mid){let found;for(const id in S.messages){const m=S.messages[id].find(x=>x.id===mid);if(m){found={m,id};break;}}
  if(!found||found.m.received)return;found.m.received=true;
  const fromName=(getC(found.id)?(getC(found.id).remark||getC(found.id).name):'对方');
  addBill('in',found.m.amount,'收到 '+fromName+' 的'+(found.m.type==='redpacket'?'红包':'转账'));
  msgs(found.id).push({role:'user',type:'sys',content:'你领取了'+(found.m.type==='redpacket'?'红包':'转账'),time:Date.now()});
  save();render();toast('已收款 +¥'+(+found.m.amount).toFixed(2)+' ❤️');}

function markTransfer(id,mode){const m=[...msgs(id)].reverse().find(x=>x.role==='user'&&x.type==='transfer'&&!x.received&&!x.declined);if(m){if(mode==='reject')m.declined=true;else m.received=true;}return m||null;}
function markPay(id,mode){const m=[...msgs(id)].reverse().find(x=>x.role==='user'&&x.type==='paycard'&&!x._paid&&!x._rejected);if(m){if(mode==='reject')m._rejected=true;else m._paid=true;}return m||null;}

  startRec(()=>{const b=$('#holdbtn');if(b){b.textContent='● 录音中… 松开发送';b.style.background='#c0392b';}});}
function recUp(id,cancel){const b=$('#holdbtn');if(b){b.textContent='按住 说话';b.style.background='#3a3a40';}
  if(!_rec)return;const tooShort=Date.now()-_rec.start<600;
  stopRec(cancel||tooShort,m=>{if(!m)return;if(tooShort){toast('太短啦');return;}
    pushMsg(id,{role:'user',type:'voice',audio:m.audio,content:m.content||'',dur:m.dur,id:uid()});scheduleReply(id);});}
function sendText(id){const c=getC(id);if(c.blocked){toast('已拉黑，先解除吧');return;}
  const ta=$('#cinput');const t=ta.value.trim();if(!t)return;ta.value='';ta.style.height='auto';
  if(_voiceMode)pushMsg(id,{role:'user',type:'voice',content:t,dur:Math.max(1,Math.round(t.length/3)),id:uid()});
  else pushMsg(id,{role:'user',type:'text',content:t});
  scheduleReply(id);}

  const m={role:'user',type:'image',src,desc:'',id:uid()};pushMsg(id,m);
  try{m.desc=await visionAPI(src,'用一句中文简洁描述这张图');save();}catch(e){}

function grudgesOf(c){if(!c.grudges)c.grudges=[];return c.grudges;}
function applyStarTags(content){if(!content)return content;return content.replace(/[\[【]\s*(重点|取消重点)\s*[|｜:：]\s*([^\]】、，,]+)[\]】]/g,(m,act,nm)=>{nm=(nm||'').replace(/[「」『』"'\s]/g,'').trim();const c=S.contacts.find(x=>!x.deleted&&(x.name===nm||x.remark===nm||(nm&&(nm.indexOf(x.name)>=0||(x.remark&&nm.indexOf(x.remark)>=0)))));if(c){c.star=(act!=='取消重点');save();}return '';});}
function applyGrudgeTags(content,c){if(!content||!c)return content;let changed=false;
  let out=content.replace(/[\[【]\s*记仇\s*[|｜:：]\s*([^\]】]+)[\]】]/g,(m,t)=>{t=(t||'').replace(/[「」『』"'《》]/g,'').trim();if(t){const g=grudgesOf(c);if(!g.some(x=>x.text===t)){g.unshift({id:uid(),text:t,done:false,ts:Date.now()});changed=true;}}return '';});
  out=out.replace(/[\[【]\s*消气\s*[|｜:：]?\s*([^\]】]*)[\]】]/g,(m,t)=>{t=(t||'').replace(/[「」『』"'《》]/g,'').trim();const g=grudgesOf(c);let tg=null;
    if(t){tg=g.find(x=>!x.done&&(x.text.indexOf(t)>=0||t.indexOf(x.text)>=0));
      if(!tg){const ks=t.replace(/[的了又还跟和与你我ta]/g,'').split('').filter(Boolean);if(ks.length>=2)tg=g.find(x=>!x.done&&ks.filter(ch=>x.text.indexOf(ch)>=0).length>=Math.ceil(ks.length*0.6));}}// 关键词模糊匹配；匹配不上就不乱划
    else tg=g.find(x=>!x.done);// 不带关键词的[消气]=划掉最近一笔
    if(tg){tg.done=true;tg.doneTs=Date.now();changed=true;}return '';});
  if(changed)save();return out;}

  });

  o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.001,_audio.currentTime);g.gain.exponentialRampToValueAtTime(Math.min(1,.25*volMul()),_audio.currentTime+.02);

let _call=null,_ring=null,_callTimer=null;
function ringStart(){ringStop();ensureAudio();if(!_audio)return;let on=false;
  _ring=setInterval(()=>{try{const o=_audio.createOscillator(),g=_audio.createGain();o.connect(g);g.connect(_audio.destination);
    o.frequency.value=on?660:520;o.type='sine';g.gain.setValueAtTime(.0001,_audio.currentTime);
    g.gain.exponentialRampToValueAtTime(Math.min(1,.2*volMul()),_audio.currentTime+.05);g.gain.exponentialRampToValueAtTime(.0001,_audio.currentTime+.5);
    o.start();o.stop(_audio.currentTime+.55);on=!on;}catch(e){}},650);
  if(navigator.vibrate)navigator.vibrate([400,200,400,200,400]);}
function ringStop(){if(_ring){clearInterval(_ring);_ring=null;}if(navigator.vibrate)navigator.vibrate(0);}
function blip(freq,dur){if(!S.settings.sound)return;ensureAudio();if(!_audio)return;try{const o=_audio.createOscillator(),g=_audio.createGain();o.connect(g);g.connect(_audio.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(Math.min(1,.2*volMul()),_audio.currentTime);g.gain.exponentialRampToValueAtTime(.001,_audio.currentTime+dur);o.start();o.stop(_audio.currentTime+dur);}catch(e){}}
function incomingCall(id,kind){const c=getC(id);if(!c||c.blocked||_call)return;

function placeCall(id,kind){const c=getC(id);if(!c)return;initAudio();_call={id,kind,state:'outgoing',replyVoice:S.settings.voiceAuto!==false,session:uid(),sub:null};renderCall();

  _call.state='active';_call.start=Date.now();
  clearInterval(_callTimer);_callTimer=setInterval(renderCallTime,1000);renderCall();
  callAI('[系统：'+(autoByThem?S.me.name+'接通了你打的':'你接通了')+(_call.kind==='video'?'视频':'语音')+'电话，自然开口，口语化短句。]');}
function declineCall(){if(!_call)return;ringStop();blip(300,.3);const id=_call.id,wasIn=_call.state==='incoming';const kindTxt=_call.kind==='video'?'视频通话':'语音通话';
  msgs(id).push({role:'user',type:'sys',content:wasIn?'你拒绝了'+kindTxt:kindTxt+'已取消',time:Date.now(),id:uid()});save();
  _call=null;renderCall();if(cur().p==='chat')render();
  const c=getC(id);if(wasIn&&c&&!c.blocked)setTimeout(()=>aiReply(id,'[系统：你打'+kindTxt+'给'+S.me.name+'，ta拒接了。你察觉到了，主动发消息问ta为什么不接、在干嘛（符合你心情值和人设）。]'),2500);}
function hangupCall(byAI){if(!_call)return;blip(300,.3);clearInterval(_callTimer);const id=_call.id;const kindTxt=_call.kind==='video'?'视频通话':'语音通话';const _sess=_call.session;

    <div class="callbtns">${btns}</div>`;

const WCODE={0:'晴',1:'晴',2:'多云',3:'阴',45:'雾',48:'雾',51:'小雨',53:'小雨',55:'雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'雪',75:'大雪',80:'阵雨',81:'阵雨',82:'大阵雨',95:'雷雨',96:'雷雨'};
function fetchWeather(manual){if(!navigator.geolocation){if(manual)toast('设备不支持定位');return;}
  navigator.geolocation.getCurrentPosition(async p=>{const la=p.coords.latitude,lo=p.coords.longitude;
    try{const w=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+la+'&longitude='+lo+'&current=temperature_2m,weather_code,precipitation').then(r=>r.json());
      let place='';try{const g=await fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+la+'&longitude='+lo+'&localityLanguage=zh').then(r=>r.json());
        const parts=[g.principalSubdivision||g.city,g.locality,(g.localityInfo&&g.localityInfo.administrative&&g.localityInfo.administrative.slice(-1)[0]&&g.localityInfo.administrative.slice(-1)[0].name)];
        place=parts.filter((x,i,a)=>x&&a.indexOf(x)===i).join('·');}catch(e){}
      const code=w.current.weather_code,desc=WCODE[code]||'未知';
      S.weather={place,temp:Math.round(w.current.temperature_2m),desc,rain:(w.current.precipitation>0||[51,53,55,61,63,65,80,81,82,95,96].indexOf(code)>=0),time:Date.now()};
      save();if(manual)toast('🌦️ '+place+' '+desc+' '+S.weather.temp+'°C');if(cur().p==='settings')render();
    }catch(e){if(manual)toast('天气获取失败');}
  },()=>{if(manual)toast('定位被拒绝了');});}

    try{const r=await fetch(base+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,max_tokens:700,messages:[{role:'system',content:'你是联网搜索助手。请就用户的问题给出尽量最新、真实的信息；如果你具备联网/检索能力就联网查证。'},{role:'user',content:'联网搜索并简要回答：'+q}]})});
      const d=await r.json().catch(()=>null);if(!r.ok)return '（搜索失败 '+r.status+'：检查设置里的联网模型）';
      return ((d&&d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'').slice(0,1800)||'（没搜到内容）';}catch(e){return '（搜索失败，检查联网模型设置）';}}
