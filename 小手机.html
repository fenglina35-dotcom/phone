    ${(p.authorId==='me'&&p.visible&&p.visible.length)?`<div style="font-size:11px;color:#888;margin-top:3px">🔒 仅 ${p.visible.map(id=>{const cc=getC(id);return cc?esc(cc.remark||cc.name):'?';}).join('、')} 可见</div>`:''}
    <div class="ft"><div class="tm">${ago(p.time)}</div><div class="acts" onclick="momentMenu('${p.id}')">···</div></div>
    ${p.likes&&p.likes.length?`<div class="likes">❤️ ${p.likes.map(l=>esc(l)).join('，')}</div>`:''}
    ${p.comments&&p.comments.length?`<div class="cmts">${p.comments.map((cm,ci)=>`<div class="cmt" onclick="replyComment('${p.id}',${ci})"><b>${esc(cm.name)}：</b>${esc(cm.text)}</div>`).join('')}</div>`:''}
  </div></div>`;}
function momentMenu(pid){const p=S.moments.find(x=>x.id===pid);
  openModal(`<h3>互动</h3>
    <button class="btn g" style="margin-bottom:8px" onclick="likeMoment('${pid}')">❤️ ${S.me.name} 点赞</button>
    <div class="field"><input id="cm_t" placeholder="写条评论…"></div>
    <button class="btn p" onclick="commentMoment('${pid}')">评论</button>
    <button class="btn d" style="margin-top:10px" onclick="S.moments=S.moments.filter(x=>x.id!=='${pid}');save();closeModal();render()">删除这条朋友圈</button>
    <button class="btn g" style="margin-top:8px" onclick="closeModal()">关闭</button>`);}
function replyComment(pid,ci){const p=S.moments.find(x=>x.id===pid);if(!p)return;const cm=p.comments[ci];if(!cm)return;
  openModal(`<h3>回复 ${esc(cm.name)}</h3><div class="field"><input id="rc_t" placeholder="回复 ${esc(cm.name)}…"></div>
    <div class="btns"><button class="btn g" onclick="closeModal()">取消</button><button class="btn p" onclick="doReplyComment('${pid}',${ci})">回复</button></div>`);}
function doReplyComment(pid,ci){const t=$('#rc_t').value.trim();if(!t)return;const p=S.moments.find(x=>x.id===pid);const cm=p.comments[ci];
  p.comments.push({name:S.me.name,text:'回复 '+cm.name+'：'+t});save();closeModal();render();
  if(cm.cid&&getC(cm.cid))reactToComment(p,cm.cid);}
function likeMoment(pid){const p=S.moments.find(x=>x.id===pid);p.likes=p.likes||[];if(!p.likes.includes(S.me.name))p.likes.push(S.me.name);save();closeModal();render();}
function commentMoment(pid){const t=$('#cm_t').value.trim();if(!t)return;const p=S.moments.find(x=>x.id===pid);
  p.comments=p.comments||[];p.comments.push({name:S.me.name,text:t});save();closeModal();render();
  if(p.authorId!=='me')reactToComment(p);}
function postMoment(){const cs=S.contacts.filter(c=>!c.deleted);openModal(`<h3>发朋友圈</h3>
  <div class="field"><textarea id="mm_t" rows="3" placeholder="这一刻的想法…"></textarea></div>
  <div class="field"><button class="minibtn" id="mm_imgs_btn" onclick="addMomentImg()">📷 加图片</button> <span id="mm_imgcount"></span></div>
  <div class="field"><label>谁可以看（都不选=所有人可见；选了就只有选中的人能看到，不相关的人看不到）</label>
    ${cs.length?cs.map(c=>`<label class="avline" style="font-weight:400">${esc(c.remark||c.name)}<span class="sw" data-mv="${c.id}" onclick="this.classList.toggle('on')"></span></label>`).join(''):'<div style="font-size:12px;color:#999">还没有角色</div>'}</div>
  <div class="btns"><button class="btn g" onclick="closeModal()">取消</button><button class="btn p" onclick="doPostMoment()">发表</button></div>`);
  window._mmImgs=[];}
function addMomentImg(){pickFile('image/*',async f=>{window._mmImgs.push(await compress(f,700,.6));$('#mm_imgcount').textContent='已加'+window._mmImgs.length+'张';});}
function doPostMoment(){const t=$('#mm_t').value.trim();if(!t&&!(window._mmImgs||[]).length){toast('写点什么吧');return;}
  const visible=[...document.querySelectorAll('[data-mv].on')].map(e=>e.getAttribute('data-mv'));
  const p={id:uid(),authorId:'me',text:t,images:window._mmImgs||[],time:Date.now(),likes:[],comments:[],acct:actId(),visible};
  S.moments.unshift(p);save();closeModal();render();reactToMyMoment(p);}
function cleanReply(t){return (t||'').replace(/\[(心情|记住|闹钟|来电|联网|骰子|送礼|代付成功|日程|转账|红包|位置|图片|文件)[^\]]*\]/g,'').replace(/^["「]+|["」]+$/g,'').trim();}
function recordVisit(cid,where){const c=getC(cid);if(!c)return;if(!S.visitors)S.visitors=[];S.visitors.unshift({cid,name:c.remark||c.name,avatar:c.avatar,where:where||'朋友圈',time:Date.now()});if(S.visitors.length>40)S.visitors.length=40;save();}
function momentVisibleTo(p,cid){if(!p||p.authorId!=='me')return true;if(!p.visible||!p.visible.length)return true;return p.visible.indexOf(cid)>=0;}
async function reactToMyMoment(p){const pool=S.contacts.filter(c=>!c.deleted&&!c.blocked&&momentVisibleTo(p,c.id));
  for(const c of pool.slice(0,3)){try{recordVisit(c.id,'朋友圈');const recent=msgs(c.id).slice(-6).map(msgToText).filter(Boolean).join('\n');const r=await chatAPI([{role:'system',content:buildSystem(c)},
    {role:'user',content:(recent?'你和'+S.me.name+'最近的微信聊天：\n'+recent+'\n\n':'')+'你的恋人/好友'+S.me.name+'刚发了条朋友圈："'+p.text+'"。请你只回复一句：要么是点赞就回"赞"，要么是一句简短自然的评论（结合你俩最近的状态，像真人评论那样）。不要带任何方括号标记。'}]);
    const txt=cleanReply(r);if(txt==='赞'||(txt.includes('赞')&&txt.length<3)){p.likes.push(c.remark||c.name);}
    else if(txt){p.comments.push({name:c.remark||c.name,cid:c.id,text:txt.slice(0,40)});}
    save();if(cur().p==='wechat'&&wxTab==='moments')render();}catch(e){}}}
async function reactToComment(p,toContactId){const c=getC(toContactId||p.authorId);if(!c)return;try{
  const whoPosted=p.authorId==='me'?S.me.name:(p.authorId===c.id?'你自己':((getC(p.authorId)||{}).name||'某人'));
  const thread=(p.comments||[]).map(cm=>cm.name+'：'+cm.text).join('\n');
  const mine=[...(p.comments||[])].reverse().find(cm=>cm.name===S.me.name);
  const recent=msgs(c.id).slice(-6).map(msgToText).filter(Boolean).join('\n');
  const ctx=(recent?'你和'+S.me.name+'最近的微信聊天：\n'+recent+'\n\n':'')
    +'这是'+whoPosted+'发的朋友圈："'+p.text+'"\n'
    +(thread?'这条朋友圈下面的评论（按先后顺序）：\n'+thread+'\n\n':'')
    +S.me.name+'刚刚在评论区对你说："'+(mine?mine.text:'')+'"\n'
    +'请你以本人身份，【针对ta这句评论的具体内容】自然地回ta一句——先看懂ta说了什么，再像真人回评论那样接话/回应/调侃，绝不要答非所问、不要把ta的话当空气，也不要带方括号标记。';
  const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:ctx}]);
  const txt=cleanReply(r);if(txt)p.comments.push({name:c.remark||c.name,cid:c.id,text:txt.slice(0,60)});save();if(cur().p==='wechat')render();}catch(e){}}
async function refreshMoments(){const pool=S.contacts.filter(c=>!c.deleted&&!c.blocked);if(!pool.length){toast('先创建角色');return;}
  toast('刷新中…');const picks=pool.sort(()=>Math.random()-.5).slice(0,2);
  for(const c of picks){try{const r=await chatAPI([{role:'system',content:buildSystem(c)},
    {role:'user',content:'以你的身份发一条朋友圈动态（一两句，可带点心情或日常），只输出动态内容本身，不要带方括号标记。'}]);
    S.moments.unshift({id:uid(),authorId:c.id,text:cleanReply(r).slice(0,120),images:[],time:Date.now(),likes:[],comments:[],acct:actId()});
    save();if(cur().p==='wechat'&&wxTab==='moments')render();}catch(e){toast('生成失败：'+e.message);}}}

/* ---------- 通用弹窗 ---------- */
function openModal(html){$('#modalSheet').innerHTML=html;$('#modal').classList.add('show');}
function closeModal(){$('#modal').classList.remove('show');}
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
function openChat(id){const c=getC(id);if(!c){home();return;}if(c.blocked){toast('已拉黑');}stack=stack.filter(s=>s.p!=='chat');go('chat',{id});}

/* ---------- 备份 ---------- */
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='小手机备份_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('已导出');}
function importData(){pickFile('.json',f=>{const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.settings){S=Object.assign(defState(),d);save();render();toast('已导入');}}catch(e){toast('文件读不了');}};r.readAsText(f);});}
/* ---------- 存储用量 ---------- */
function storageInfo(){let bytes=0;try{const s=localStorage.getItem(KEY);bytes=new Blob([s||JSON.stringify(S)]).size;}catch(e){try{bytes=(JSON.stringify(S)||'').length*2;}catch(_){}}
  const CAP=5*1024*1024;return {bytes,mb:bytes/1048576,capMb:5,pct:Math.min(100,Math.round(bytes/CAP*100))};}
function storageMeter(){const si=storageInfo();const col=si.pct>=80?'#fa5151':si.pct>=60?'#ffb83b':'#19a463';
  return `<div class="section"><div style="padding:12px 14px"><div style="display:flex;justify-content:space-between;font-size:13px;color:#ccc"><span>💾 存储用量</span><span style="color:${col};font-weight:600">${si.mb.toFixed(2)} / ${si.capMb}MB（${si.pct}%）</span></div>
    <div style="height:8px;background:#2c2c2e;border-radius:5px;margin-top:8px;overflow:hidden"><div style="height:100%;width:${si.pct}%;background:${col};transition:.3s"></div></div>
    <div class="hint" style="padding:7px 0 0">${si.pct>=80?'⚠️ 快满了！赶紧导出备份，再删点旧图片/聊天。':'最占地方的是上传的图片。记得常点「💾 导出备份」存一份最保险。'}</div></div></div>`;}
let _storeWarned=false;
function checkStorageWarn(){if(_storeWarned)return;const si=storageInfo();if(si.pct<80)return;_storeWarned=true;
  openModal(`<h3>⚠️ 手机存储快满了</h3><div style="font-size:14px;line-height:1.9;color:#333">已经用了 <b style="color:#fa5151">${si.mb.toFixed(2)}MB / ${si.capMb}MB（${si.pct}%）</b>。<br>快满了的话新消息、新照片可能存不进去。<br><br>现在建议你：<br>1️⃣ 先导出一份备份存好<br>2️⃣ 删掉一些旧图片或用不到的聊天</div>
    <div class="btns" style="margin-top:14px"><button class="btn g" onclick="closeModal()">知道了</button><button class="btn p" onclick="closeModal();exportData()">💾 立即导出备份</button></div>`);}
function storageFullAlert(){openModal(`<h3>🚨 存储已经满了！</h3><div style="font-size:14px;line-height:1.9;color:#333">刚才有内容没能存进去。<br><br>赶紧：<br>1️⃣ 点下面导出备份（别让数据丢了）<br>2️⃣ 删掉一些旧照片/旧聊天腾地方</div>
  <div class="btns" style="margin-top:14px"><button class="btn g" onclick="closeModal()">知道了</button><button class="btn p" onclick="closeModal();exportData()">💾 立即导出备份</button></div>`);}

/* ---------- 时钟 & 启动 ---------- */
function paintBatt(){const b=$('#battinfo');if(b)b.innerHTML='📶 5G 🔋'+(S.me.battery!=null?S.me.battery+'%':'88%')+(S.me.charging?'⚡':'');}
function initBattery(){if(navigator.getBattery){navigator.getBattery().then(bt=>{const upd=()=>{S.me.battery=Math.round(bt.level*100);S.me.charging=bt.charging;save();paintBatt();};bt.addEventListener('levelchange',upd);bt.addEventListener('chargingchange',upd);upd();}).catch(()=>{});}}
initBattery();
document.addEventListener('visibilitychange',()=>{if(document.hidden){_storeWarned=false;}else{ensureAudio();if(cur().p==='wechat'&&wxTab==='me')render();setTimeout(checkStorageWarn,600);setTimeout(autoAssignTasks,800);setTimeout(checkIgnore,1800);}});
setInterval(()=>{const c=$('#clock');if(c)c.textContent=hm();paintBatt();if(cur().p==='home')$('#app').querySelector('.hh')&&($('#app').querySelector('.hh').textContent=hm());},1000);
render();/* 先立刻渲染，UI 一定出来 */
bootImages().then(()=>render()).catch(()=>{});/* 图片从 IndexedDB 回填好后再重渲染一次 */
setTimeout(imgGC,60000);
setTimeout(checkStorageWarn,1200);
</script>
</body>
</html>
