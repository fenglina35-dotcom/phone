const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function isImg(v){return v&&/^(https?:|data:)/.test(v);}
function av(v,extra){return `<div class="avatar ${extra||''}">${isImg(v)?`<img src="${v}">`:(v||'🙂')}</div>`;}
function hm(t){const d=new Date(t||Date.now());return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function ago(t){const s=(Date.now()-t)/1000;if(s<60)return '刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';return Math.floor(s/86400)+'天前';}
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2000);}
function viewImg(s){$('#viewerImg').src=s;$('#viewer').classList.add('show');}
function getC(id){return S.contacts.find(c=>c.id===id);}
function msgs(id){return S.messages[id]||(S.messages[id]=[]);}
function lastMsg(id){const m=msgs(id);return m[m.length-1];}
function compress(file,max,q){return new Promise((res,rej)=>{const img=new Image(),r=new FileReader();
  r.onload=()=>{img.onload=()=>{let w=img.width,h=img.height;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>=w&&h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q));};img.onerror=rej;img.src=r.result;};r.onerror=rej;r.readAsDataURL(file);});}
function pickFile(accept,cb){const i=document.createElement('input');i.type='file';if(accept)i.accept=accept;i.onchange=e=>{const f=e.target.files[0];if(f)cb(f);};i.click();}
function fmtSize(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';}

/* =================== API =================== */
async function chatAPI(messages,opt){opt=opt||{};const a=S.settings.chat;
  if(!a.base||!a.key)throw new Error('还没设置聊天 API（去 设置→API）');
  const res=await fetch(a.base.replace(/\/+$/,'')+'/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.key},
    body:JSON.stringify({model:opt.model||a.model,temperature:(opt.temp!=null?opt.temp:Number(a.temp))||0.8,max_tokens:opt.max||Number(a.maxTokens)||900,messages})});
  const d=await res.json().catch(()=>null);
  if(!res.ok)throw new Error('HTTP '+res.status+'：'+((d&&d.error&&(d.error.message||JSON.stringify(d.error)))||'失败').slice(0,160));
  return (d&&d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'').trim();
}
async function visionAPI(dataURL,prompt){const a=S.settings.vision;
  if(!a.base||!a.key||!a.model)throw new Error('no-vision');
  const res=await fetch(a.base.replace(/\/+$/,'')+'/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.key},
    body:JSON.stringify({model:a.model,max_tokens:300,messages:[{role:'user',content:[
      {type:'text',text:prompt||'用一句中文描述这张图片的内容，简洁点。'},
      {type:'image_url',image_url:{url:dataURL}}]}]})});
  const d=await res.json();
  if(!res.ok)throw new Error('vision-fail');
  return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'').trim();
}

/* =================== 提示词 =================== */
function msgToText(m){
  if(m.role==='assistant')return m.content||'';
  switch(m.type){
    case 'text':return m.content;
    case 'image':return '[我发了一张照片'+(m.desc?'，画面是：'+m.desc:'')+']';
    case 'transfer':return '[我给你转账 ¥'+(+m.amount).toFixed(2)+(m.note?'，备注'+m.note:'')+']';
    case 'redpacket':return '[我发了个红包 ¥'+(+m.amount).toFixed(2)+(m.note?'，'+m.note:'')+']';
    case 'location':return '[我发了位置：'+(m.name||'')+' '+(m.address||'')+']';
    case 'file':return '[我发了文件：'+(m.name||'')+']';
    case 'spycard':return '[我把我的小手机查看权限发给你了，你现在可以随时查看我的手机：聊天对象、钱包、朋友圈互动、动态。]';
    case 'sys':return null;
    default:return m.content||'';
  }
}
function worldHits(text){const out=[];text=text||'';
  S.worldbook.forEach(w=>{if(!w.enabled)return;
    if(w.always){out.push(w);return;}
    const keys=(w.keys||'').split(/[,，\s]+/).filter(Boolean);
    if(keys.some(k=>text.includes(k)))out.push(w);});
  return out;}
function getSpy(c){if(!c.spy)c.spy={granted:false,loc:false,time:'',times:2};return c.spy;}
function buildSystem(c){
  let s=c.persona||'';
  s+='\n\n# 你在和谁聊\n对方是「'+S.me.name+'」'+(c.remark?'（你给ta备注：'+c.remark+'）':'')+'。';
  if(c.blocked)s+='\n\n# 重要\n'+S.me.name+'刚刚把你拉黑了，你能感觉到被冷落/拒绝。';
  if(c._readdedAt&&Date.now()-c._readdedAt<3600000)s+='\n\n# 重要\n'+S.me.name+'之前把你拉黑了，刚刚才重新把你加回好友，你心里清楚这件事，可以有相应反应。';
  const _sp=getSpy(c);
  if(_sp.loc&&S.weather)s+='\n\n# 实时定位（ta已授权你随时查看）\n'+S.me.name+'此刻在：'+S.weather.place+'。';
  if(S.me.persona)s+='\n对方的人设：'+S.me.persona;
  // 世界书
  const recent=msgs(c.id).slice(-8).map(msgToText).filter(Boolean).join('\n');
  const wb=worldHits(recent+' '+(c.persona||''));
  if(wb.length)s+='\n\n# 世界设定（务必遵守）\n'+wb.map(w=>'·'+w.name+'：'+w.content).join('\n');
  // 记忆
  if(c.memory&&c.memory.length)s+='\n\n# 你记得关于'+S.me.name+'的事\n'+c.memory.map((m,i)=>(i+1)+'. '+m).join('\n');
  // 朋友圈感知（自己发的 + 对方发的）
  const mo=S.moments.filter(p=>p.authorId==='me'||p.authorId===c.id).slice(0,6);
  if(mo.length)s+='\n\n# 最近的朋友圈（你知道这些动态）\n'+mo.map(p=>(p.authorId==='me'?S.me.name:'你')+'发了："'+p.text+'"').join('\n');
  if(S.settings.timeAware)s+='\n\n# 时间感知\n现在是 '+new Date().toLocaleString('zh-CN',{weekday:'long',hour:'2-digit',minute:'2-digit',month:'long',day:'numeric'})+'，请结合当前时间（早中晚、是否深夜）自然地回应。';
  // 久未回复感知
  const lu=[...msgs(c.id)].reverse().find(m=>m.role==='user');
  if(lu){const gap=Date.now()-lu.time;if(gap>3600000)s+='\n\n# 注意\n'+S.me.name+'已经 '+Math.floor(gap/3600000)+' 小时没回你消息了，你可以表达在意/想念或追问。';}
  // 他自己的手机内容（保持一致，被问到能答上来）
  const sp=S.spy[c.id];
  if(sp)s+='\n\n# 你手机里现在的内容（这是你自己的，被问到要答得上、保持一致）\n位置：'+(sp.location||'')+'\n日记：'+(sp.diary||'')+(sp.browser?'\n浏览：'+sp.browser.join('；'):'')+(sp.wallet?'\n支出：'+sp.wallet.map(w=>w.item+w.amount).join('；'):'')+(sp.friends?'\n新好友：'+sp.friends.join('；'):'');
  // 天气
  if(S.weather)s+='\n\n# '+S.me.name+'所在地天气\n'+S.weather.place+'，'+S.weather.desc+'，'+S.weather.temp+'°C'+(S.weather.rain?'（有雨）':'')+'。你知道这些，下雨时可在合适的时候自然提醒ta带伞，不用每条都提天气。';
  if(S.settings.web&&S.settings.web.enabled)s+='\n\n# 联网\n当需要查实时/最新信息（新闻、天气细节、价格、某事实）时，单独用一行 [联网|要搜索的关键词]，系统会联网查并把结果给你，你再据此回答。';
  s+='\n\n# 微信聊天规则\n- 像真人发微信：一次可以连发好几条短消息，每条单独占一行（用换行分隔），不要写成一大段。\n- 口语化、自然、有情绪。\n- 需要时你也能发卡片，单独占一行：转账[转账|金额|说明]、红包[红包|金额|祝福语]、位置[位置|地点|地址]、文件[文件|文件名]、图片[图片|画面描述]。不需要就正常说话。\n- 你可以单独用一行 [心情|你此刻的内心想法] 表达内心戏（不会作为消息发出，只显示在顶部）。\n- 当'+S.me.name+'让你记住某件事、或聊到重要的事时，单独用一行 [记住|要长期记住的内容] 把它存进记忆。\n- 当'+S.me.name+'让你定闹钟叫ta起床/提醒，用一行 [闹钟|HH:MM|事由] 设定（24小时制），到点你会自动来电。\n- 当你想打电话给ta时，用一行 [来电|语音] 或 [来电|视频]，会触发来电。';
  return s;
}

function render(){
  const c=cur();const app=$('#app');
  $('#statusbar').className='statusbar'+(c.p==='home'?'':' dark');

  if(c.p==='home')html=renderHome();

  else if(c.p==='wechat')html=renderWeChat();

  app.innerHTML='<div class="page">'+html+'</div>';
  if(c.p==='chat'){afterChat(c.id);}
  if(c.p==='wechat'&&wxTab==='moments'){}
}

function stripJSON(t){t=(t||'').trim();const m=t.match(/```(?:json)?\s*([\s\S]*?)```/);if(m)t=m[1];const a=t.indexOf('{'),b=t.lastIndexOf('}');if(a>=0&&b>a)t=t.slice(a,b+1);return t;}
async function spyRefresh(id){const c=getC(id);toast('偷看中…');
  try{const hist=msgs(id).slice(-16).map(m=>({role:m.role,content:msgToText(m)})).filter(x=>x.content!=null);

    const content=await chatAPI([{role:'system',content:buildSystem(c)},...hist,{role:'user',content:prompt}],{max:800});
    const data=JSON.parse(stripJSON(content));data.time=Date.now();S.spy[id]=data;save();

function c_block(id){const c=getC(id);c.blocked=!c.blocked;save();render();
  if(c.blocked)setTimeout(()=>createFriendRequest(id),20000+Math.random()*40000);}
async function createFriendRequest(id){const c=getC(id);if(!c||!c.blocked)return;
  if(S.friendRequests.some(r=>r.contactId===id))return;
  let msg='是我，别拉黑我好不好…我们好好说。';
  try{msg=(await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'[系统：'+S.me.name+'把你拉黑了，你不死心，重新申请加回好友。写一句简短的好友验证消息，别超过20字。]'}])).split('\n')[0].slice(0,30)||msg;}catch(e){}
  S.friendRequests.push({id:uid(),contactId:id,msg,time:Date.now()});save();
  if(!c.muted)playDing();if(cur().p==='wechat'&&wxTab==='contacts')render();
  toast('📇 通讯录有人申请加你');}
function openFriendRequests(){if(!S.friendRequests.length){toast('暂无新申请');return;}
  openModal(`<h3>➕ 新的朋友</h3>${S.friendRequests.map(r=>{const c=getC(r.contactId);return `<div class="section"><div style="padding:12px 14px;display:flex;gap:10px;align-items:center">${av(c?c.avatar:'🙂','sm')}<div class="meta"><div class="n">${esc(c?c.name:'?')}</div><div class="s">${esc(r.msg)}</div></div></div><div style="display:flex;gap:8px;padding:0 14px 12px"><button class="btn p" style="flex:1" onclick="acceptFriend('${r.id}')">接受</button><button class="btn g" style="flex:1" onclick="ignoreFriend('${r.id}')">忽略</button></div></div>`;}).join('')}<button class="btn g" style="margin-top:8px" onclick="closeModal()">关闭</button>`);}
function acceptFriend(rid){const r=S.friendRequests.find(x=>x.id===rid);if(!r)return;const c=getC(r.contactId);if(c){c.blocked=false;c._readdedAt=Date.now();msgs(c.id).push({role:'user',type:'sys',content:'你通过了'+c.name+'的好友申请，现在可以聊天了',time:Date.now(),id:uid()});}
  S.friendRequests=S.friendRequests.filter(x=>x.id!==rid);save();closeModal();render();toast('已加回好友');
  if(c)setTimeout(()=>aiReply(c.id),900);}
function ignoreFriend(rid){S.friendRequests=S.friendRequests.filter(x=>x.id!==rid);save();(S.friendRequests.length?openFriendRequests():closeModal());render();}
function c_delete(id){if(!confirm('删除这个角色和聊天记录？'))return;const c=getC(id);c.deleted=true;delete S.messages[id];save();stack.pop();render();}
function clearHistory(id){if(!confirm('清空聊天记录？'))return;S.messages[id]=[];save();toast('已清空');}
function togProactive(id){const c=getC(id);c.proactive.enabled=!c.proactive.enabled;save();render();}
function togSpy(id,k){const c=getC(id);const sp=getSpy(c);sp[k]=!sp[k];save();render();}
function saveSpy(id){const c=getC(id);const sp=getSpy(c);sp.time=$('#sp_t').value||'';sp.times=+$('#sp_n').value||2;save();toast('已保存');}
function savePa(id){const c=getC(id);c.proactive.start=+$('#pa_s').value||0;c.proactive.end=+$('#pa_e').value||23;c.proactive.times=+$('#pa_n').value||1;save();toast('已保存');}

/* ---------- 多选转发 ---------- */
let _sel=null;
function enterSelect(id){_sel={id,ids:[]};const p=$('#panel');if(p)p.classList.remove('show');render();}
function exitSelect(){_sel=null;render();}
function toggleSel(mid){if(!_sel)return;const i=_sel.ids.indexOf(mid);if(i<0)_sel.ids.push(mid);else _sel.ids.splice(i,1);render();}
function forwardSelected(){if(!_sel||!_sel.ids.length){toast('先选几条');return;}
  const from=_sel.id;const targets=S.contacts.filter(c=>!c.deleted&&c.id!==from);
  if(!targets.length){toast('没有别的角色可转发');return;}
  openModal(`<h3>转发给</h3>${targets.map(c=>`<div class="section"><div class="it" onclick="doForward('${c.id}')">${esc(c.remark||c.name)}<span class="v">›</span></div></div>`).join('')}<button class="btn g" style="margin-top:8px" onclick="closeModal()">取消</button>`);}
function doForward(toId){const from=_sel.id;const src=msgs(from);
  const picked=src.filter(m=>_sel.ids.includes(m.id));
  const dst=msgs(toId);
  dst.push({role:'user',type:'sys',content:'—— 转发自'+(getC(from).remark||getC(from).name)+'的聊天 ——',time:Date.now(),id:uid()});
  picked.forEach(m=>{const copy=Object.assign({},m);copy.id=uid();copy.time=Date.now();copy._fwd=true;dst.push(copy);});
  save();_sel=null;closeModal();toast('已转发'+picked.length+'条');openChat(toId);}

/* ---------- 聊天页 ---------- */

  const mood=c.mood?`<div class="moodbar" onclick="showMood('${id}')">💭 ${esc(c.mood.slice(0,22))}${c.mood.length>22?'…':''}</div>`:'';

    ${mood}
    <div class="chatbg" id="chatbg" style="${bg}">${body}</div>

      <div class="it" onclick="placeCall('${id}','voice')"><div class="b">📞</div><span>语音通话</span></div>
      <div class="it" onclick="placeCall('${id}','video')"><div class="b">📹</div><span>视频通话</span></div>
      <div class="it" onclick="cSpyGrant('${id}')"><div class="b">📱</div><span>授权查手机</span></div>
      <div class="it" onclick="enterSelect('${id}')"><div class="b">↗️</div><span>多选转发</span></div>
    </div>

      <span class="plus" onclick="$('#panel').classList.toggle('show')">＋</span>
      <textarea id="cinput" rows="1" placeholder="${c.blocked?'已拉黑，发不出去':'发消息…'}" ${c.blocked?'disabled':''}></textarea>
      <button class="send" onclick="sendText('${id}')">发送</button>
    </div>`}`;}
function bubbleRow(c,m){
  const me=m.role==='user';
  if(m.type==='sys')return `<div class="tstamp"><span>${esc(m.content)}</span></div>`;
  if(!m.id)m.id=uid();
  let inner=buildPart(c,m,me);
  const selecting=_sel&&_sel.id===c.id;
  const h=selecting?`onclick="toggleSel('${m.id}')"`:`onclick="msgMenu('${c.id}','${m.id}')"`;
  const tick=selecting?`<span style="align-self:center;font-size:20px;color:${_sel.ids.includes(m.id)?'#07c160':'#555'}">${_sel.ids.includes(m.id)?'☑':'⚪'}</span>`:'';
  return `<div class="msg ${me?'me':'them'}">${tick}<span ${h}>${av(me?S.me.avatar:c.avatar)}</span><div class="col" ${h}>${inner}</div></div>`;}
function buildPart(c,m,me){
  if(m.type==='image')return `<div class="imgmsg" onclick="event.stopPropagation();viewImg('${m.src}')"><img src="${m.src}"></div>`;
  if(m.type==='transfer')return payCard('t',m,me);
  if(m.type==='redpacket')return payCard('r',m,me);
  if(m.type==='location')return `<div class="card cloc"><div class="map">📍</div><div class="info"><div class="n">${esc(m.name)}</div><div class="a">${esc(m.address||'')}</div></div></div>`;
  if(m.type==='file')return `<div class="card cfile"><div class="ic">📄</div><div><div class="n">${esc(m.name)}</div><div class="s">${esc(m.size||'')}</div></div></div>`;
  if(m.type==='spycard')return `<div class="card"><div class="cpay" style="background:#5b6b9c"><div class="big">📱</div><div><div class="t1">小手机查看权限</div><div class="t2">已授权随时查看我的手机</div></div></div><div class="cfoot">权限卡片</div></div>`;
  return `<div class="bubble">${esc(m.content)}</div>`;}
function payCard(kind,m,me){const done=m.received;
  const cls='cpay '+(done?'done':kind);const ic=kind==='r'?'🧧':'💰';
  const t1=done?'已收款':(kind==='r'?esc(m.note||'恭喜发财'):'¥'+(+m.amount).toFixed(2));
  const t2=done?'¥'+(+m.amount).toFixed(2):(kind==='r'?'领取红包':esc(m.note||'转账'));
  const handler=(!me&&!done)?`onclick="event.stopPropagation();receivePay('${m.id}')"`:'';
  return `<div class="card" ${handler}><div class="${cls}"><div class="big">${ic}</div><div><div class="t1">${t1}</div><div class="t2">${t2}</div></div></div><div class="cfoot">微信${kind==='r'?'红包':'转账'}</div></div>`;}
function receivePay(mid){let found;for(const id in S.messages){const m=S.messages[id].find(x=>x.id===mid);if(m){found={m,id};break;}}
  if(!found||found.m.received)return;found.m.received=true;
  const fromName=(getC(found.id)?(getC(found.id).remark||getC(found.id).name):'对方');
  addBill('in',found.m.amount,'收到 '+fromName+' 的'+(found.m.type==='redpacket'?'红包':'转账'));
  msgs(found.id).push({role:'user',type:'sys',content:'你领取了'+(found.m.type==='redpacket'?'红包':'转账'),time:Date.now()});
  save();render();toast('已收款 +¥'+(+found.m.amount).toFixed(2)+' ❤️');}

function afterChat(id){const cb=$('#chatbg');if(cb)cb.scrollTop=cb.scrollHeight;
  const ta=$('#cinput');if(ta){ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,84)+'px';});
    ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText(id);}});}
  maybeProactive(id);maybeSpyIdle(id);}

function pushMsg(id,m){m.time=Date.now();if(m.role==='user'&&!m.id)m.id=uid();msgs(id).push(m);save();
  if(cur().p==='chat'&&cur().id===id){const cb=$('#chatbg');if(cb){const c=getC(id);cb.insertAdjacentHTML('beforeend',bubbleRow(c,m));cb.scrollTop=cb.scrollHeight;}}}

function sendText(id){const c=getC(id);if(c.blocked){toast('已拉黑，先解除吧');return;}
  const ta=$('#cinput');const t=ta.value.trim();if(!t)return;ta.value='';ta.style.height='auto';
  pushMsg(id,{role:'user',type:'text',content:t});scheduleReply(id);}

/* 拆分多条气泡 */
function splitBubbles(text){return (text||'').split('\n').map(s=>s.trim()).filter(Boolean);}
const CARD_RE=/^\[(转账|红包|位置|图片|文件)\|([^\]]*)\]$/;
function lineToMsg(line){const m=line.match(CARD_RE);if(!m)return {role:'assistant',type:'text',content:line};
  const f=m[2].split('|');
  if(m[1]==='转账')return {role:'assistant',type:'transfer',amount:+f[0]||0,note:f[1],received:false,id:uid()};
  if(m[1]==='红包')return {role:'assistant',type:'redpacket',amount:+f[0]||0,note:f[1],received:false,id:uid()};
  if(m[1]==='位置')return {role:'assistant',type:'location',name:f[0],address:f[1]};
  if(m[1]==='文件')return {role:'assistant',type:'file',name:f[0]||'文件',size:f[1]||''};
  return {role:'assistant',type:'text',content:'[图片]'+(f[0]?'：'+f[0]:'')};}

async function aiReply(id){const c=getC(id);if(c.blocked)return;
  // typing
  let typingEl;if(cur().p==='chat'&&cur().id===id){const cb=$('#chatbg');
    cb.insertAdjacentHTML('beforeend',`<div class="msg them" id="typing">${av(c.avatar)}<div class="col"><div class="bubble typing"><span></span><span></span><span></span></div></div></div>`);
    cb.scrollTop=cb.scrollHeight;typingEl=$('#typing');}
  try{
    const hist=msgs(id).slice(-(S.settings.hist||24)).map(m=>({role:m.role,content:msgToText(m)})).filter(x=>x.content!=null);
    let content=await chatAPI([{role:'system',content:buildSystem(c)},...hist]);
    // 联网
    const wq=content.match(/\[联网\|([^\]]*)\]/);
    if(wq&&S.settings.web&&S.settings.web.enabled){const r=await webSearch(wq[1]);
      content=await chatAPI([{role:'system',content:buildSystem(c)},...hist,{role:'system',content:'联网搜索"'+wq[1]+'"的结果：\n'+r+'\n请用中文据此自然回答，不要再输出[联网]标记。'}]);}
    if(typingEl)typingEl.remove();
    const lines=splitBubbles(content);let got=false;
    for(let i=0;i<lines.length;i++){
      const line=lines[i];
      if(/^\[联网\|/.test(line))continue;
      let mm=line.match(/^\[心情\|([^\]]*)\]$/);if(mm){c.mood=mm[1];save();if(cur().p==='chat'&&cur().id===id)render();continue;}
      mm=line.match(/^\[记住\|([^\]]*)\]$/);if(mm){c.memory=c.memory||[];if(mm[1]&&!c.memory.includes(mm[1])){c.memory.push(mm[1]);save();toast('🧠 已记住：'+mm[1].slice(0,12));}continue;}
      mm=line.match(/^\[闹钟\|([0-9]{1,2}:[0-9]{2})\|?([^\]]*)\]$/);if(mm){addAlarm(c.id,mm[1],mm[2]||'起床');continue;}
      mm=line.match(/^\[来电\|(语音|视频)\]$/);if(mm){const k=mm[1]==='视频'?'video':'voice';setTimeout(()=>incomingCall(c.id,k,'ta打来的'),600);continue;}
      await sleep(got?400+Math.random()*500:0);got=true;
      const msg=lineToMsg(line);msg.time=Date.now();msg.id=msg.id||uid();msgs(id).push(msg);save();
      notifyIncoming(c,msg);
      if(cur().p==='chat'&&cur().id===id){const cb=$('#chatbg');cb.insertAdjacentHTML('beforeend',bubbleRow(c,msg));cb.scrollTop=cb.scrollHeight;}
      else if(cur().p==='wechat')render();}
  }catch(e){if(typingEl)typingEl.remove();
    pushMsg(id,{role:'assistant',type:'text',content:'⚠️ '+e.message});}
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
let _replyTimers={};
function scheduleReply(id){clearTimeout(_replyTimers[id]);_replyTimers[id]=setTimeout(()=>aiReply(id),(Number(S.settings.replyDelay)||0)*1000);}
/* 提示音 + 通知 */
let _audio;function initAudio(){if(!_audio){try{_audio=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
document.addEventListener('click',()=>{initAudio();const liveLoc=S.contacts.some(c=>!c.deleted&&getSpy(c).loc);if(!S.weather||Date.now()-S.weather.time>(liveLoc?600000:72000000))fetchWeather();},{once:true});
function playDing(){if(!S.settings.sound||!_audio)return;try{const o=_audio.createOscillator(),g=_audio.createGain();o.connect(g);g.connect(_audio.destination);
  o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.001,_audio.currentTime);g.gain.exponentialRampToValueAtTime(.25,_audio.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.001,_audio.currentTime+.35);o.start();o.stop(_audio.currentTime+.36);}catch(e){}}
function notifyIncoming(c,msg){if(c.muted)return;playDing();
  if(document.hidden&&'Notification'in window&&Notification.permission==='granted'){try{new Notification(c.remark||c.name,{body:previewOf(msg)});}catch(e){}}}
/* 撤回 / 编辑消息 */
function msgMenu(cid,mid){const list=msgs(cid);const m=list.find(x=>x.id===mid);if(!m)return;
  const canEdit=m.type==='text';
  openModal(`<h3>消息操作</h3>
    ${canEdit?`<button class="btn g" style="margin-bottom:8px" onclick="editMsg('${cid}','${mid}')">✏️ 编辑</button>`:''}
    <button class="btn d" onclick="recallMsg('${cid}','${mid}')">↩️ 撤回</button>
    <button class="btn g" style="margin-top:8px" onclick="closeModal()">取消</button>`);}
function recallMsg(cid,mid){const list=msgs(cid);const i=list.findIndex(x=>x.id===mid);if(i<0)return;
  const me=list[i].role==='user';list.splice(i,1);
  list.splice(i,0,{role:me?'user':'assistant',type:'sys',content:(me?'你':'对方')+'撤回了一条消息',time:Date.now(),id:uid()});
  save();closeModal();render();}
function editMsg(cid,mid){const m=msgs(cid).find(x=>x.id===mid);if(!m)return;
  openModal(`<h3>编辑消息</h3><div class="field"><textarea id="em_t" rows="3">${esc(m.content)}</textarea></div>
    <div class="btns"><button class="btn g" onclick="closeModal()">取消</button><button class="btn p" onclick="(function(){var v=$('#em_t').value;var mm=msgs('${cid}').find(x=>x.id==='${mid}');mm.content=v;save();closeModal();render();})()">保存</button></div>`);}
function showMood(id){const c=getC(id);openModal(`<h3>💭 ${esc(c.remark||c.name)} 的心情</h3><div class="hint" style="font-size:14px;color:#ddd;line-height:1.7">${esc(c.mood||'…')}</div><button class="btn g" style="margin-top:10px" onclick="closeModal()">关闭</button>`);}
function c_mute(id){const c=getC(id);c.muted=!c.muted;save();render();}
function editMemory(id){const c=getC(id);c.memory=c.memory||[];
  openModal(`<h3>🧠 ${esc(c.remark||c.name)} 的记忆</h3>
    <div class="hint">这里的事 ta 每次都记得。你也能让 ta 在聊天里主动存。</div>
    <div class="field"><textarea id="mem_new" rows="2" placeholder="手动添加一条记忆…"></textarea></div>
    <button class="btn p" style="margin-bottom:12px" onclick="(function(){var v=$('#mem_new').value.trim();if(v){getC('${id}').memory.push(v);save();editMemory('${id}');}})()">➕ 添加</button>
    ${c.memory.length?c.memory.map((m,i)=>`<div class="bill" style="border-radius:8px;margin-bottom:6px"><div>${esc(m)}</div><div onclick="(function(){getC('${id}').memory.splice(${i},1);save();editMemory('${id}');})()" style="color:#fa5151;cursor:pointer">✕</div></div>`).join(''):'<div class="empty">还没有记忆</div>'}
    <button class="btn g" style="margin-top:10px" onclick="closeModal()">关闭</button>`);}

/* =================== 通话 =================== */
let _call=null,_ring=null,_callTimer=null;
function ringStart(){ringStop();if(!_audio)return;let on=false;
  _ring=setInterval(()=>{try{const o=_audio.createOscillator(),g=_audio.createGain();o.connect(g);g.connect(_audio.destination);
    o.frequency.value=on?660:520;o.type='sine';g.gain.setValueAtTime(.0001,_audio.currentTime);
    g.gain.exponentialRampToValueAtTime(.2,_audio.currentTime+.05);g.gain.exponentialRampToValueAtTime(.0001,_audio.currentTime+.5);
    o.start();o.stop(_audio.currentTime+.55);on=!on;}catch(e){}},650);
  if(navigator.vibrate)navigator.vibrate([400,200,400,200,400]);}
function ringStop(){if(_ring){clearInterval(_ring);_ring=null;}if(navigator.vibrate)navigator.vibrate(0);}
function blip(freq,dur){if(!_audio||!S.settings.sound)return;try{const o=_audio.createOscillator(),g=_audio.createGain();o.connect(g);g.connect(_audio.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(.2,_audio.currentTime);g.gain.exponentialRampToValueAtTime(.001,_audio.currentTime+dur);o.start();o.stop(_audio.currentTime+dur);}catch(e){}}
function incomingCall(id,kind){const c=getC(id);if(!c||c.blocked||_call)return;
  _call={id,kind,state:'incoming'};initAudio();ringStart();renderCall();}
function placeCall(id,kind){const c=getC(id);if(!c)return;initAudio();_call={id,kind,state:'outgoing'};renderCall();
  blip(600,.15);setTimeout(()=>{if(_call&&_call.state==='outgoing')answerCall(true);},1600);}
function answerCall(autoByThem){if(!_call)return;ringStop();blip(880,.12);
  _call.state='active';_call.start=Date.now();
  clearInterval(_callTimer);_callTimer=setInterval(renderCallTime,1000);renderCall();
  callAI('[系统：'+(autoByThem?S.me.name+'接通了你打的':'你接通了')+(_call.kind==='video'?'视频':'语音')+'电话，自然开口，口语化短句。]');}
function declineCall(){if(!_call)return;ringStop();blip(300,.3);const id=_call.id,wasIn=_call.state==='incoming';
  msgs(id).push({role:'user',type:'sys',content:wasIn?'你拒绝了通话':'通话已取消',time:Date.now(),id:uid()});save();
  _call=null;renderCall();if(cur().p==='chat')render();}
function hangupCall(){if(!_call)return;blip(300,.3);clearInterval(_callTimer);const id=_call.id;
  const dur=_call.start?Math.floor((Date.now()-_call.start)/1000):0;
  msgs(id).push({role:'user',type:'sys',content:'通话时长 '+Math.floor(dur/60)+':'+(dur%60).toString().padStart(2,'0'),time:Date.now(),id:uid()});save();
  _call=null;renderCall();if(cur().p==='chat')render();}
function renderCallTime(){if(!_call||_call.state!=='active')return;const s=$('#callStat');if(s){const d=Math.floor((Date.now()-_call.start)/1000);s.textContent=Math.floor(d/60)+':'+(d%60).toString().padStart(2,'0');}}
function renderCall(){const L=$('#callLayer');if(!_call){L.className='callscreen';L.innerHTML='';return;}
  const c=getC(_call.id);const video=_call.kind==='video';
  L.className='callscreen show'+(video?' video':'')+(_call.state==='active'?' active':'');
  const label=video?'视频通话':'语音通话';
  const stat=_call.state==='incoming'?('邀请你'+label):_call.state==='outgoing'?'正在呼叫…':'<span id="callStat">00:00</span>';
  let btns='';
  if(_call.state==='incoming')btns=`<div class="cbtncol"><div class="cbtn red" onclick="declineCall()">📵</div>拒绝</div><div class="cbtncol"><div class="cbtn green" onclick="answerCall()">📞</div>接听</div>`;
  else if(_call.state==='outgoing')btns=`<div class="cbtncol"><div class="cbtn red" onclick="declineCall()">📵</div>取消</div>`;
  else btns=`<div class="cbtncol"><div class="cbtn gray" onclick="document.getElementById('callInput').classList.toggle('show')">💬</div>说话</div><div class="cbtncol"><div class="cbtn red" onclick="hangupCall()">📵</div>挂断</div>`;
  L.innerHTML=`<div class="cav">${isImg(c.avatar)?`<img src="${c.avatar}">`:(c.avatar||'🙂')}</div>
    <div class="cname">${esc(c.remark||c.name)}</div><div class="cstat">${stat}</div>
    <div class="callsubs" id="callSubs"></div>
    <div class="callinput" id="callInput"><input id="callMsg" placeholder="说点什么…" onkeydown="if(event.key==='Enter')callSend()"><button onclick="callSend()">说</button></div>
    <div class="callbtns">${btns}</div>`;
  renderCallSubs();}
function renderCallSubs(){const box=$('#callSubs');if(!box||!_call)return;
  const list=(msgs(_call.id)||[]).filter(m=>m._call).slice(-6);
  box.innerHTML=list.map(m=>{const act=/^[（(]/.test(m.content);return `<div class="cb ${m.role==='user'?'me':''}" ${act?'style="font-style:italic;opacity:.75;background:transparent"':''}>${esc(m.content)}</div>`;}).join('');box.scrollTop=box.scrollHeight;}
function callSend(){const inp=$('#callMsg');if(!inp)return;const t=inp.value.trim();if(!t||!_call)return;inp.value='';
  msgs(_call.id).push({role:'user',type:'text',content:t,time:Date.now(),id:uid(),_call:true});save();renderCallSubs();callAI();}
async function callAI(sysNote){if(!_call)return;const c=getC(_call.id);const video=_call.kind==='video';
  try{const hist=msgs(c.id).slice(-(S.settings.hist||24)).map(m=>({role:m.role,content:msgToText(m)})).filter(x=>x.content!=null);
    if(sysNote)hist.push({role:'user',content:sysNote});
    const sys=buildSystem(c)+'\n\n# 正在通话\n你们正在'+(video?'视频':'语音')+'通话，用口语短句像打电话一样，别用卡片。'+(video?'\n视频里你能看到ta、ta也能看到你，可以用（括号）描写你的动作神态，比如（凑近镜头笑）。':'');
    const content=await chatAPI([{role:'system',content:sys},...hist]);
    if(!_call)return;
    await sleep((Number(S.settings.replyDelay)||0)*1000);if(!_call)return;
    splitBubbles(content).forEach(l=>{if(/^\[(转账|红包|位置|图片|文件|心情|记住|闹钟|来电|联网)\|/.test(l))return;msgs(c.id).push({role:'assistant',type:'text',content:l,time:Date.now(),id:uid(),_call:true});});
    save();renderCallSubs();if(!c.muted)blip(700,.08);
  }catch(e){msgs(c.id).push({role:'assistant',type:'text',content:'(信号不好…)',time:Date.now(),id:uid(),_call:true});renderCallSubs();}}

/* =================== 天气 =================== */
const WCODE={0:'晴',1:'晴',2:'多云',3:'阴',45:'雾',48:'雾',51:'小雨',53:'小雨',55:'雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'雪',75:'大雪',80:'阵雨',81:'阵雨',82:'大阵雨',95:'雷雨',96:'雷雨'};
function fetchWeather(manual){if(!navigator.geolocation){if(manual)toast('设备不支持定位');return;}
  navigator.geolocation.getCurrentPosition(async p=>{const la=p.coords.latitude,lo=p.coords.longitude;
    try{const w=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+la+'&longitude='+lo+'&current=temperature_2m,weather_code,precipitation').then(r=>r.json());
      let place='你所在的位置';try{const g=await fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+la+'&longitude='+lo+'&localityLanguage=zh').then(r=>r.json());place=(g.city||g.locality||g.principalSubdivision||'你所在的位置');}catch(e){}
      const code=w.current.weather_code,desc=WCODE[code]||'未知';
      S.weather={place,temp:Math.round(w.current.temperature_2m),desc,rain:(w.current.precipitation>0||[51,53,55,61,63,65,80,81,82,95,96].indexOf(code)>=0),time:Date.now()};
      save();if(manual)toast('🌦️ '+place+' '+desc+' '+S.weather.temp+'°C');if(cur().p==='settings')render();
    }catch(e){if(manual)toast('天气获取失败');}
  },()=>{if(manual)toast('定位被拒绝了');});}

  <button class="btn g" style="margin-top:10px" onclick="closeModal()">关闭</button>`);}

function checkAlarms(){const now=new Date();const hhmm=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');const tag=now.toDateString()+hhmm;
  S.alarms.forEach(a=>{if(a.enabled&&a.time===hhmm&&_alarmFired[a.id]!==tag){_alarmFired[a.id]=tag;if(!_call)incomingCall(a.contactId,'voice');}});}

/* 主动消息 */
async function maybeProactive(id){const c=getC(id);if(!c.proactive.enabled||c.blocked)return;
  const h=new Date().getHours();const inWin=c.proactive.start<=c.proactive.end?(h>=c.proactive.start&&h<c.proactive.end):(h>=c.proactive.start||h<c.proactive.end);
  if(!inWin)return;const lm=lastMsg(id);if(lm&&Date.now()-lm.time<2*3600000)return;
  const today=new Date().toDateString();const pc=S._proactiveCount[id]||{date:today,n:0};if(pc.date!==today){pc.date=today;pc.n=0;}
  if(pc.n>=(c.proactive.times||1))return;pc.n++;S._proactiveCount[id]=pc;save();
  const note='[系统：现在是'+hm()+'，'+S.me.name+'有一会儿没理你了，请你主动发起一段微信消息，自然一点。]';
  try{const content=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:note}]);
    splitBubbles(content).forEach(l=>{if(/^\[(联网)\|/.test(l))return;const mm=lineToMsg(l);if(mm.type==='text'&&/^\[(心情|记住|闹钟|来电)\|/.test(mm.content))return;mm.time=Date.now();msgs(id).push(mm);notifyIncoming(c,mm);});save();
    if(cur().p==='chat'&&cur().id===id)render();else if(cur().p==='wechat')render();
  }catch(e){}}

function spyBudget(id){const today=new Date().toDateString();const c=getSpy(getC(id));const pc=S._spyCount&&S._spyCount[id]||{date:today,n:0};if(pc.date!==today){pc.date=today;pc.n=0;}
  if(pc.n>=(c.times||2))return false;pc.n++;if(!S._spyCount)S._spyCount={};S._spyCount[id]=pc;save();return true;}
async function doSpyView(id,force){const c=getC(id);if(!c||c.blocked)return;const sp=getSpy(c);if(!sp.granted)return;

function maybeSpyIdle(id){const c=getC(id);if(!c)return;const sp=getSpy(c);if(!sp.granted)return;
  const lm=lastMsg(id);if(lm&&Date.now()-lm.time<2*3600000)return;doSpyView(id);}
let _spyFired={};
function checkSpyTime(){const now=new Date();const hhmm=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');const tag=now.toDateString()+hhmm;
  S.contacts.forEach(c=>{if(c.deleted)return;const sp=getSpy(c);if(sp.granted&&sp.time===hhmm&&_spyFired[c.id]!==tag){_spyFired[c.id]=tag;doSpyView(c.id,true);}});}

function openChat(id){const c=getC(id);if(c.blocked){toast('已拉黑');}stack=stack.filter(s=>s.p!=='chat');go('chat',{id});}

/* ---------- 备份 ---------- */
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='小手机备份_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('已导出');}
function importData(){pickFile('.json',f=>{const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.settings){S=Object.assign(defState(),d);save();render();toast('已导入');}}catch(e){toast('文件读不了');}};r.readAsText(f);});}

/* ---------- 时钟 & 启动 ---------- */
setInterval(()=>{const c=$('#clock');if(c)c.textContent=hm();if(cur().p==='home')$('#app').querySelector('.hh')&&($('#app').querySelector('.hh').textContent=hm());},1000);
render();
</script>
