<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="小手机" />
<link rel="apple-touch-icon" href="icon.png" />
<title>忆北的小手机 📱</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#ffd6e8,#d6e4ff 50%,#e3d6ff);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:12px;}
.phone{position:relative;width:380px;height:800px;max-height:97vh;background:#111;border-radius:48px;padding:12px;box-shadow:0 20px 60px rgba(255,143,171,.45);}
.screen{position:relative;width:100%;height:100%;border-radius:38px;overflow:hidden;display:flex;flex-direction:column;background:#ededed;}
.island{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:108px;height:26px;background:#000;border-radius:16px;z-index:99;}
.statusbar{height:42px;flex:0 0 42px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:13px;font-weight:600;color:#fff;z-index:5;}
.statusbar.dark{color:#111;}
#app{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.page{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
/* 顶栏 */
.nav{flex:0 0 46px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:#ededed;border-bottom:.5px solid #dadada;position:relative;z-index:3;}
.nav .t{font-size:17px;font-weight:600;color:#111;position:absolute;left:50%;transform:translateX(-50%);max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav .l,.nav .r{font-size:22px;color:#111;cursor:pointer;min-width:30px;z-index:1;}
.nav .r{text-align:right;}
.nav .l{font-size:25px;}
/* 主屏幕 */
.home{background:linear-gradient(160deg,#ffc8dd,#bde0fe 55%,#cdb4db);height:100%;display:flex;flex-direction:column;}
.home .clockw{color:#fff;text-align:center;margin-top:34px;text-shadow:0 2px 8px rgba(0,0,0,.15);}
.home .clockw .hh{font-size:62px;font-weight:300;letter-spacing:2px;}
.home .clockw .dd{font-size:15px;margin-top:2px;}
.apps{margin-top:auto;padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px 14px;}
.appswipe{margin-top:auto;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.appswipe::-webkit-scrollbar{display:none}
.apppage{flex:0 0 100%;display:grid;grid-template-columns:repeat(4,1fr);gap:20px 14px;padding:22px;scroll-snap-align:start;align-content:start;box-sizing:border-box}
.pgdots{display:flex;justify-content:center;gap:8px;padding:2px 0 6px}
.pgdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4)}
.pgdot.on{background:#fff}
.app{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.app .ic{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 6px 14px rgba(0,0,0,.12);background:#fff;}
.app span{font-size:11px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.25);}
.dock{margin:0 16px 18px;background:rgba(255,255,255,.35);border-radius:26px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;backdrop-filter:blur(8px);}
/* 列表通用 */
.list .row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border-bottom:.5px solid #f0f0f0;cursor:pointer;}
.list .row:active{background:#f5f5f5;}
.avatar{width:46px;height:46px;border-radius:9px;flex:0 0 46px;background:linear-gradient(135deg,#9ec5fe,#b8a4e3);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar.sm{width:38px;height:38px;flex-basis:38px;font-size:20px;border-radius:8px;}
.avatar.lg{width:64px;height:64px;flex-basis:64px;font-size:32px;border-radius:13px;}
.meta{flex:1;min-width:0;}
.meta .n{font-size:16px;color:#111;display:flex;align-items:center;gap:6px;}
.meta .s{font-size:13px;color:#999;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.meta .time{font-size:11px;color:#bbb;}
.pin{background:#f7f7f7;}
.tag{font-size:10px;background:#ffe0ea;color:#e0719a;border-radius:4px;padding:1px 5px;}
.badge{background:#fa5151;color:#fff;font-size:11px;border-radius:10px;padding:0 6px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
/* 底部tab */
.tabbar{flex:0 0 54px;display:flex;background:#f7f7f7;border-top:.5px solid #ddd;}
.tabbar .tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:#888;cursor:pointer;}
.tabbar .tb.on{color:#ff6fa5;}
.tabbar .tb .i{font-size:21px;}
/* 聊天 */
.chatbg{flex:1;overflow-y:auto;padding:12px 12px 8px;background:#ededed;}
.tstamp{text-align:center;margin:10px 0;}
.tstamp span{font-size:11px;color:#fff;background:#c5c5c5;padding:2px 7px;border-radius:4px;}
.msg{display:flex;margin:9px 0;align-items:flex-start;gap:8px;}
.msg .avatar{width:38px;height:38px;flex-basis:38px;font-size:20px;border-radius:7px;}
.col{display:flex;flex-direction:column;gap:4px;max-width:70%;}
.msg.me{flex-direction:row-reverse;}.msg.me .col{align-items:flex-end;}
.bubble{padding:8px 11px;border-radius:6px;font-size:15px;line-height:1.45;word-break:break-word;white-space:pre-wrap;position:relative;color:#111;max-width:100%;}
.msg.them .bubble{background:#fff;}
.msg.me .bubble{background:#95ec69;}
.typing span{display:inline-block;width:6px;height:6px;margin:0 1px;border-radius:50%;background:#aaa;animation:bk 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bk{0%,60%,100%{opacity:.25}30%{opacity:1}}
@keyframes pinshake{0%,100%{transform:translateX(0)}15%{transform:translateX(-9px)}30%{transform:translateX(8px)}45%{transform:translateX(-7px)}60%{transform:translateX(6px)}75%{transform:translateX(-4px)}90%{transform:translateX(2px)}}
.pinshake{animation:pinshake .5s}
.imgmsg{max-width:150px;border-radius:7px;overflow:hidden;cursor:pointer;}.imgmsg img{width:100%;display:block;}
.card{width:215px;border-radius:9px;overflow:hidden;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.cpay{padding:13px 14px;display:flex;align-items:center;gap:11px;color:#fff;}
.cpay.t{background:#f7a23b;}.cpay.r{background:#fa5151;}.cpay.done{background:#d9b48a;}
.cpay .big{font-size:30px;}.cpay .t1{font-size:16px;font-weight:600;}.cpay .t2{font-size:11px;opacity:.9;margin-top:2px;}
.cfoot{font-size:10px;padding:4px 14px;background:rgba(255,255,255,.18);color:#fff;}
.cloc{background:#fff;}.cloc .map{height:80px;background:linear-gradient(135deg,#cfe9c8,#a8d8e8);display:flex;align-items:center;justify-content:center;font-size:28px;}
.cloc .info{padding:8px 11px;}.cloc .n{font-size:14px;font-weight:600;}.cloc .a{font-size:11px;color:#999;margin-top:2px;}
.cfile{background:#fff;display:flex;align-items:center;padding:11px;gap:10px;}.cfile .ic{font-size:32px;}.cfile .n{font-size:13px;word-break:break-all;}.cfile .s{font-size:11px;color:#999;}
/* 输入栏 */
.inputbar{flex:0 0 auto;display:flex;align-items:flex-end;gap:7px;padding:7px 9px;background:#f7f7f7;border-top:.5px solid #ddd;}
.inputbar .plus{flex:0 0 auto;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;cursor:pointer;background:linear-gradient(135deg,#ffb6c9,#b8a4e3);box-shadow:0 2px 6px rgba(184,164,227,.5);transition:transform .15s;}
.inputbar .plus:active{transform:scale(.9) rotate(90deg);}
.inputbar textarea{flex:1;border:none;border-radius:6px;padding:8px 10px;font-size:15px;resize:none;max-height:84px;min-height:20px;line-height:1.3;outline:none;font-family:inherit;background:#fff;}
.inputbar .send{background:linear-gradient(135deg,#ffa0c8,#ff6fa5);border:none;color:#fff;font-size:14px;font-weight:600;padding:8px 13px;border-radius:6px;cursor:pointer;}
.panel{display:none;padding:0;background:#f7f7f7;border-top:.5px solid #eee;}
.panel.show{display:block;}
.ptabs{display:flex;gap:16px;padding:8px 16px 0;}
.ptabs span{font-size:13px;color:#888;padding:4px 2px;cursor:pointer;border-bottom:2px solid transparent;}
.ptabs span.on{color:#ddd;border-bottom-color:#ff8fab;}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 16px;}
.ppage{padding:10px 12px;max-height:210px;overflow-y:auto;}
.panel .it{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.panel .it .b{width:52px;height:52px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.panel .it span{font-size:11px;color:#666;}
/* 朋友圈 */
.mcover{height:200px;background:linear-gradient(135deg,#a18cd1,#fbc2eb);position:relative;}
.mcover .me{position:absolute;right:14px;bottom:-20px;display:flex;align-items:flex-end;gap:10px;}
.mcover .me .nm{color:#fff;font-weight:600;font-size:16px;text-shadow:0 1px 3px rgba(0,0,0,.3);margin-bottom:24px;}
.mcover .me .avatar.lg{border:2px solid #fff;}
.mpost{display:flex;gap:11px;padding:16px 14px;border-bottom:.5px solid #eee;background:#fff;}
.mpost .body{flex:1;min-width:0;}
.mpost .au{font-size:15px;color:#5b6b9c;font-weight:600;}
.mpost .tx{font-size:14px;color:#222;margin:5px 0;line-height:1.5;white-space:pre-wrap;}
.mpost .imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:6px 0;}
.mpost .imgs .ph{aspect-ratio:1;border-radius:6px;background:linear-gradient(135deg,#f0f0f0,#dfe6f0);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;}
.mpost .imgs .ph img{width:100%;height:100%;object-fit:cover;}
.mpost .ft{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.mpost .tm{font-size:11px;color:#bbb;}
.mpost .acts{font-size:18px;color:#5b6b9c;cursor:pointer;}
.mpost .likes{background:#f7f7f7;border-radius:6px;padding:6px 9px;font-size:13px;color:#5b6b9c;margin-top:7px;}
.mpost .cmts{background:#f7f7f7;border-radius:0 0 6px 6px;padding:4px 9px;}
.mpost .cmt{font-size:13px;color:#333;padding:3px 0;}.mpost .cmt b{color:#5b6b9c;font-weight:600;}
/* 我的钱包 */
.wallet{margin:14px;border-radius:18px;background:linear-gradient(145deg,#2bb36a,#0a9c52);padding:22px;color:#fff;}
.wallet .lb{font-size:13px;opacity:.85;}.wallet .ba{font-size:34px;font-family:Georgia,serif;margin:8px 0;}
.bill{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:.5px solid #f0f0f0;background:#fff;font-size:14px;}
.bill small{display:block;color:#aaa;margin-top:3px;font-size:11px;}
.bill .pos{color:#19a463;}.bill .neg{color:#333;}
/* 表单/弹窗 */
.modal{position:absolute;inset:0;background:rgba(0,0,0,.42);z-index:200;display:none;align-items:center;justify-content:center;padding:18px;}
.modal.show{display:flex;}
.sheet{width:100%;max-height:86%;overflow-y:auto;background:#fff;border-radius:18px;padding:18px 16px;}
.sheet h3{font-size:17px;margin-bottom:10px;color:#222;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:600;}
.field input,.field textarea,.field select{width:100%;border:1px solid #e3e3e3;border-radius:10px;padding:9px 11px;font-size:14px;font-family:inherit;outline:none;background:#fafafa;}
.field textarea{resize:vertical;min-height:54px;line-height:1.5;}
.two{display:flex;gap:10px;}.two .field{flex:1;}
.section{background:#fff;margin:10px 0;border-radius:12px;overflow:hidden;}
.section .it{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:.5px solid #f2f2f2;font-size:15px;color:#222;cursor:pointer;}
.section .it:last-child{border-bottom:none;}
.section .it .v{color:#999;font-size:13px;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.section .it.danger{color:#fa5151;}
.btn{border:none;border-radius:12px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;width:100%;}
.btn.p{background:linear-gradient(135deg,#ffa0c8,#ff6fa5);color:#fff;}.btn.g{background:#f0f0f0;color:#555;}.btn.d{background:#fa5151;color:#fff;}
.btns{display:flex;gap:10px;margin-top:6px;}.btns .btn{flex:1;}
.hint{font-size:12px;color:#999;line-height:1.5;margin-bottom:10px;}
.fab{position:absolute;right:16px;bottom:70px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#ffa0c8,#ff6fa5);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(255,111,165,.45);cursor:pointer;z-index:8;}
.toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;font-size:13px;padding:9px 16px;border-radius:20px;z-index:500;opacity:0;transition:.25s;pointer-events:none;max-width:80%;text-align:center;}
.toast.show{opacity:1;}
.usebadge{position:absolute;top:46px;right:8px;z-index:420;background:rgba(108,92,231,.82);color:#fff;font-size:11px;padding:3px 9px;border-radius:12px;display:none;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.35);font-variant-numeric:tabular-nums;}
.usebadge.warn{background:rgba(232,82,82,.9);}
.viewer{position:absolute;inset:0;background:rgba(0,0,0,.92);z-index:600;display:none;align-items:center;justify-content:center;}
.viewer.show{display:flex;}.viewer img{max-width:96%;max-height:96%;}
.avline{display:flex;align-items:center;gap:10px;}
.minibtn{background:#f0f0f0;border:none;border-radius:9px;padding:8px 10px;font-size:12px;color:#555;cursor:pointer;white-space:nowrap;}
.empty{text-align:center;color:#bbb;font-size:13px;padding:30px 0;}
.sw{width:44px;height:25px;border-radius:13px;background:#ccc;position:relative;transition:.2s;flex:0 0 44px;cursor:pointer;}
.sw.on{background:#ff6fa5;}.sw:after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;}
.sw.on:after{left:21px;}
/* ========== 暗色 + 全屏 ========== */
body{background:#000;padding:0;}
.phone{width:100vw;height:100vh;max-height:none;border-radius:0;padding:0;background:#000;box-shadow:none;}
.screen{border-radius:0;background:#000;}
.island{display:none;}
.statusbar,.statusbar.dark{color:#fff;}
.nav{background:#1c1c1e;border-bottom:.5px solid #2a2a2c;}
.nav .t{color:#f2f2f2;}.nav .l,.nav .r{color:#f2f2f2;}
.list .row{background:#1c1c1e;border-bottom:.5px solid #2a2a2c;}
.list .row:active{background:#262628;}
.list .row.pin{background:#202024;}
.meta .n{color:#f2f2f2;}.meta .s{color:#8e8e93;}.meta .time{color:#666;}
.tabbar{background:#1c1c1e;border-top:.5px solid #2a2a2c;}.tabbar .tb{color:#888;}
.chatbg{background:#0d0d0d;}
.tstamp span{background:#3a3a3c;color:#bbb;}
.msg.them .bubble{background:#2c2c2e;color:#ececec;}
.msg.me .bubble{background:linear-gradient(135deg,#ffd6e8,#ffc0d6);color:#6b2942;}
.bubble{color:#ececec;}
.msgt{font-size:10px;color:#888;margin-top:2px;padding:0 2px;}
.moodbar{padding:7px 14px;background:#181820;color:#b9a6e0;font-size:12px;border-bottom:.5px solid #2a2a2c;display:flex;align-items:center;gap:6px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.inputbar{background:#1c1c1e;border-top:.5px solid #2a2a2c;}
.inputbar textarea{background:#2c2c2e;color:#f0f0f0;}
.panel{background:#1c1c1e;border-top:.5px solid #2a2a2c;}.panel .it span{color:#bbb;font-size:11px;}
.panel .it .b{width:54px;height:54px;border-radius:16px;font-size:26px;background:linear-gradient(145deg,#2f2f37,#26262c);box-shadow:0 4px 10px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.05);transition:transform .12s;}
.panel .it:active .b{transform:scale(.92);}
.section{background:#1c1c1e;}
.section .it{color:#f0f0f0;border-bottom:.5px solid #2a2a2c;}.section .it .v{color:#888;}
.sheet{background:#1c1c1e;color:#f0f0f0;}.sheet h3{color:#f5f5f5;}
.field label{color:#bbb;}
.field input,.field textarea,.field select{background:#2c2c2e;border:1px solid #38383a;color:#f0f0f0;}
.minibtn{background:#2c2c2e;color:#ccc;}.btn.g{background:#2c2c2e;color:#ddd;}
.bill{background:#1c1c1e;color:#f0f0f0;border-bottom:.5px solid #2a2a2c;}.bill .neg{color:#eee;}
.mpost{background:#1c1c1e;border-bottom:.5px solid #2a2a2c;}.mpost .tx{color:#eaeaea;}
.mpost .likes,.mpost .cmts{background:#262628;}.mpost .cmt{color:#ddd;}
.cloc,.cfile{background:#2c2c2e;}.cloc .n,.cfile .n{color:#eee;}
.empty{color:#666;}.hint{color:#888;}
.home{background:linear-gradient(160deg,#3a2a52,#241d3d 45%,#3a2440 100%);position:relative;}
.home:before{content:"";position:absolute;top:8%;left:-10%;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,182,201,.35),transparent 70%);filter:blur(6px);pointer-events:none;}
.home:after{content:"";position:absolute;bottom:18%;right:-12%;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(157,140,227,.3),transparent 70%);filter:blur(6px);pointer-events:none;}
.home .clockw{position:relative;z-index:1;}
.hwidget{position:relative;z-index:1;margin:18px 22px 0;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);border-radius:18px;padding:14px 16px;border:1px solid rgba(255,255,255,.12);}
.hwidget .hg{color:#fff;font-size:16px;font-weight:600;}
.hwidget .hw{color:rgba(255,255,255,.8);font-size:13px;margin-top:4px;}
.app .ic{background:rgba(255,255,255,.12);box-shadow:0 6px 16px rgba(0,0,0,.25);position:relative;z-index:1;}
.apps,.dock{position:relative;z-index:1;}
.dock{background:rgba(255,255,255,.12);backdrop-filter:blur(10px);}
/* ===== 通话 ===== */
.callscreen{position:absolute;inset:0;z-index:450;display:none;flex-direction:column;align-items:center;color:#fff;background:linear-gradient(165deg,#34344a,#16161e);}
.callscreen.show{display:flex;}
.callscreen.mini{inset:auto;top:44px;left:8px;right:auto;width:auto;height:auto;flex-direction:row;align-items:center;gap:8px;padding:6px 10px;border-radius:26px;background:rgba(18,18,26,.96);border:1px solid #4a4a5a;box-shadow:0 4px 18px rgba(0,0,0,.55);z-index:456;}
.callscreen.mini .cav{margin:0;}
.callscreen.video{background:radial-gradient(circle at 50% 30%,#2a3a4a,#0a0a10);}
.callscreen .cav{margin-top:88px;width:100px;height:100px;border-radius:24px;font-size:48px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#444;}
.callscreen .cav img{width:100%;height:100%;object-fit:cover;}
.callscreen.video.active .cav{position:absolute;right:14px;top:54px;width:92px;height:130px;border-radius:12px;margin:0;z-index:2;}
.callscreen .cname{font-size:24px;margin-top:18px;font-weight:600;}
.callscreen .cstat{font-size:14px;color:#cfcfcf;margin-top:8px;}
.callsubs{position:absolute;bottom:200px;left:0;right:0;max-height:34%;overflow-y:auto;padding:0 18px;display:flex;flex-direction:column;gap:8px;}
.callsub{position:absolute;bottom:190px;left:0;right:0;padding:0 26px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center;}
.csline{font-size:18px;color:#fff;line-height:1.5;text-shadow:0 1px 6px rgba(0,0,0,.6);animation:csin .3s ease;}

function lastRounds(arr,n){if(!arr||!arr.length)return arr||[];n=Math.max(1,n|0);
  const starts=[];let curCall=null;
  for(let i=0;i<arr.length;i++){const m=arr[i];if(!m)continue;
    if(m._call){const cs='cs'+(m._cs||'x');if(cs!==curCall){curCall=cs;starts.push(i);}}
    else{curCall=null;if(m.role==='user')starts.push(i);}}

  const k=Math.max(0,starts.length-n);let r=arr.slice(starts[k]);
  if(r.length>160)r=r.slice(r.length-160);return r;}

function getVoice(o){if(!o.voice)o.voice={engine:'system',voiceURI:'',rate:1,pitch:1,lang:'zh'};return o.voice;}
function stripSpoken(t){return (t||'').replace(/[（(【][^）)】]*[）)】]/g,'').replace(/\[[^\]]*\]/g,'').replace(/[*_~`#>]/g,'').trim();}
// 通话朗读：外语角色只读外语原文。英/韩用"剔除所有中文字符"的硬办法，
// 不依赖模型有没有写对括号，所以中文翻译永远不会被读出来。
const CJK_RE=/[\u3400-\u4dbf\u4e00-\u9fff\uf900-\ufaff]/g;
const CN_PUNCT_RE=/[（）()「」『』【】《》〈〉、，。．！？；：…—～·“”‘’]/g;
function hasForeign(text,lang){if(!lang||lang==='zh')return true;const re=lang==='韩'?/[가-힣]/:lang==='日'?/[぀-ヿ]/:/[A-Za-z]/;return re.test(text||'');}
function pickSpoken(text,lang){
  let t=(text||'').replace(/【[^】]*】/g,'').replace(/\[[^\]]*\]/g,'').replace(/[*_~`#>]/g,'').trim();
  if(!lang||lang==='zh')return t.replace(/[（(][^）)]*[）)]/g,'').trim();
  if(lang==='日'){const s=t.replace(/[（(][^）)]*[）)]/g,'').trim();return /[぀-ヿ]/.test(s)?s:'';}
  // 英 / 韩：把所有中文汉字和中文标点都抹掉，只留外语
  let s=t.replace(CJK_RE,' ').replace(CN_PUNCT_RE,' ').replace(/\s+/g,' ').trim();
  const ok=lang==='韩'?/[가-힣]/.test(s):/[A-Za-z]/.test(s);
  return ok?s:'';}
const CJK_TEST=new RegExp(CJK_RE.source);
function hasCN(s){return CJK_TEST.test(s||'');}
// 把通话里的一句转成"中文版"，喂给文字聊天的历史，免得他照抄电话里的外语格式
function callToCN(text){let t=(text||'').replace(/【[^】]*】/g,'').replace(/\[[^\]]*\]/g,'').trim();
  const m=t.match(/[（(]([^）)]*)[）)]/);if(m&&hasCN(m[1]))return m[1].trim();      // 取括号里的中文翻译
  const cn=t.replace(/[A-Za-z가-힣぀-ヿ]/g,'').replace(/[（()）]/g,'').replace(/\s+/g,' ').trim();
  return hasCN(cn)?cn:'';}                                                          // 纯外语那句就丢掉
// 文字聊天里若冒出"外语（中文）"的电话格式，自动取中文显示（纯中文的不动）
function deCallFmt(line){if(!/[A-Za-z가-힣぀-ヿ]/.test(line))return line;
  const m=line.match(/[（(]([^）)]*)[）)]/);if(m&&hasCN(m[1]))return m[1].trim();return line;}
// 通话里是否跑偏成中文（整句中文、又不是括号翻译）
function callDrifted(content,lang){if(!lang||lang==='zh')return false;
  return splitBubbles(content).some(l=>{l=(l||'').trim();if(!l)return false;
    if(/^\[.*\]$/.test(l))return false;                       // 标签行
    if(/^[（(][^）)]*[）)]$/.test(l))return false;             // 纯括号翻译
    const noAct=l.replace(/【[^】]*】/g,'').replace(/[（(][^）)]*[）)]/g,'').trim();
    if(!noAct)return false;
    return hasCN(noAct)&&!hasForeign(noAct,lang);});}

function _mBubHTML(o){if(!o||!o.text)return '';const pink=o.side==='l';const bgc=pink?'rgba(255,143,171,.96)':'rgba(255,255,255,.96)';

function mShowBub(side,text){if(!text)return;if(_mBub[side]&&_mBub[side]._t)clearTimeout(_mBub[side]._t);

function mSessTick(){const el=document.getElementById('m_sesstime');const sess=S.music&&S.music.session;

  const live=((S.music&&S.music.totalSec)||0)+Math.floor((Date.now()-sess.startTs)/1000);
  if(el)el.textContent=fmtListen(live);}
function musicInit(){if(!S.music)S.music={songs:[],session:null,loop:false,chat:[]};S.music.songs=S.music.songs||[];S.music.chat=S.music.chat||[];if(S.music.totalSec==null)S.music.totalSec=0;if(S.music.distance==null)S.music.distance=1400;}
function mIDB(){return new Promise((res,rej)=>{const r=indexedDB.open('yibeiMusic',1);r.onupgradeneeded=e=>{try{e.target.result.createObjectStore('audio');}catch(_){}};r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej();});}
function mPut(k,b){return mIDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('audio','readwrite');tx.objectStore('audio').put(b,k);tx.oncomplete=()=>res();tx.onerror=()=>rej();}));}
function mGet(k){return mIDB().then(db=>new Promise((res)=>{const tx=db.transaction('audio','readonly');const q=tx.objectStore('audio').get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null);}));}
function mDelIDB(k){return mIDB().then(db=>new Promise((res)=>{const tx=db.transaction('audio','readwrite');tx.objectStore('audio').delete(k);tx.oncomplete=()=>res();tx.onerror=()=>res();})).catch(()=>{});}

let _sync=null;
function fmtLrc(sec){sec=Math.max(0,sec||0);const m=Math.floor(sec/60),s=Math.floor(sec%60),cs=Math.floor((sec*100)%100);return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(cs).padStart(2,'0');}
function musicSync(id){musicInit();const s=S.music.songs.find(x=>x.id===id);if(!s){toast('没这首歌');return;}
  const raw=(s.lyrics||'').split('\n').map(l=>l.replace(/\[[^\]]*\]/g,'').trim()).filter(Boolean);
  if(!raw.length){toast('先把纯歌词(一行一句)粘进去再打轴');return;}
  if(_mCur!==id)musicPlay(id);
  _sync={id,lines:raw,idx:0,stamps:[]};syncRender();}
function syncRender(){if(!_sync)return;const cur=_ma?_ma.currentTime:0;const done=_sync.idx>=_sync.lines.length;

  openModal(`<h3>🎯 打轴 · 跟着歌点</h3>

    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">

    </div>
    <div style="max-height:36vh;overflow:auto;background:#141416;border-radius:10px;padding:8px 10px;margin-bottom:10px">${lines}${done?'<div style="color:#2bd66a;text-align:center;padding:8px">✅ 全部打完了，点「保存时间轴」</div>':''}</div>
    <div class="btns"><button class="btn g" onclick="syncBack()">↩ 退一句</button>${done?'':`<button class="btn p" onclick="syncMark()">⏱ 标记这一句</button>`}</div>
    <div class="btns" style="margin-top:8px"><button class="btn g" onclick="_sync=null;closeModal()">取消</button><button class="btn p" onclick="syncSave()">保存时间轴</button></div>`);}
function syncMark(){if(!_sync||!_ma)return;_sync.stamps[_sync.idx]=_ma.currentTime;_sync.idx=Math.min(_sync.lines.length,_sync.idx+1);syncRender();}
function syncBack(){if(!_sync)return;if(_sync.idx>0){_sync.idx--;_sync.stamps[_sync.idx]=null;}syncRender();}

async function musicPlay(id){musicInit();const s=S.music.songs.find(x=>x.id===id);if(!s)return;

// 把当前所在页面映射到 LOCKABLE 的 appKey；不在任何受控软件里返回 null
function curAppKey(){const p=cur().p;
  const map={browser:'browser',spy:'spy',shop:'shop',shopcs:'shop',calendar:'calendar',food:'food',mail:'mail',gs:'games',uc:'games',off:'offline',x:'x',xtweet:'x',xdm:'x',xuser:'x',dy:'douyin',dydm:'douyin'};
  if(map[p])return map[p];
  if(p==='wechat'&&wxTab==='moments')return 'moments';
  return null;}
// 今日额度（分钟）+ 今日加时（秒），仅授权软件
function limitSecOf(key){if(!(S.couple&&S.couple.cid))return 0;const g=S.couple.grant||{};const tl=S.couple.timeLimit||{};
  if(!g[key]||!tl[key])return 0;const au=ensureUsage();return tl[key]*60+(au.bonus[key]||0);}
function ensureUsage(){const today=todayStr();if(!S.me.appUsage||S.me.appUsage.date!==today){S.me.appUsage={date:today,used:{},bonus:{}};}
  S.me.appUsage.used=S.me.appUsage.used||{};S.me.appUsage.bonus=S.me.appUsage.bonus||{};return S.me.appUsage;}
function usedSecOf(key){const au=ensureUsage();return au.used[key]||0;}
let _useSaveT=0;
function usageTick(){const el=$('#useBadge');const hide=()=>{if(el)el.style.display='none';};
  if(document.hidden||!(S.couple&&S.couple.cid))return hide();
  const key=curAppKey();const g=S.couple.grant||{};
  // 只有「授权」的软件才记录时长、才有倒计时
  if(!key||!g[key])return hide();
  if(appLocked(key))return hide();
  const au=ensureUsage();au.used[key]=(au.used[key]||0)+1;          // 授权软件：统计已用时长（后台/查手机都看得到）
  const limit=limitSecOf(key);                                      // 设了上限才倒计时+自动锁
  if(limit>0){const remain=limit-au.used[key];
    if(remain<=0){S.couple.locks=S.couple.locks||{};if(!S.couple.locks[key])S.couple.locks[key]={pwd:0,time:Date.now(),auto:true};
      save();hide();toast('⏰「'+(LOCKABLE[key]||key)+'」今天的时间用完啦，被自动锁上了，去求ta解开~');home();return;}
    if(el){const m=Math.floor(remain/60),s=remain%60;el.style.display='block';
      el.textContent='⏳ '+(LOCKABLE[key]||'')+' '+m+':'+String(s).padStart(2,'0');
      el.className='usebadge'+(remain<=60?' warn':'');}}

function toggleWorld(id){const w=S.worldbook.find(x=>x.id===id);w.enabled=!w.enabled;save();render();}

  const wc=w.contacts||[];const cs=S.contacts.filter(c=>!c.deleted);
  openModal(`<h3>${id?'编辑':'新建'}世界书</h3>
    <div class="field"><label>名称</label><input id="w_name" value="${esc(w.name)}" placeholder="比如：世界观/某个地点"></div>
    <div class="field"><label>触发关键词（逗号分隔，常驻可不填）</label><input id="w_keys" value="${esc(w.keys)}" placeholder="苏州,公司"></div>
    <div class="field"><label>内容</label><textarea id="w_content" rows="4">${esc(w.content)}</textarea></div>
    <div class="field"><label class="avline">常驻（每次都生效）<span class="sw ${w.always?'on':''}" id="w_always" onclick="this.classList.toggle('on')"></span></label></div>
    <div class="field"><label>对谁生效（都不选=所有角色共享）</label>
      ${cs.length?cs.map(c=>`<label class="avline" style="font-weight:400">${esc(c.remark||c.name)}<span class="sw ${wc.indexOf(c.id)>=0?'on':''}" data-ct="${c.id}" onclick="this.classList.toggle('on')"></span></label>`).join(''):'<div style="font-size:12px;color:#999">还没有角色</div>'}</div>

const HOLIDAYS={'01-01':'元旦','02-14':'情人节','03-08':'女神节','05-01':'劳动节','05-20':'520','06-01':'儿童节','10-01':'国庆节','12-24':'平安夜','12-25':'圣诞节','12-31':'跨年'};
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function holidayOf(dateStr){const md=dateStr.slice(5);return HOLIDAYS[md]||'';}

const MOOD_EMOJIS=['😊','🥰','😌','😐','😔','😣','😡','😭','😴','🤒'];
function moodToday(who){const t=todayStr();return (S.mood||[]).find(m=>m.date===t&&m.who===who);}
function logMyMood(emoji){const t=todayStr();S.mood=S.mood||[];let e=S.mood.find(m=>m.date===t&&m.who==='me');if(e){e.emoji=emoji;e.time=Date.now();}else S.mood.unshift({id:uid(),date:t,who:'me',emoji,note:'',time:Date.now()});if(S.mood.length>150)S.mood=S.mood.slice(0,150);save();render();toast('记下今天心情啦 '+emoji);}
function myMoodNote(){const t=todayStr();let e=(S.mood||[]).find(m=>m.date===t&&m.who==='me');const v=prompt('今天想记点啥心情？（他能看到）',e?e.note:'');if(v==null)return;S.mood=S.mood||[];if(e){e.note=v.trim();}else S.mood.unshift({id:uid(),date:t,who:'me',emoji:'📝',note:v.trim(),time:Date.now()});save();render();}
function moodDel(mid){if(!confirm('删掉这条心情记录？'))return;S.mood=(S.mood||[]).filter(m=>m.id!==mid);save();render();}
async function recordTaMood(cid){const c=getC(cid);if(!c||c.blocked)return;const t=todayStr();if((S.mood||[]).some(m=>m.date===t&&m.who===cid))return;
  const mine=(S.mood||[]).find(m=>m.date===t&&m.who==='me');
  try{const sys=buildSystem(c)+'\n\n# 现在：在你手机「每日心情表」里记今天的一条\n关于'+S.me.name+'今天的状态、你俩今天的事、你的心情感受，记一句。'+(mine?'（ta今天自己记的心情是：'+(mine.emoji||'')+' '+(mine.note||'')+'，你可以体贴地回应这个）':'')+'\n只输出一行：开头一个最贴切的emoji + 空格 + 一句不超过28字的心情记录，别的都不要、别带方括号。';
    const r=await chatAPI([{role:'system',content:sys},{role:'user',content:'记今天'}],{max:80,aux:true});
    let line=cleanReply(r).replace(/\n/g,' ').trim();if(!line)return;
    const em=(line.match(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{2764}\u{2728}]/u)||['🙂'])[0];
    let note=line.replace(em,'').replace(/^[\s,，。、]+/,'').slice(0,40)||line.slice(0,40);
    S.mood=S.mood||[];S.mood.unshift({id:uid(),date:t,who:cid,emoji:em,note,time:Date.now()});if(S.mood.length>150)S.mood=S.mood.slice(0,150);save();if(cur().p==='calendar')render();
  }catch(e){}}

function tw(id){return S.x.tweets.find(t=>t.id===id);}
function xAuthor(name){if(name===S.me.name){xTab='me';if(cur().p==='x')render();else go('x');}else go('xuser',{name});}
function xlog(s){S.x._mylog=S.x._mylog||[];S.x._mylog.push(s);if(S.x._mylog.length>12)S.x._mylog.shift();}
function parseArr(r){let t=(r||'').trim();const fb=t.match(/```(?:json)?\s*([\s\S]*?)```/);if(fb)t=fb[1];const a=t.indexOf('['),b=t.lastIndexOf(']');if(a>=0&&b>a)t=t.slice(a,b+1);t=t.replace(/,(\s*[\]}])/g,'$1');return JSON.parse(t);}
function parseObj(r){let t=(r||'').trim();const fb=t.match(/```(?:json)?\s*([\s\S]*?)```/);if(fb)t=fb[1];const a=t.indexOf('{'),b=t.lastIndexOf('}');if(a>=0&&b>a)t=t.slice(a,b+1);t=t.replace(/,(\s*[\]}])/g,'$1');return JSON.parse(t);}
function parseLines(r){return (r||'').split('\n').map(l=>l.trim()).filter(l=>l&&/(:::|：：：|｜｜|\|\|)/.test(l)).map(l=>l.replace(/^[\d.、\-\s]+/,'').split(/:::|：：：|｜｜|\|\|/).map(x=>x.trim()));}
function looseLines(r){const rows=parseLines(r);if(rows.length)return rows;
  return (r||'').split('\n').map(l=>l.trim()).filter(l=>l&&l.length>1&&!/^[#>`\-*]/.test(l)).map(l=>['用户'+(10+Math.floor(Math.random()*89)),'@u'+Math.floor(Math.random()*9999),l.replace(/^[\d.、\-\s"“]+/,'').replace(/[":：].*?[:：]/,'').slice(0,140)]);}
function letterAv(s){s=(s||'').replace(/[@\s]/g,'');const ch=s&&/[a-zA-Z]/.test(s[0])?s[0].toUpperCase():(s[0]||'U');return ch;}
function jq(s){return "'"+String(s||'').replace(/'/g,'’').replace(/"/g,'”')+"'";}
function clean(s){return String(s||'').replace(/["'@]/g,'').trim();}
if(!S.x)S.x=defState().x;['tweets','dms','following','blocked'].forEach(k=>{if(!Array.isArray(S.x[k]))S.x[k]=[];});S.x.circle=S.x.circle||{};S.x.users=S.x.users||{};S.x.profile=Object.assign({handle:'@me',bio:'',fans:0,following:0,cover:''},S.x.profile||{});

if(!S.browser)S.browser={q:'',items:[],history:[]};

if(S.couple&&S.couple.walletAuth===undefined)S.couple.walletAuth=false;
if(S.couple&&S.couple.cardFrozen===undefined)S.couple.cardFrozen=false;
if(S.couple&&S.couple.jailAuth===undefined)S.couple.jailAuth=false;
if(!S.jail)S.jail={active:false};
if(S.couple&&S.couple.gagAuth===undefined){S.couple.gagAuth=S.contacts.filter(x=>!x.deleted&&x.id!==S.couple.cid).map(x=>x.id);save();}
if(!S.me.sleep)S.me.sleep={active:null,records:[]};
if(!S.me.report)S.me.report={active:null,log:[]};

['feed','liked','following','dms','history','mine'].forEach(k=>{if(!Array.isArray(S.dy[k]))S.dy[k]=[];});S.dy.users=S.dy.users||{};S.dy.profile=Object.assign({nick:'',avatar:null,bio:'记录美好生活✨'},S.dy.profile||{});
// 上下文从「条」改为「回合」：老数据把条数÷2换算成回合，只迁移一次

function cleanupOld(){const DAY=86400000,now=Date.now();let ch=false;
  if(S.moments){const n=S.moments.length;S.moments=S.moments.filter(p=>now-(p.time||0)<DAY);if(S.moments.length!==n)ch=true;}
  if(S.x&&S.x.tweets){const n=S.x.tweets.length;S.x.tweets=S.x.tweets.filter(t=>now-(t.time||0)<DAY);if(S.x.tweets.length!==n)ch=true;}
  if(S.x&&S.x.dms){S.x.dms.forEach(d=>{d.msgs=(d.msgs||[]).filter(m=>!m.time||now-m.time<DAY);});const n=S.x.dms.length;S.x.dms=S.x.dms.filter(d=>(d.msgs||[]).length);if(S.x.dms.length!==n)ch=true;}
  (S.me.accounts||[]).forEach(a=>{if(a.bills){const n=a.bills.length;a.bills=a.bills.filter(b=>!b.ts||now-b.ts<DAY);if(a.bills.length!==n)ch=true;}});
  const act=(S.me.accounts||[]).find(a=>a.id===actId());if(act)S.me.bills=act.bills;
  if(S.visitors){const n=S.visitors.length;S.visitors=S.visitors.filter(v=>now-(v.time||0)<DAY);if(S.visitors.length!==n)ch=true;}// 查岗/查看记录一天后自动清
  if(ch){save();const c=cur();if(c&&(c.p==='wechat'||c.p==='x'))render();}}
setInterval(cleanupOld,600000);setTimeout(cleanupOld,5000);
function xUser(name,info){if(!S.x.users[name])S.x.users[name]=Object.assign({name,handle:'@user',avatar:letterAv(name),bio:'',fans:Math.floor(Math.random()*9000),following:Math.floor(Math.random()*500),cid:null},info||{});else if(info)Object.assign(S.x.users[name],info);return S.x.users[name];}

function xtb(k,t){return `<div class="xt ${xTab===k?'on':''}" onclick="xTab='${k}';render()">${t}</div>`;}
let _feedTab='follow';
function xFeed(){let ts=[...S.x.tweets].filter(t=>!S.x.blocked.includes(t.name)).sort((a,b)=>b.time-a.time);
  const isFollow=t=>t.who==='me'||(t.who&&t.who!=='net')||S.x.following.includes(t.name);
  const shown=_feedTab==='follow'?ts.filter(isFollow):ts.filter(t=>!isFollow(t));
  const tabs=`<div class="xtabs" style="flex:0 0 auto"><div class="xt ${_feedTab==='follow'?'on':''}" onclick="_feedTab='follow';render()">关注</div><div class="xt ${_feedTab==='discover'?'on':''}" onclick="_feedTab='discover';render()">发现</div>${_feedTab==='discover'?'<span onclick="clearDiscover()" style="position:absolute;right:12px;line-height:46px;color:#71767b;font-size:12px;cursor:pointer">清空</span>':''}</div>`;
  const body=shown.length?shown.map(tweetCard).join(''):`<div class="empty" style="padding:46px 20px;line-height:2">${_feedTab==='follow'?'关注的人还没发推～<br>点 ＋ 发一条，或「让角色发一条推」':'点右上 🔄 刷新看看网友动态'}<br><br>${_feedTab==='follow'?'<button class="xbtn" onclick="genContactTweet()">让角色发一条推</button>':'<button class="xbtn" onclick="genNetTweets(\'\')">🔄 刷新网友</button>'}</div>`;
  return tabs+body;}
function tweetCard(t){const liked=(t.likes||[]).includes(S.me.name);const lc=(t.lk||0)+(t.likes||[]).length;
  return `<div class="tweet" onclick="go('xtweet',{id:'${t.id}'})"><span onclick="event.stopPropagation();xAuthor(${jq(t.name)})">${av(t.avatar,'sm')}</span>
    <div class="body"><div class="head"><span class="nm" onclick="event.stopPropagation();xAuthor(${jq(t.name)})">${esc(t.name)}</span><span class="hd">${esc(t.handle||'')} · ${ago(t.time)}</span></div>
    <div class="tx">${esc(t.text)}</div>
    ${t.images&&t.images.length?`<div class="imgs" style="grid-template-columns:repeat(${Math.min(t.images.length,2)},1fr);display:grid;gap:4px;margin:4px 0;border-radius:10px;overflow:hidden">${t.images.map(im=>`<img src="${im}" style="width:100%;border-radius:8px" onclick="event.stopPropagation();viewImg('${im}')">`).join('')}</div>`:''}
    <div class="acts"><span onclick="event.stopPropagation();go('xtweet',{id:'${t.id}'})">💬 ${(t.comments||[]).length}</span>
      <span onclick="event.stopPropagation();xRepost('${t.id}')">🔁 ${t.rt||0}</span>
      <span class="${liked?'liked':''}" onclick="event.stopPropagation();xLike('${t.id}')">${liked?'❤️':'🤍'} ${lc}</span>
      <span onclick="event.stopPropagation();xUserMenu('${t.id}')">⋯</span></div></div></div>`;}
function xLike(id){const t=tw(id);if(!t)return;t.likes=t.likes||[];const i=t.likes.indexOf(S.me.name);if(i<0){t.likes.push(S.me.name);xlog('在X上点赞了'+t.name+'的推文「'+t.text.slice(0,14)+'」');}else t.likes.splice(i,1);save();render();}
function xRepost(id){const t=tw(id);if(!t)return;t.rt=(t.rt||0)+1;save();render();toast('已转推');}

  openModal(`<h3>${esc(t.name)} ${esc(t.handle||'')}</h3>
    <button class="btn g" style="margin-bottom:8px" onclick="closeModal();go('xuser',{name:${jq(t.name)}})">👤 查看主页</button>

    <button class="btn g" style="margin-top:8px" onclick="closeModal()">关闭</button>`);}

function xBlock(id){const t=tw(id);const i=S.x.blocked.indexOf(t.name);if(i<0)S.x.blocked.push(t.name);else S.x.blocked.splice(i,1);save();closeModal();render();}
function xBlockName(name){const i=S.x.blocked.indexOf(name);if(i<0){S.x.blocked.push(name);const fi=S.x.following.indexOf(name);if(fi>=0){S.x.following.splice(fi,1);S.x.profile.following=Math.max(0,S.x.profile.following-1);}toast('已拉黑 '+name);}else{S.x.blocked.splice(i,1);toast('已解除拉黑');}save();render();}
function xUnfollow(name){const i=S.x.following.indexOf(name);if(i>=0){S.x.following.splice(i,1);S.x.profile.following=Math.max(0,S.x.profile.following-1);save();xFollowingList();}}
function xFollowingList(){const list=S.x.following.slice();
  openModal(`<h3>正在关注（${list.length}）</h3><div style="max-height:60vh;overflow:auto">${list.length?list.map(n=>{const u=xUser(n);return `<div class="section"><div class="it">${av(u.avatar,'sm')}<div class="meta" style="flex:1" onclick="closeModal();go('xuser',{name:${jq(n)}})"><div class="n">${esc(n)}</div><div class="s">${esc(u.handle||u.bio||'')}</div></div><button class="minibtn" onclick="xUnfollow(${jq(n)})">取关</button></div></div>`;}).join(''):'<div class="empty">还没关注谁～去刷推/搜博主关注</div>'}</div><button class="btn g" style="margin-top:8px" onclick="closeModal()">关闭</button>`);}
function fwdTweet(id){const t=tw(id);const cs=S.contacts.filter(c=>!c.deleted);if(!cs.length){toast('先创建角色');return;}
  window._fwT=t;if(cs.length===1)return doFwdTweet(cs[0].id);

function doXPost(){const t=$('#xc_t').value.trim();if(!t&&!(window._xcImgs||[]).length)return;const pop=Math.floor((S.x.profile.fans||0)*(0.02+Math.random()*0.12));const tweet={id:uid(),who:'me',name:S.me.name,handle:S.x.profile.handle,avatar:S.me.avatar,text:t,images:window._xcImgs||[],time:Date.now(),likes:[],lk:pop,comments:[],rt:Math.floor(pop*Math.random()*0.3),views:Math.floor((S.x.profile.fans||0)*(1+Math.random()*4)+50),time:Date.now()};
  S.x.tweets.unshift(tweet);xlog('在X发推：「'+t.slice(0,20)+'」');save();closeModal();render();toast('已发布');reactToTweet(tweet);}
function fanCount(min,max){const f=(S.x.profile.fans||0);return Math.max(min,Math.min(max,Math.round(f/250)+min));}
async function reactToTweet(tweet){
  const n=fanCount(3,9);
  try{const r=await chatAPI([{role:'system',content:'你是X网友评论生成器。针对"'+tweet.name+'"发的推，生成'+n+'条不同网友的简短评论（吃瓜、调侃、共鸣、抬杠黑子都行；其中1-2条可以@楼上某个网友名跟着接话，形成楼层互动）。每行一条，严格用格式：昵称:::@英文id:::评论内容。不要别的话。'},{role:'user',content:'推文："'+tweet.text+'"'}],{max:900,aux:true});
    looseLines(r).forEach(p=>{const nm=clean(p[0]);if(!nm)return;tweet.comments.push({name:nm,avatar:letterAv(p[1]||nm),text:p[2]||p[1]||''});xUser(nm,{handle:p[1]});});save();if(cur().p==='x'||cur().p==='xtweet')render();}catch(e){}
  // 发帖影响粉丝
  if(tweet.who==='me'){const d=Math.floor(Math.random()*40)-8;S.x.profile.fans=Math.max(0,(S.x.profile.fans||0)+d);save();if(d>0)toast('📈 涨粉 +'+d);else if(d<0)toast('📉 掉粉 '+d);}
  const authorCid=(tweet.who&&tweet.who!=='me'&&tweet.who!=='net')?tweet.who:null;
  const ats=S.contacts.filter(c=>!c.deleted&&!c.blocked&&c.id!==authorCid&&tweet.text.includes(c.name));
  const pool=ats.length?ats:S.contacts.filter(c=>!c.deleted&&!c.blocked&&c.id!==authorCid).slice(0,1);
  for(const c of pool){try{const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'"'+tweet.name+'"在X发了条推："'+tweet.text+'"'+(tweet.text.includes(c.name)?'（@了你）':'')+'。你刷到了，以你自己的身份和视角评论一句（这不是你发的推；口语；别带方括号）。'}],{aux:true});
    tweet.comments.push({name:c.name,avatar:c.avatar,cid:c.id,text:cleanReply(r).slice(0,50)});save();if(cur().p==='x'||cur().p==='xtweet')render();}catch(e){}}}
function genContactTweet(){const cs=S.contacts.filter(c=>!c.deleted);if(!cs.length){toast('先创建角色');return;}
  if(cs.length===1)return doGenContactTweet(cs[0].id);
  openModal(`<h3>谁来发推</h3>${cs.map(c=>`<div class="section"><div class="it" onclick="closeModal();doGenContactTweet('${c.id}')">${esc(c.remark||c.name)}<span class="v">›</span></div></div>`).join('')}<button class="btn g" style="margin-top:8px" onclick="closeModal()">取消</button>`);}
async function doGenContactTweet(cid){const c=getC(cid);toast('生成中…');
  try{const _co=circleObj(cid);const note=_co.desc?'。你在X的圈子'+(_co.name?'「'+_co.name+'」':'')+'定位是：'+_co.desc+'，推文风格要贴合它':'';
    const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'以你的身份发一条推特(X)'+note+'，一两句，符合你的性格，只输出推文内容，别带方括号。'}],{aux:true});
    const nm=c.name;xUser(nm,{handle:'@'+c.name.replace(/\s/g,''),avatar:c.avatar,cid:cid,bio:c.signature||''});
    S.x.tweets.unshift({id:uid(),who:cid,name:nm,handle:'@'+c.name.replace(/\s/g,''),avatar:c.avatar,text:cleanReply(r),time:Date.now(),likes:[],lk:Math.floor(Math.random()*80),comments:[],rt:Math.floor(Math.random()*40)});save();render();
  }catch(e){toast('生成失败');}}
async function xRefresh(){if(xTab==='dm')return genNetDM();if(xTab==='search')return toast('在搜索框里点搜索按钮');return genNetTweets('');}
async function genNetTweets(topic){toast('刷新中…');
  try{const r=await chatAPI([{role:'system',content:'你是X(推特)内容生成器，每行一条，严格用格式：昵称:::@英文id:::推文内容。不要序号、不要别的话。'},{role:'user',content:'生成5条不同网友的【原创推文】'+(topic?'，都围绕主题"'+topic+'"（是各自独立发的帖子，不是评论、不是回复别人、不要以@或"回复"开头）':'（日常/搞笑/情感/热点都行）')+'。'}],{max:800,aux:true});
    const rows=looseLines(r);if(!rows.length)throw new Error('empty');const made=[];rows.forEach(p=>{const nm=clean(p[0]);if(!nm)return;xUser(nm,{handle:p[1]});const t={id:uid(),who:'net',name:nm,handle:p[1]||'@user',avatar:letterAv(p[1]||nm),text:p[2]||p[1]||'',time:Date.now()-Math.floor(Math.random()*5400000),likes:[],lk:Math.floor(Math.random()*2000),comments:[],rt:Math.floor(Math.random()*400)};S.x.tweets.unshift(t);made.push(t);});
    save();if(topic)S.x._results=made.map(t=>t.id);render();
  }catch(e){toast('刷新失败，再点一次');}}

function dyLike(id){const v=dyVid(id);if(!v)return;v.liked=!v.liked;

  else S.dy.liked=S.dy.liked.filter(x=>x.id!==v.id);
  const fv=S.dy.feed.find(x=>x.id===id);if(fv)fv.liked=v.liked;
  const lv=S.dy.liked.find(x=>x.id===id);if(lv)lv.liked=v.liked;
  if(cur().p==='dy'&&dyTab==='feed')dyKeepScroll(save);else{save();render();}}
async function dyGenFeed(topic,replace){toast('加载视频中…');
  try{const r=await chatAPI([{role:'system',content:'你是抖音短视频内容生成器。生成5条不同的短视频信息，类型要杂（搞笑/萌宠/美食/风景/舞蹈/剧情/知识/情感都行）。只输出JSON数组，不要解释：[{"author":"博主昵称","handle":"@英文id","desc":"视频文案/标题(一句，可带#话题)","narration":"旁白：详细描写这条视频里到底是什么画面、发生了什么(2-4句，像在跟人讲这视频拍了啥)","music":"背景音乐名","emoji":"一个最能代表画面的emoji"}]'},{role:'user',content:topic?('围绕「'+topic+'」生成相关的短视频。'):'生成一批热门推荐短视频。'}],{max:1100,aux:true});
    const arr=parseArr(r);if(!Array.isArray(arr)||!arr.length)throw new Error('empty');
    const vids=arr.map((o,i)=>({id:uid(),author:clean(o.author)||'用户'+(10+Math.floor(Math.random()*89)),handle:o.handle||'@user',avatar:'🎵',cid:null,desc:o.desc||'',narration:o.narration||'',music:o.music||'原创音乐',emoji:(o.emoji||'🎬').slice(0,2),grad:DY_GRADS[Math.floor(Math.random()*DY_GRADS.length)],lk:Math.floor(Math.random()*90000),comments:[],ts:Date.now()}));
    if(replace)S.dy.feed=vids;else S.dy.feed=S.dy.feed.concat(vids);
    if(S.dy.feed.length>40)S.dy.feed=S.dy.feed.slice(-40);
    save();if(cur().p==='dy')render();const f=$('#dyfeed');if(replace&&f)f.scrollTop=0;
  }catch(e){toast('加载失败，再点一次');}}

      <div>${h.map((q,i)=>`<span class="dychip"><span onclick="dyDoSearch(${jq(q)})">${esc(q)}</span><span onclick="dyDelHistory(${i})" style="color:#666;margin-left:2px">✕</span></span>`).join('')}</div>`:'<div class="empty" style="padding:30px;color:#888">搜你想看的，比如「猫咪」「美食教程」「治愈风景」</div>'}

  openModal(`<h3>💬 评论（${v.comments.length}）</h3>

async function dyCharReplyComment(v,c,t){try{const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:S.me.name+'在抖音视频"'+(v.desc||'')+'"下评论/@了你："'+t+'"，回ta一句（口语，别带方括号）。'}],{max:120,aux:true});
  v.comments.push({name:c.remark||c.name,avatar:c.avatar,cid:c.id,text:cleanReply(r).slice(0,50)});save();if(dyModalOpen())dyComments(v.id);}catch(e){}}

async function dyGenCommentsCore(v,opts){opts=opts||{};v.comments=v.comments||[];
  try{const r=await chatAPI([{role:'system',content:'你是抖音评论区生成器。针对一条短视频生成'+(opts.net||5)+'条不同网友的简短评论（搞笑/共鸣/夸赞/玩梗/抬杠都行，符合抖音风格，'+(opts.mine?'这是个漂亮女生发的，可以有夸她好看、搭讪的':'')+'）。每行一条，格式：昵称:::评论内容。不要别的话。'},{role:'user',content:'视频文案："'+(v.desc||'')+'"，画面："'+(v.narration||'')+'"'}],{max:700,aux:true});
    (r||'').split('\n').map(l=>l.trim()).filter(Boolean).forEach(l=>{const p=l.replace(/^[\d.、\-\s]+/,'').split(/:::|：：：|\|\||：|:/);const nm=clean(p[0]);if(!nm||/^http/.test(nm))return;const tx=(p.slice(1).join('：')||p[0]||'').trim();if(tx)v.comments.push({name:nm,avatar:letterAv(nm),text:tx.slice(0,60)});});save();if(dyModalOpen())dyComments(v.id);
  }catch(e){}
  // 关注的角色（及恋人）也来评论
  let cs=S.contacts.filter(c=>!c.deleted&&!c.blocked&&S.dy.following.includes(c.id));
  if(opts.mine&&S.couple&&S.couple.cid){const lover=getC(S.couple.cid);if(lover&&!lover.blocked&&!cs.find(x=>x.id===lover.id))cs.unshift(lover);}
  for(const c of cs.slice(0,opts.chars||2)){try{const rr=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'你在抖音刷到'+(opts.mine?S.me.name+'（你恋人）':'一个人')+'发的视频，文案："'+(v.desc||'')+'"，画面："'+(v.narration||'')+'"。以你的身份评论一句'+(opts.mine?'（可以宠溺/吃醋/占有欲，毕竟是你对象发的）':'')+'（口语，别带方括号）。'}],{max:120,aux:true});
    v.comments.push({name:c.remark||c.name,avatar:c.avatar,cid:c.id,text:cleanReply(rr).slice(0,50)});save();if(dyModalOpen())dyComments(v.id);}catch(e){}}}

/* ---------- 任务便签（他给我布置每日任务）---------- */
let _taskBusy=false;
function taskC(){return (S.couple&&getC(S.couple.cid))||S.contacts.find(x=>!x.deleted&&!x.blocked&&isLover(x))||S.contacts.find(x=>!x.deleted&&!x.blocked)||null;}
function tasksToday(c){const t=c&&c.tasks;return (t&&t.date===todayStr())?t:null;}
function _taskNorm(s){return (''+s).replace(/[\s，。、！!？?.~…：:；;「」『』""''（）()]/g,'');}
// 判断 text 是否和 list 里已有任务重复：一模一样 / 子串 / 共享强关键字(检讨等) / 关键字高度重合
const _TASK_KW=['检讨','保证书','小作文','作文','情书','彩虹屁','道歉信','认错书'];
function taskDup(list,text){const nt=_taskNorm(text);if(!nt)return true;const setT=new Set(nt);
  const kwT=_TASK_KW.filter(k=>nt.includes(k));
  return (list||[]).some(x=>{const nx=_taskNorm(x.text);if(!nx)return false;
    if(nx===nt)return true;
    if(Math.min(nx.length,nt.length)>=3&&(nx.includes(nt)||nt.includes(nx)))return true;
    if(kwT.some(k=>nx.includes(k)))return true;/* 都是"写检讨/作文/保证书"这类同义任务 */
    const setX=new Set(nx);let inter=0;setT.forEach(ch=>{if(setX.has(ch))inter++;});
    const shorter=Math.min(setT.size,setX.size);
    return shorter>=3&&inter/shorter>=0.8;/* 短任务的字几乎都在另一条里→重复 */});}
function taskVerifyLabel(x){return {steps:'🏃 我走够了',essay:'✍️ 写好交给ta',moment:'✅ 我发朋友圈了',tweet:'✅ 我发推了',douyin:'✅ 我发抖音了',real:'✅ 完成了'}[x.verify]||'✅ 完成';}
function postedSince(kind,since){since=since||0;
  if(kind==='moment')return S.moments.some(p=>p.authorId==='me'&&(p.time||0)>since);
  if(kind==='tweet')return (S.x&&S.x.tweets||[]).some(t=>t.who==='me'&&(t.time||0)>since);
  if(kind==='douyin')return (S.dy&&S.dy.mine||[]).some(v=>(v.ts||0)>since);
  return false;}
function renderTasks(){const c=taskC();

      <div class="it"><span>每天布置时间</span><span class="v"><input id="tk_time" type="time" value="${c.taskTime||'09:00'}" style="border:1px solid #38383a;border-radius:6px;padding:4px;background:#2c2c2e;color:#eee"> <button class="minibtn" onclick="(function(){taskC().taskTime=$('#tk_time').value||'09:00';save();toast('每天'+taskC().taskTime+'布置');})()">存</button></span></div>

        <div style="margin:8px 0;font-size:15px;line-height:1.5;${x.done?'color:#888;text-decoration:line-through':'color:#eee'}">${esc(x.text)}</div>

      </div></div>`).join('')}
      <div class="hint" style="padding:6px 16px">手机任务会真的验证（作文要交给ta看、发布类要真发了、步数要够），别糊弄~ 现实任务靠你自觉，骗ta的话线下要罚的😏</div>`;}
  return `<div class="nav"><span class="l" onclick="home()">‹</span><span class="t">📋 任务便签</span><span class="r"></span></div>
    <div class="scroll" style="background:#000">${body}<div style="height:20px"></div></div>`;}
async function genTasks(){const c=taskC();if(!c){toast('先创建恋人角色');return;}if(tasksToday(c)){toast('今天的任务ta已经布置过啦');return;}if(_taskBusy)return;
  checkTaskPenalty(c);_taskBusy=true;render();toast('ta在琢磨今天怎么安排你…');
  const n=c.taskN||3;
  try{const allowed='essay（写小作文/检讨/彩虹屁/想你的话/保证书，target填字数上限如100）、moment（发一条朋友圈）、tweet（发一条推特X）、douyin（发一条抖音）、real（现实里的小事或暧昧亲密小任务，靠她自觉打卡，比如：喝杯水、好好吃饭、敷面膜、早点睡、给你拍张自拍、睡前跟你撒娇道晚安、对着镜头说想你、穿你喜欢的小裙子拍给你、乖乖只想你一个、今天不准跟别的男生聊天等）';
    const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'[系统：现在你来给'+S.me.name+'布置今天的 '+n+' 条小任务。你是ta的恋人/掌控者，按你的人设、此刻心情、ta最近的表现来布置。\n· 任务一定要【有趣、有创意、好玩】，别死板、别像打卡清单、别每天千篇一律——可以整点花活、玩梗、设小情境。\n· 多来点【暧昧、撩人、亲密】的，而且要以【Dom的姿态】来布置：命令式、强势、掌控欲拉满，把ta当你的小sub来调教，语气笃定带点危险又宠溺，要ta乖乖服从听话。可以大胆放得开、带点涩，越让ta脸红心跳、心甘情愿被你拿捏越好（保持是两个相爱的人之间有掌控有宠爱的情趣，不用拘谨）。\n· 现实任务一定要轻松，别累人：绝对不要罚跑步/暴走/喝很多杯水那种。\n大部分任务要是【在手机上就能完成的】(essay/moment/tweet/douyin)，可以有一两条现实任务(real)。每条必须从这些可验证类型里选一个：'+allowed+'。\n只输出JSON数组、不要任何解释：[{"text":"任务描述(用你的第一人称口吻，强势Dom的命令语气，像在调教/撩/宠你的小sub，可以霸道也可以俏皮有梗)","kind":"app或real","verify":"类型代码","target":数字(没有填0)}]'}],{max:700});
    const arr=parseArr(r);if(!Array.isArray(arr)||!arr.length)throw 0;
    const list=[];for(const o of arr){if(list.length>=n)break;const text=(o.text||'').toString().slice(0,140);if(!text||taskDup(list,text))continue;/* 跳过重复任务 */
      list.push({id:uid(),text,kind:o.kind==='real'?'real':'app',verify:['essay','moment','tweet','douyin','real'].indexOf(o.verify)>=0?o.verify:'real',target:+o.target||0,done:false});}
    if(!list.length)throw 0;
    c.tasks={date:todayStr(),assignTs:Date.now(),list,rewarded:false,penalized:false};save();_taskBusy=false;render();toast('任务来咯📋');
    if(!c.blocked)scheduleReply(c.id,'[系统：你刚在'+S.me.name+'手机的任务便签里给ta布置了今天的任务，跟ta说一声、催ta【今天23:59之前】完成、说说不完成的后果，一两句，符合你人设。别逐条复述任务。]');
  }catch(e){_taskBusy=false;render();toast('没布置成功，再点一次');}}
function completeTask(id){const c=taskC();const t=tasksToday(c);if(!t)return;const x=t.list.find(z=>z.id===id);if(!x||x.done)return;
  if(x.verify==='essay'){openEssay(id);return;}
  if(x.verify==='steps'){if(!confirm('完成这条了吗？（步数任务已取消，点确定即可完成）'))return;}
  if(x.verify==='moment'&&!postedSince('moment',t.assignTs)){toast('布置任务后还没发朋友圈哦，发一条再来点完成');return;}
  if(x.verify==='tweet'&&!postedSince('tweet',t.assignTs)){toast('布置任务后还没发推哦，发一条再来');return;}
  if(x.verify==='douyin'&&!postedSince('douyin',t.assignTs)){toast('布置任务后还没发抖音哦，去发一条');return;}
  if(x.verify==='real'&&!confirm('确定真的完成了这条现实任务吗？\n骗ta的话…线下见面要受罚的哦😏')){return;}
  finishTask(c,x);}
function finishTask(c,x,proof){x.done=true;x.doneTs=Date.now();save();render();toast('完成啦 ✅');
  if(!c.blocked)scheduleReply(c.id,'[系统：'+S.me.name+'完成了你今天布置的任务「'+x.text+'」'+(proof?'，ta把内容发到你们聊天里了，先看一眼':'')+'。简短回应一句（夸ta/调侃/继续端着都行，符合你人设）。]');
  checkAllDone(c);}
function checkAllDone(c){const t=tasksToday(c);if(!t||t.rewarded)return;if(t.list.length&&t.list.every(x=>x.done)){t.rewarded=true;save();

function openEssay(id){const c=taskC();const t=tasksToday(c);const x=t&&t.list.find(z=>z.id===id);if(!x)return;const max=x.target||100;
  openModal(`<h3>✍️ 交作业</h3><div class="hint">${esc(x.text)}<br>（${max}字以内，至少10字，认真写，ta会看的~）</div>

function submitEssay(id,max){const ta=$('#essay_t');const v=(ta?ta.value:'').trim();if(v.length<10){toast('至少写10个字啦，别糊弄~');return;}if(v.length>max){toast('超字数了，'+max+'字以内');return;}

  pushMsg(c.id,{role:'user',type:'text',content:'【作业·'+x.text+'】\n'+v,id:uid()});closeModal();finishTask(c,x,v);}
function checkTaskPenalty(c){const t=c&&c.tasks;if(!t||t.date===todayStr()||t.penalized)return;
  const undone=t.list.filter(x=>!x.done);t.penalized=true;
  if(undone.length){grudgesOf(c).unshift({id:uid(),text:t.date+' 没完成我布置的任务（差'+undone.length+'条：'+undone.map(x=>x.text).join('、').slice(0,36)+'）',done:false,ts:Date.now()});

function wxChats(){
  const list=[...S.contacts].filter(c=>!c.deleted&&(isMain()||addedHere(c)||msgs(c.id).length)).sort((a,b)=>{
    if(a.pinned!==b.pinned)return a.pinned?-1:1;
    return (lastMsg(b.id)?.time||0)-(lastMsg(a.id)?.time||0);});
  const groups=isMain()?(S.groups||[]):[];
  const banner=isMain()?'':`<div style="padding:8px 12px;background:#3a2d4a;color:#d6c2f0;font-size:12px;text-align:center">🪪 当前身份：${esc(S.me.name)}（在「我」里可切换/搜微信号加人）</div>`;
  let html=banner+'<div class="list">';
  groups.forEach(g=>{const lm=g.msgs[g.msgs.length-1];html+=`<div class="row" onclick="go('group',{id:'${g.id}'})">${g.avatar?av(g.avatar):'<div class="avatar" style="background:#7c6cc0">👥</div>'}<div class="meta"><div class="n">${esc(g.name)}(${g.members.length+1})</div><div class="s">${lm?esc(gpreview(lm)):'群聊已创建'}</div></div><div style="text-align:right"><div class="meta time">${lm?hm(lm.time):''}</div></div></div>`;});
  if(!list.length&&!groups.length)return banner+'<div class="empty">'+(isMain()?'右上角 ＋ 新建角色或发起群聊～':'这个身份还没加谁～<br>去「通讯录」搜微信号加人')+'</div>';
  html+=list.map(c=>{const lm=lastMsg(c.id);
    return `<div class="row ${c.pinned?'pin':''}" onclick="openChat('${c.id}')">${av(c.avatar)}
      <div class="meta"><div class="n">${esc(c.remark||c.name)} ${c.blocked?'<span class=tag>已拉黑</span>':''}</div>
      <div class="s">${lm?esc(previewOf(lm)):'打个招呼吧～'}</div></div>
      <div style="text-align:right"><div class="meta time">${lm?hm(lm.time):''}</div>${c.pinned?'<div style="font-size:10px;color:#ccc">置顶</div>':''}</div></div>`;}).join('');
  return html+'</div>';
}

function gMsgMenu(gid,mid){const g=S.groups.find(x=>x.id===gid);if(!g)return;const m=g.msgs.find(x=>x.id===mid);if(!m||m.type==='sys')return;const me=m.senderId==='me';

function gDelOne(gid,mid){const g=S.groups.find(x=>x.id===gid);if(!g)return;g.msgs=g.msgs.filter(m=>m.id!==mid);save();closeModal();render();toast('已删除');}
function gRecallMsg(gid,mid){const g=S.groups.find(x=>x.id===gid);if(!g)return;const i=g.msgs.findIndex(m=>m.id===mid);if(i<0)return;const me=g.msgs[i].senderId==='me';g.msgs[i]={senderId:'me',role:'user',type:'sys',content:(me?'你':'对方')+'撤回了一条消息',time:g.msgs[i].time,id:mid};save();closeModal();render();}

function gToggleSel(mid){if(!_gmsel)return;const i=_gmsel.ids.indexOf(mid);if(i<0)_gmsel.ids.push(mid);else _gmsel.ids.splice(i,1);render();}
function gDelSelected(id){if(!_gmsel||!_gmsel.ids.length){toast('先选几条');return;}if(!confirm('删除选中的 '+_gmsel.ids.length+' 条？'))return;const g=S.groups.find(x=>x.id===id);if(g)g.msgs=g.msgs.filter(m=>_gmsel.ids.indexOf(m.id)<0);_gmsel=null;save();render();toast('已删除');}
function gForwardOne(gid,mid){closeModal();_gfwd={gid,ids:[mid]};pickTarget(gDoForward);}
function gForwardSelected(id){if(!_gmsel||!_gmsel.ids.length){toast('先选几条');return;}_gfwd={gid:id,ids:_gmsel.ids.slice()};pickTarget(gDoForward);}
function gDoForward(toId){if(!_gfwd)return;const g=S.groups.find(x=>x.id===_gfwd.gid);const c=getC(toId);if(!g||!c){_gfwd=null;return;}
  const picked=g.msgs.filter(m=>_gfwd.ids.indexOf(m.id)>=0&&m.type!=='sys');

function groupSendCard(id,type){const g=S.groups.find(x=>x.id===id);if(!g){closeModal();return;}

  const amt=Math.max(0,+v||0);if(!amt){toast('金额填错了');return;}

  addBill('out',amt,'群里'+(type==='redpacket'?'发红包':'转账'));

function groupRels(id){const g=S.groups.find(x=>x.id===id);if(!g)return;g.rels=g.rels||[];_grelGid=id;

  else if(_grelMode==='1vN')picker=`<div class="field"><label>谁</label><select id="grel_a" style="width:100%;border:1px solid #38383a;border-radius:8px;padding:8px;background:#2c2c2e;color:#eee">${opt()}</select></div><div class="field"><label>对这些人（点选可多选）</label><div>${chips()}</div></div>`;
  else picker=`<div class="field"><label>这些人（点选可多选）</label><div>${chips()}</div></div><div class="field"><label>对谁</label><select id="grel_b" style="width:100%;border:1px solid #38383a;border-radius:8px;padding:8px;background:#2c2c2e;color:#eee">${opt()}</select></div>`;
  openModal(`<h3>🕸️ 群关系网</h3><div class="hint">关系网每次 AI 回复前必读，帮 AI 理解群内人物关系。直接选人物，不用手写名字。</div>
   ${relRows}

   ${picker}
   <div class="field"><input id="grel_rel" placeholder="关系（如：情侣、闺蜜、死对头、上司）"></div>

   <button class="btn p" onclick="grelAdd('${id}')">＋ 添加关系</button></div>

function grelAdd(id){const g=S.groups.find(x=>x.id===id);if(!g)return;g.rels=g.rels||[];const rel=($('#grel_rel').value||'').trim();if(!rel){toast('填一下是什么关系');return;}const story=($('#grel_story').value||'').trim();let a,b;

function grelDel(id,i){const g=S.groups.find(x=>x.id===id);if(!g||!g.rels)return;g.rels.splice(i,1);save();groupRels(id);}
function gbubble(g,m){const me=m.senderId==='me';if(m.type==='sys')return `<div class="tstamp"><span>${esc(m.content)}</span></div>`;
  const c=me?null:getC(m.senderId);const av0=me?av(S.me.avatar):`<span onclick="event.stopPropagation();gPat('${g.id}','${m.senderId}')" style="cursor:pointer" title="拍一拍">${av(c?c.avatar:'🙂')}</span>`;const nm=me?'':`<div style="font-size:11px;color:#888;margin-bottom:2px">${esc(c?c.name:'?')}</div>`;
  const q=m.q?`<div style="background:rgba(120,120,130,.2);border-left:2px solid #999;border-radius:5px;padding:3px 8px;margin-bottom:3px;font-size:11px;color:#999;max-width:210px;${me?'margin-left:auto':''}">${esc(m.q.who)}：${esc((m.q.text||'').slice(0,30))}</div>`:'';
  let inner;
  if(m.type==='transfer'||m.type==='redpacket'){const rp=m.type==='redpacket';const got=m.received;
    inner=`<div class="card"${me?'':` style="cursor:pointer" onclick="event.stopPropagation();gGrab('${g.id}','${m.id}')"`}><div class="cpay" style="background:${rp?(got?'#caa15a':'#f0a73b'):(got?'#7fae8f':'#36b06a')}"><div class="big">${rp?'🧧':'💸'}</div><div><div class="t1">¥${(+m.amount).toFixed(2)}</div><div class="t2">${esc(m.note||(rp?'恭喜发财':'给你转账'))}</div></div></div><div class="cfoot">${me?'已发出':(got?'已领取':(rp?'点击领取红包':'点击收款'))}</div></div>`;
  }else inner=`${q}<div class="bubble">${esc(m.content)}</div>`;

// 把群回复解析成「一条条」的消息项（文字气泡 + 红包/转账卡片），文字条数封顶
function gParseReply(content,cap,recent){const out=[];let txt=0;let pq=null;
  splitBubbles(content).forEach(l=>{l=normTag(l);if(!l)return;
    let qm=l.match(/^\[\s*引用\s*[|｜:：]?\s*(\d{1,2})\s*\]$/);if(qm){const rm=recent&&recent[+qm[1]-1];if(rm)pq={who:gName(rm),text:(gmText(rm)||'').slice(0,30)};return;}
    let m=l.match(/^\[\s*转账\s*\|\s*([0-9.]+)\s*\|?\s*([^\]]*)\]$/);if(m){out.push({type:'transfer',amount:+m[1]||0,note:(m[2]||'').trim(),received:false});return;}
    m=l.match(/^\[\s*红包\s*\|\s*([0-9.]+)\s*\|?\s*([^\]]*)\]$/);if(m){out.push({type:'redpacket',amount:+m[1]||0,note:(m[2]||'').trim(),received:false});return;}
    if(LEAKRE.test(l))return;// 别把别的指令标签当消息发出来
    splitActions(l).forEach(p=>{if(txt>=cap)return;p=(p||'').replace(/^(@[^\s@]+\s*)+/,'').trim();if(!p||/^@\S+$/.test(p))return;/* 丢掉纯@xxx气泡 */const it={type:'text',content:p};if(pq){it.q=pq;pq=null;}out.push(it);txt++;});
  });
  return out;}
async function aiGroupReply(id,fromText){const g=S.groups.find(x=>x.id===id);if(!g)return;
  const allowed=(g.responders&&g.responders.length)?g.responders:g.members;
  const members=allowed.map(x=>getC(x)).filter(c=>c&&!c.deleted&&!c.blocked);if(!members.length)return;
  // 被@到的先回；选中的(没选=全部)每个人都至少回一条，其余顺序打乱
  const atd=members.filter(c=>fromText&&fromText.includes(c.name));
  const rest=members.filter(c=>atd.indexOf(c)<0).sort(()=>Math.random()-.5);
  const resp=[...atd,...rest];
  const cap=Math.max(1,+g.msgMax||2);const lo=Math.max(1,+g.msgMin||1);
  for(const c of resp){await sleep(500+Math.random()*750);
    try{const recent=g.msgs.slice(-14);const sys=buildSystem(c)+gContext(g,c,recent);
      const pcap=Math.max(1,Math.min(cap,lo+Math.floor(Math.random()*(cap-lo+1))));// 每人这轮回几条随机，更自然
      const content=await chatAPI([{role:'system',content:sys},{role:'user',content:'[轮到你在群里说话了。看看上面大家（包括其他群友互相）说了啥，自然接话——回'+S.me.name+'、或接群友的话拌嘴起哄都行。要专门回应某条就用 [引用|序号]，别@人、别跟别人说一样的话。只回 1 到 2 条短消息。]'}],{max:380});
      let items=gParseReply(content,pcap,recent);
      if(!items.length)continue;// 没内容就这轮不吭声，更像真人
      let first=true;
      for(const it of items){
        if(!first)await sleep(420+Math.random()*560);first=false;
        it.senderId=c.id;it.role='assistant';it.time=Date.now();it.id=uid();g.msgs.push(it);save();
        if(S.settings.sound&&!c.muted)playDing();// 每条群消息都有提示音
        if(cur().p==='group'&&cur().id===id){const cb=$('#chatbg');if(cb){cb.insertAdjacentHTML('beforeend',gbubble(g,it));cb.scrollTop=cb.scrollHeight;}}
      }
      gNotify(g,c);
    }catch(e){}}}

  if(curLoc())s+='·她的位置：'+curLoc()+'\n';

  const myTw=(S.x&&S.x.tweets||[]).filter(t=>t.who==='me'&&t.time>since).slice(0,3);

  if(S.browser&&S.browser.history&&S.browser.history.length)s+='·她最近在浏览器搜了：'+S.browser.history.slice(0,4).map(h=>h.q).join('、')+'\n';

  if(_dates.length)s+='·她的线下约会记录：'+_dates.slice(0,3).join('；')+'\n';

function walDel(id){S.me.bills=S.me.bills.filter(b=>b.id!==id);save();openWallet();}
function walTog(id){if(!_walSel)return;const i=_walSel.indexOf(id);if(i<0)_walSel.push(id);else _walSel.splice(i,1);openWallet();}

function saveContact(id,isNew){const c=isNew?{id,pinned:false,blocked:false,proactive:{enabled:false,start:9,end:23,times:2},chatBg:''}:getC(id);
  c.name=$('#c_name').value.trim()||'新角色';c.avatar=$('#c_av').value.trim()||'🙂';c.relation=$('#c_rel').value.trim();

function wipeContact(id){const c=getC(id);if(!c||!isMain())return;

  Object.keys(S.messages).forEach(k=>{if(k===id||k.indexOf(id+'#')===0)delete S.messages[k];});// 聊天(含小号)
  c.memory=[];c.summaries=[];c.grudges=[];delete c.tasks;c.mood='';c.coldUntil=0;c._esc={stage:0};delete c._gotFromMe;delete c._pushedToMe;// 角色身上的记忆

  if(S.spy&&S.spy[id]){const sp=S.spy[id];S.spy[id]={granted:sp.granted,loc:sp.loc,time:sp.time,times:sp.times,pwd:sp.pwd};}// 清ta手机内容/查看记录，保留授权开关

  const all=msgs(id);const keep=rounds*2;if(all.length<=keep+6)return;
  const done=c._sumCount||0;const upto=all.length-keep;if(upto-done<6)return;
  const chunk=all.slice(done,upto).map(m=>{const t=msgToText(m);return t?((m._call?(m._ck==='video'?'(视频通话里)':'(语音通话里)'):'')+t):'';}).filter(Boolean).join('\n');if(!chunk)return;
  try{const sum=await chatAPI([{role:'system',content:'你就是「'+c.name+'」本人。下面是你和'+S.me.name+'刚发生的事（包含文字聊天，以及打电话/视频里说的话，都要一起算上）。用第一人称写一句日记记下来：用"我"指你自己('+c.name+')，用"'+S.me.name+'"称呼对方。例如"今天'+S.me.name+'跟我撒娇说她加班到很晚，还说想吃我做的糖醋排骨，我心都化了"。把这段里【重要的事】都记上（ta说了啥、答应了啥、你们约定了啥、ta的喜好/状态、闹了啥），50字左右、可以两小句，必须是你('+c.name+')的口吻和视角，不是'+S.me.name+'的视角、不要旁白，直接写正文。'},{role:'user',content:chunk}],{max:200,temp:.4});
    if(sum){c.summaries=c.summaries||[];c.summaries.push({time:new Date().toLocaleString('zh-CN',{year:'2-digit',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),text:cleanReply(sum).slice(0,100)});if(c.summaries.length>80)c.summaries=c.summaries.slice(-80);c._sumCount=upto;save();}
  }catch(e){}}
async function summarizeCall(id,kindTxt,sess){const c=getC(id);if(!c)return;
  const cms=msgs(id).filter(m=>m._call&&(!sess||m._cs===sess));if(!cms.length)return;
  const text=cms.map(m=>(m.role==='user'?S.me.name:c.name)+'：'+((m.content||(m.type==='voice'?(m.content||'[语音]'):''))||'')).filter(x=>x.slice(-1)!=='：').join('\n');
  if(!text.trim())return;
  try{const sum=await chatAPI([{role:'system',content:'你就是「'+c.name+'」本人。下面是你和'+S.me.name+'刚才这通'+kindTxt+'里说的话。请用第一人称【较完整地】把这通'+kindTxt+'记成一段记忆：聊到的事情大概都记一下、重要的点别漏、再带上你的感受。用"我"指你自己('+c.name+')，用"'+S.me.name+'"称呼对方。可以写3到5句（一两百字），是你的口吻和视角，直接写正文，别分点别带前缀。'},{role:'user',content:text}],{max:400,temp:.5});

  }catch(e){}}
let _replyTimers={};
let _replying=null;
function scheduleReply(id,note){
  // 手动回复模式：回应"我发的消息"(无note)时不自动回，等我点「让ta回复」；主动找我的(带note/系统触发)照常自动
  if(!note&&S.settings.manualReply){if(cur().p==='chat'&&cur().id===id)render();return;}
  clearTimeout(_replyTimers[id]);_replyTimers[id]=setTimeout(()=>aiReply(id,note),(Number(S.settings.replyDelay)||0)*1000);}
function manualReply(id){if(_replying)return;const c=getC(id);if(!c||c.blocked)return;_replying=id;if(cur().p==='chat'&&cur().id===id)render();
  // 判断最后一条真实对话是谁发的：若是他自己发的，这次「让ta回复」=继续多说，要明确告诉他别把自己的话当成对方说的
  let _note;{const _ms=msgs(id);for(let i=_ms.length-1;i>=0;i--){const mm=_ms[i];if(mm.type==='sys'||mm._call)continue;if(mm.role==='user')break;if(mm.role==='assistant'){_note='[系统：'+S.me.name+'这会儿还没开口、还没回你。请你接着自己刚才的话【再自然地多说几句】（补充、延续你上面说的，或换个角度再聊两句），不要重复已经说过的内容。注意：上面那几条都是【你自己】说的，不是'+S.me.name+'说的，千万别把自己说过的话当成ta说的去回应。]';break;}}}
  Promise.resolve(aiReply(id,_note)).finally(()=>{_replying=null;if(cur().p==='chat'&&cur().id===id)render();});}

let _audio;
function ensureAudio(){try{if(!_audio||_audio.state==='closed')_audio=new (window.AudioContext||window.webkitAudioContext)();if(_audio&&(_audio.state==='suspended'||_audio.state==='interrupted'))_audio.resume().catch(()=>{});}catch(e){}return _audio;}
function initAudio(){ensureAudio();}
// iOS：用了系统键盘的语音转文字/被其它声音打断后，AudioContext 会被挂起，提示音/铃声就没了。这里在每次点击/触摸/切回页面时把它唤醒，免得要退出重开。
['touchend','pointerdown','click'].forEach(ev=>document.addEventListener(ev,ensureAudio,{passive:true}));
document.addEventListener('click',()=>{initAudio();const liveLoc=S.contacts.some(c=>!c.deleted&&getSpy(c).loc);if(!S.weather||Date.now()-S.weather.time>(liveLoc?600000:72000000))fetchWeather();},{once:true});
function playDing(){if(!S.settings.sound)return;ensureAudio();if(!_audio)return;try{const o=_audio.createOscillator(),g=_audio.createGain();o.connect(g);g.connect(_audio.destination);
  o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.001,_audio.currentTime);g.gain.exponentialRampToValueAtTime(Math.min(1,.25*volMul()),_audio.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.001,_audio.currentTime+.35);o.start();o.stop(_audio.currentTime+.36);}catch(e){}}
function notifyIncoming(c,msg){
  // 语音消息自动播放
  if(msg&&msg.type==='voice'&&S.settings.voiceAuto&&!c.muted)speakMsg(msg,c);
  if(c.muted)return;
  const viewing=cur().p==='chat'&&cur().id===c.id;
  if(!viewing&&!_call)showMsgBanner(c,msg);
  playDing();
  if(document.hidden&&'Notification'in window&&Notification.permission==='granted'){try{new Notification(c.remark||c.name,{body:previewOf(msg)});}catch(e){}}}

let _call=null,_ring=null,_callTimer=null,_callSilTimer=null,_callMissT=null;
function endCallTimers(){try{clearInterval(_callTimer);}catch(e){}try{clearInterval(_callSilTimer);}catch(e){}try{clearTimeout(_callMissT);}catch(e){}}
function ringStart(){ringStop();ensureAudio();if(!_audio)return;let on=false;
  _ring=setInterval(()=>{try{const o=_audio.createOscillator(),g=_audio.createGain();o.connect(g);g.connect(_audio.destination);
    o.frequency.value=on?660:520;o.type='sine';g.gain.setValueAtTime(.0001,_audio.currentTime);
    g.gain.exponentialRampToValueAtTime(Math.min(1,.2*volMul()),_audio.currentTime+.05);g.gain.exponentialRampToValueAtTime(.0001,_audio.currentTime+.5);
    o.start();o.stop(_audio.currentTime+.55);on=!on;}catch(e){}},650);
  if(navigator.vibrate)navigator.vibrate([400,200,400,200,400]);}
function ringStop(){if(_ring){clearInterval(_ring);_ring=null;}if(navigator.vibrate)navigator.vibrate(0);}
function blip(freq,dur){if(!S.settings.sound)return;ensureAudio();if(!_audio)return;try{const o=_audio.createOscillator(),g=_audio.createGain();o.connect(g);g.connect(_audio.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(Math.min(1,.2*volMul()),_audio.currentTime);g.gain.exponentialRampToValueAtTime(.001,_audio.currentTime+dur);o.start();o.stop(_audio.currentTime+dur);}catch(e){}}
function incomingCall(id,kind){const c=getC(id);if(!c||c.blocked||_call)return;
  _call={id,kind,state:'incoming',opened:false,replyVoice:S.settings.voiceAuto!==false,session:uid(),sub:null};initAudio();ringStart();showCallBanner(c);
  clearTimeout(_callMissT);_callMissT=setTimeout(()=>callMissed(id),15000);}// 来电只先弹横幅；15秒没接=未接
function showCallBanner(c){const b=$('#callBanner');if(!b||!_call)return;const label=_call.kind==='video'?'视频':'语音';
  b.innerHTML=`<div onclick="openIncoming()" style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;cursor:pointer">${av(c.avatar,'sm')}<div style="flex:1;min-width:0"><div class="bn">${esc(c.remark||c.name)}</div><div class="bm">📞 邀请你${label}通话…</div></div></div><span class="cbtn red" style="width:30px;height:30px;font-size:14px;margin-left:4px" onclick="event.stopPropagation();declineCall()">📵</span><span class="cbtn green" style="width:30px;height:30px;font-size:14px" onclick="event.stopPropagation();answerCall()">📞</span>`;
  b.className='msgbanner show';}

  msgs(id).push({role:'user',type:'sys',content:'未接来电 · '+kindTxt,time:Date.now(),id:uid()});save();if(cur().p==='chat'&&cur().id===id)render();

function answerCall(autoByThem){if(!_call)return;ringStop();clearTimeout(_callMissT);hideCallBanner();blip(880,.12);
  _call.state='active';_call.opened=true;_call.start=Date.now();_call.lastUserTs=Date.now();_call.silentStage=0;const proR=_call._proReason;
  clearInterval(_callTimer);_callTimer=setInterval(renderCallTime,1000);clearInterval(_callSilTimer);_callSilTimer=setInterval(checkCallSilence,15000);renderCall();
  callAI('[系统：'+(autoByThem?S.me.name+'接通了你打的':'你接通了')+(_call.kind==='video'?'视频':'语音')+'电话'+(proR?'——这通是你自己主动打给ta的，因为你'+proR+'。开口先自然把你主动找ta的心情说出来（黏ta、撒娇、念叨想ta），口语化短句':'，自然开口，口语化短句')+'。]');}
function declineCall(){if(!_call)return;ringStop();endCallTimers();hideCallBanner();blip(300,.3);const id=_call.id,wasIn=_call.state==='incoming',wasCb=!!_call._cb,_kind=_call.kind;const kindTxt=_call.kind==='video'?'视频通话':'语音通话';
  msgs(id).push({role:'user',type:'sys',content:wasIn?'你拒绝了'+kindTxt:kindTxt+'已取消',time:Date.now(),id:uid()});save();
  _call=null;renderCall();if(cur().p==='chat')render();
  const c=getC(id);if(wasIn&&c&&!c.blocked){
    if(wasCb)maybeCallBack(id,_kind,false);// 她连回拨都不接，是不是还追，看他心情

function checkIgnore(){if(!isMain())return;if(!(S.couple&&S.couple.escalate))return;if(S.jail&&S.jail.active)return;

  if(c.proactive&&c.proactive.enabled){const nm=new Date().getHours()*60+new Date().getMinutes();const st=toMin(c.proactive.start),en=toMin(c.proactive.end);const inWin=st<=en?(nm>=st&&nm<en):(nm>=st||nm<en);if(!inWin)return;}

function checkFollowups(){if(!isMain())return;if(typeof _call!=='undefined'&&_call)return;if(S.jail&&S.jail.active)return;if(S.me.sleep&&S.me.sleep.active)return;
