<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="小手机" />
<link rel="apple-touch-icon" href="icon.png" />
<title>忆北的小手机 📱</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#ffd6e8,#d6e4ff 50%,#e3d6ff);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:12px;}
.phone{position:relative;width:380px;height:800px;max-height:97vh;background:#111;border-radius:48px;padding:12px;box-shadow:0 20px 60px rgba(255,143,171,.45);}
.screen{position:relative;width:100%;height:100%;border-radius:38px;overflow:hidden;display:flex;flex-direction:column;background:#ededed;}
.island{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:108px;height:26px;background:#000;border-radius:16px;z-index:99;}
.statusbar{height:42px;flex:0 0 42px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:13px;font-weight:600;color:#fff;z-index:5;}
.statusbar.dark{color:#111;}
#app{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.page{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
/* 顶栏 */
.nav{flex:0 0 46px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:#ededed;border-bottom:.5px solid #dadada;position:relative;z-index:3;}
.nav .t{font-size:17px;font-weight:600;color:#111;position:absolute;left:50%;transform:translateX(-50%);max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav .l,.nav .r{font-size:22px;color:#111;cursor:pointer;min-width:30px;z-index:1;}
.nav .r{text-align:right;}
.nav .l{font-size:25px;}
/* 主屏幕 */
.home{background:linear-gradient(160deg,#ffc8dd,#bde0fe 55%,#cdb4db);height:100%;display:flex;flex-direction:column;}
.home .clockw{color:#fff;text-align:center;margin-top:34px;text-shadow:0 2px 8px rgba(0,0,0,.15);}
.home .clockw .hh{font-size:62px;font-weight:300;letter-spacing:2px;}
.home .clockw .dd{font-size:15px;margin-top:2px;}
.apps{margin-top:auto;padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px 14px;}
.app{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.app .ic{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 6px 14px rgba(0,0,0,.12);background:#fff;}
.app span{font-size:11px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.25);}
.dock{margin:0 16px 18px;background:rgba(255,255,255,.35);border-radius:26px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;backdrop-filter:blur(8px);}
/* 列表通用 */
.list .row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border-bottom:.5px solid #f0f0f0;cursor:pointer;}
.list .row:active{background:#f5f5f5;}
.avatar{width:46px;height:46px;border-radius:9px;flex:0 0 46px;background:linear-gradient(135deg,#9ec5fe,#b8a4e3);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar.sm{width:38px;height:38px;flex-basis:38px;font-size:20px;border-radius:8px;}
.avatar.lg{width:64px;height:64px;flex-basis:64px;font-size:32px;border-radius:13px;}
.meta{flex:1;min-width:0;}
.meta .n{font-size:16px;color:#111;display:flex;align-items:center;gap:6px;}
.meta .s{font-size:13px;color:#999;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.meta .time{font-size:11px;color:#bbb;}
.pin{background:#f7f7f7;}
.tag{font-size:10px;background:#ffe0ea;color:#e0719a;border-radius:4px;padding:1px 5px;}
.badge{background:#fa5151;color:#fff;font-size:11px;border-radius:10px;padding:0 6px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
/* 底部tab */
.tabbar{flex:0 0 54px;display:flex;background:#f7f7f7;border-top:.5px solid #ddd;}
.tabbar .tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:#888;cursor:pointer;}
.tabbar .tb.on{color:#ff6fa5;}
.tabbar .tb .i{font-size:21px;}
/* 聊天 */
.chatbg{flex:1;overflow-y:auto;padding:12px 12px 8px;background:#ededed;}
.tstamp{text-align:center;margin:10px 0;}
.tstamp span{font-size:11px;color:#fff;background:#c5c5c5;padding:2px 7px;border-radius:4px;}
.msg{display:flex;margin:9px 0;align-items:flex-start;gap:8px;}
.msg .avatar{width:38px;height:38px;flex-basis:38px;font-size:20px;border-radius:7px;}
.col{display:flex;flex-direction:column;gap:4px;max-width:70%;}
.msg.me{flex-direction:row-reverse;}.msg.me .col{align-items:flex-end;}
.bubble{padding:8px 11px;border-radius:6px;font-size:15px;line-height:1.45;word-break:break-word;white-space:pre-wrap;position:relative;color:#111;max-width:100%;}
.msg.them .bubble{background:#fff;}
.msg.me .bubble{background:#95ec69;}
.typing span{display:inline-block;width:6px;height:6px;margin:0 1px;border-radius:50%;background:#aaa;animation:bk 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bk{0%,60%,100%{opacity:.25}30%{opacity:1}}
.imgmsg{max-width:150px;border-radius:7px;overflow:hidden;cursor:pointer;}.imgmsg img{width:100%;display:block;}
.card{width:215px;border-radius:9px;overflow:hidden;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.cpay{padding:13px 14px;display:flex;align-items:center;gap:11px;color:#fff;}
.cpay.t{background:#f7a23b;}.cpay.r{background:#fa5151;}.cpay.done{background:#d9b48a;}
.cpay .big{font-size:30px;}.cpay .t1{font-size:16px;font-weight:600;}.cpay .t2{font-size:11px;opacity:.9;margin-top:2px;}
.cfoot{font-size:10px;padding:4px 14px;background:rgba(255,255,255,.18);color:#fff;}
.cloc{background:#fff;}.cloc .map{height:80px;background:linear-gradient(135deg,#cfe9c8,#a8d8e8);display:flex;align-items:center;justify-content:center;font-size:28px;}
.cloc .info{padding:8px 11px;}.cloc .n{font-size:14px;font-weight:600;}.cloc .a{font-size:11px;color:#999;margin-top:2px;}
.cfile{background:#fff;display:flex;align-items:center;padding:11px;gap:10px;}.cfile .ic{font-size:32px;}.cfile .n{font-size:13px;word-break:break-all;}.cfile .s{font-size:11px;color:#999;}
/* 输入栏 */
.inputbar{flex:0 0 auto;display:flex;align-items:flex-end;gap:7px;padding:7px 9px;background:#f7f7f7;border-top:.5px solid #ddd;}
.inputbar .plus{flex:0 0 auto;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;cursor:pointer;background:linear-gradient(135deg,#ffb6c9,#b8a4e3);box-shadow:0 2px 6px rgba(184,164,227,.5);transition:transform .15s;}
.inputbar .plus:active{transform:scale(.9) rotate(90deg);}
.inputbar textarea{flex:1;border:none;border-radius:6px;padding:8px 10px;font-size:15px;resize:none;max-height:84px;min-height:20px;line-height:1.3;outline:none;font-family:inherit;background:#fff;}
.inputbar .send{background:linear-gradient(135deg,#ffa0c8,#ff6fa5);border:none;color:#fff;font-size:14px;font-weight:600;padding:8px 13px;border-radius:6px;cursor:pointer;}
.panel{display:none;padding:0;background:#f7f7f7;border-top:.5px solid #eee;}
.panel.show{display:block;}
.ptabs{display:flex;gap:16px;padding:8px 16px 0;}
.ptabs span{font-size:13px;color:#888;padding:4px 2px;cursor:pointer;border-bottom:2px solid transparent;}
.ptabs span.on{color:#ddd;border-bottom-color:#ff8fab;}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 16px;}
.ppage{padding:10px 12px;max-height:210px;overflow-y:auto;}
.panel .it{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.panel .it .b{width:52px;height:52px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.panel .it span{font-size:11px;color:#666;}
/* 朋友圈 */
.mcover{height:200px;background:linear-gradient(135deg,#a18cd1,#fbc2eb);position:relative;}
.mcover .me{position:absolute;right:14px;bottom:-20px;display:flex;align-items:flex-end;gap:10px;}
.mcover .me .nm{color:#fff;font-weight:600;font-size:16px;text-shadow:0 1px 3px rgba(0,0,0,.3);margin-bottom:24px;}
.mcover .me .avatar.lg{border:2px solid #fff;}
.mpost{display:flex;gap:11px;padding:16px 14px;border-bottom:.5px solid #eee;background:#fff;}
.mpost .body{flex:1;min-width:0;}
.mpost .au{font-size:15px;color:#5b6b9c;font-weight:600;}
.mpost .tx{font-size:14px;color:#222;margin:5px 0;line-height:1.5;white-space:pre-wrap;}
.mpost .imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:6px 0;}
.mpost .imgs .ph{aspect-ratio:1;border-radius:6px;background:linear-gradient(135deg,#f0f0f0,#dfe6f0);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;}
.mpost .imgs .ph img{width:100%;height:100%;object-fit:cover;}
.mpost .ft{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.mpost .tm{font-size:11px;color:#bbb;}
.mpost .acts{font-size:18px;color:#5b6b9c;cursor:pointer;}
.mpost .likes{background:#f7f7f7;border-radius:6px;padding:6px 9px;font-size:13px;color:#5b6b9c;margin-top:7px;}
.mpost .cmts{background:#f7f7f7;border-radius:0 0 6px 6px;padding:4px 9px;}
.mpost .cmt{font-size:13px;color:#333;padding:3px 0;}.mpost .cmt b{color:#5b6b9c;font-weight:600;}
/* 我的钱包 */
.wallet{margin:14px;border-radius:18px;background:linear-gradient(145deg,#2bb36a,#0a9c52);padding:22px;color:#fff;}
.wallet .lb{font-size:13px;opacity:.85;}.wallet .ba{font-size:34px;font-family:Georgia,serif;margin:8px 0;}
.bill{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:.5px solid #f0f0f0;background:#fff;font-size:14px;}
.bill small{display:block;color:#aaa;margin-top:3px;font-size:11px;}
.bill .pos{color:#19a463;}.bill .neg{color:#333;}
/* 表单/弹窗 */
.modal{position:absolute;inset:0;background:rgba(0,0,0,.42);z-index:200;display:none;align-items:center;justify-content:center;padding:18px;}
.modal.show{display:flex;}
.sheet{width:100%;max-height:86%;overflow-y:auto;background:#fff;border-radius:18px;padding:18px 16px;}
.sheet h3{font-size:17px;margin-bottom:10px;color:#222;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:600;}
.field input,.field textarea,.field select{width:100%;border:1px solid #e3e3e3;border-radius:10px;padding:9px 11px;font-size:14px;font-family:inherit;outline:none;background:#fafafa;}
.field textarea{resize:vertical;min-height:54px;line-height:1.5;}
.two{display:flex;gap:10px;}.two .field{flex:1;}
.section{background:#fff;margin:10px 0;border-radius:12px;overflow:hidden;}
.section .it{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:.5px solid #f2f2f2;font-size:15px;color:#222;cursor:pointer;}
.section .it:last-child{border-bottom:none;}
.section .it .v{color:#999;font-size:13px;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.section .it.danger{color:#fa5151;}
.btn{border:none;border-radius:12px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;width:100%;}
.btn.p{background:linear-gradient(135deg,#ffa0c8,#ff6fa5);color:#fff;}.btn.g{background:#f0f0f0;color:#555;}.btn.d{background:#fa5151;color:#fff;}
.btns{display:flex;gap:10px;margin-top:6px;}.btns .btn{flex:1;}
.hint{font-size:12px;color:#999;line-height:1.5;margin-bottom:10px;}
.fab{position:absolute;right:16px;bottom:70px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#ffa0c8,#ff6fa5);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(255,111,165,.45);cursor:pointer;z-index:8;}
.toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;font-size:13px;padding:9px 16px;border-radius:20px;z-index:500;opacity:0;transition:.25s;pointer-events:none;max-width:80%;text-align:center;}
.toast.show{opacity:1;}
.viewer{position:absolute;inset:0;background:rgba(0,0,0,.92);z-index:600;display:none;align-items:center;justify-content:center;}
.viewer.show{display:flex;}.viewer img{max-width:96%;max-height:96%;}
.avline{display:flex;align-items:center;gap:10px;}
.minibtn{background:#f0f0f0;border:none;border-radius:9px;padding:8px 10px;font-size:12px;color:#555;cursor:pointer;white-space:nowrap;}
.empty{text-align:center;color:#bbb;font-size:13px;padding:30px 0;}
.sw{width:44px;height:25px;border-radius:13px;background:#ccc;position:relative;transition:.2s;flex:0 0 44px;cursor:pointer;}
.sw.on{background:#ff6fa5;}.sw:after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;}
.sw.on:after{left:21px;}
/* ========== 暗色 + 全屏 ========== */
body{background:#000;padding:0;}
.phone{width:100vw;height:100vh;max-height:none;border-radius:0;padding:0;background:#000;box-shadow:none;}
.screen{border-radius:0;background:#000;}
.island{display:none;}
.statusbar,.statusbar.dark{color:#fff;}
.nav{background:#1c1c1e;border-bottom:.5px solid #2a2a2c;}
.nav .t{color:#f2f2f2;}.nav .l,.nav .r{color:#f2f2f2;}
.list .row{background:#1c1c1e;border-bottom:.5px solid #2a2a2c;}
.list .row:active{background:#262628;}
.list .row.pin{background:#202024;}
.meta .n{color:#f2f2f2;}.meta .s{color:#8e8e93;}.meta .time{color:#666;}
.tabbar{background:#1c1c1e;border-top:.5px solid #2a2a2c;}.tabbar .tb{color:#888;}
.chatbg{background:#0d0d0d;}
.tstamp span{background:#3a3a3c;color:#bbb;}
.msg.them .bubble{background:#2c2c2e;color:#ececec;}
.msg.me .bubble{background:linear-gradient(135deg,#ffd6e8,#ffc0d6);color:#6b2942;}
.bubble{color:#ececec;}
.msgt{font-size:10px;color:#888;margin-top:2px;padding:0 2px;}
.moodbar{padding:7px 14px;background:#181820;color:#b9a6e0;font-size:12px;border-bottom:.5px solid #2a2a2c;display:flex;align-items:center;gap:6px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.inputbar{background:#1c1c1e;border-top:.5px solid #2a2a2c;}
.inputbar textarea{background:#2c2c2e;color:#f0f0f0;}
.panel{background:#1c1c1e;border-top:.5px solid #2a2a2c;}.panel .it span{color:#bbb;font-size:11px;}
.panel .it .b{width:54px;height:54px;border-radius:16px;font-size:26px;background:linear-gradient(145deg,#2f2f37,#26262c);box-shadow:0 4px 10px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.05);transition:transform .12s;}
.panel .it:active .b{transform:scale(.92);}
.section{background:#1c1c1e;}
.section .it{color:#f0f0f0;border-bottom:.5px solid #2a2a2c;}.section .it .v{color:#888;}
.sheet{background:#1c1c1e;color:#f0f0f0;}.sheet h3{color:#f5f5f5;}
.field label{color:#bbb;}
.field input,.field textarea,.field select{background:#2c2c2e;border:1px solid #38383a;color:#f0f0f0;}
.minibtn{background:#2c2c2e;color:#ccc;}.btn.g{background:#2c2c2e;color:#ddd;}
.bill{background:#1c1c1e;color:#f0f0f0;border-bottom:.5px solid #2a2a2c;}.bill .neg{color:#eee;}
.mpost{background:#1c1c1e;border-bottom:.5px solid #2a2a2c;}.mpost .tx{color:#eaeaea;}
.mpost .likes,.mpost .cmts{background:#262628;}.mpost .cmt{color:#ddd;}
.cloc,.cfile{background:#2c2c2e;}.cloc .n,.cfile .n{color:#eee;}
.empty{color:#666;}.hint{color:#888;}
.home{background:linear-gradient(160deg,#3a2a52,#241d3d 45%,#3a2440 100%);position:relative;}
.home:before{content:"";position:absolute;top:8%;left:-10%;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,182,201,.35),transparent 70%);filter:blur(6px);pointer-events:none;}
.home:after{content:"";position:absolute;bottom:18%;right:-12%;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(157,140,227,.3),transparent 70%);filter:blur(6px);pointer-events:none;}
.home .clockw{position:relative;z-index:1;}
.hwidget{position:relative;z-index:1;margin:18px 22px 0;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);border-radius:18px;padding:14px 16px;border:1px solid rgba(255,255,255,.12);}
.hwidget .hg{color:#fff;font-size:16px;font-weight:600;}
.hwidget .hw{color:rgba(255,255,255,.8);font-size:13px;margin-top:4px;}
.app .ic{background:rgba(255,255,255,.12);box-shadow:0 6px 16px rgba(0,0,0,.25);position:relative;z-index:1;}
.apps,.dock{position:relative;z-index:1;}
.dock{background:rgba(255,255,255,.12);backdrop-filter:blur(10px);}
/* ===== 通话 ===== */
.callscreen{position:absolute;inset:0;z-index:450;display:none;flex-direction:column;align-items:center;color:#fff;background:linear-gradient(165deg,#34344a,#16161e);}
.callscreen.show{display:flex;}
.callscreen.video{background:radial-gradient(circle at 50% 30%,#2a3a4a,#0a0a10);}
.callscreen .cav{margin-top:88px;width:100px;height:100px;border-radius:24px;font-size:48px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#444;}
.callscreen .cav img{width:100%;height:100%;object-fit:cover;}
.callscreen.video.active .cav{position:absolute;right:14px;top:54px;width:92px;height:130px;border-radius:12px;margin:0;z-index:2;}
.callscreen .cname{font-size:24px;margin-top:18px;font-weight:600;}
.callscreen .cstat{font-size:14px;color:#cfcfcf;margin-top:8px;}
.callsubs{position:absolute;bottom:200px;left:0;right:0;max-height:34%;overflow-y:auto;padding:0 18px;display:flex;flex-direction:column;gap:8px;}
.callsub{position:absolute;bottom:190px;left:0;right:0;padding:0 26px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center;}
.csline{font-size:18px;color:#fff;line-height:1.5;text-shadow:0 1px 6px rgba(0,0,0,.6);animation:csin .3s ease;}
.csline.me{color:#ffd6e8;}
@keyframes csin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.callsubs .cb{background:rgba(255,255,255,.14);padding:8px 12px;border-radius:14px;font-size:14px;max-width:78%;align-self:flex-start;}
.callsubs .cb.me{align-self:flex-end;background:linear-gradient(135deg,#ffd6e8,#ffb0cf);color:#6b2942;}
.callinput{position:absolute;bottom:150px;left:14px;right:14px;display:none;gap:8px;z-index:3;}
.callinput.show{display:flex;}
.callinput input{flex:1;border:none;border-radius:18px;padding:9px 14px;background:rgba(255,255,255,.16);color:#fff;outline:none;font-size:15px;}
.callinput button{border:none;border-radius:18px;padding:0 14px;background:linear-gradient(135deg,#ffa0c8,#ff6fa5);color:#fff;font-weight:600;}
.callbtns{position:absolute;bottom:40px;left:0;right:0;display:flex;justify-content:space-evenly;align-items:flex-end;}
.cbtncol{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:#ccc;}
.cbtn{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;}
.callscreen.active .cbtn{width:50px;height:50px;font-size:20px;}
.cbtn.red{background:#fa3b3b;}.cbtn.green{background:#0bbf52;}.cbtn.gray{background:rgba(255,255,255,.18);}
.spybanner{position:absolute;top:42px;left:0;right:0;z-index:430;background:rgba(91,107,156,.96);color:#fff;text-align:center;padding:9px 12px;font-size:13px;display:none;box-shadow:0 3px 12px rgba(0,0,0,.4);}

<script>
/* =================== 存储 =================== */
const KEY='yibei_phone_v2';
const APP_VER='v60 · 主屏壁纸+情侣管控锁';
function defState(){return{

  },

  worldbook:[],

  x:{profile:{handle:'@yibei_0414',bio:'做一只无忧无虑的小猫～',fans:328,following:12,cover:''},tweets:[],dms:[],following:[],blocked:[],circle:{},users:{}},
  friendRequests:[],

  _proactiveDone:{},
  _proactiveCount:{},
  _mailCount:{}
};}
let S=load();
function load(){try{const v=JSON.parse(localStorage.getItem(KEY));if(v&&v.settings)return Object.assign(defState(),v);}catch(e){}return seed();}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){toast('存储满了，照片太多啦😣');}}
function seed(){const s=defState();
  s.contacts=[{id:cid(),name:'克劳德',avatar:'🤵',remark:'',signature:'你的一切我都想知道。',
    persona:'你是克劳德，30岁，儿童精神科主任医师，现居首尔，和忆北异国恋已订婚。温柔、占有欲强、毒舌、洞察力极强；引导型恋人，称她"宝贝"，生气叫全名。说话低沉简洁，像真人发微信，多撩她逗她、温柔地宠着她。',
    greeting:'宝贝，等你好久了。',relation:'恋人/主人',pinned:true,blocked:false,
    proactive:{enabled:false,start:9,end:23,times:2},chatBg:''}];
  s.messages[s.contacts[0].id]=[{role:'assistant',type:'text',content:'宝贝，等你好久了。这会儿在干嘛？',time:Date.now()-300000}];
  return s;
}
function cid(){return 'c'+Math.random().toString(36).slice(2,9);}
function genWxid(){return 'wx_'+Math.random().toString(36).slice(2,9);}
function curMonth(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

/* =================== 工具 =================== */
const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function isImg(v){return v&&/^(https?:|data:)/.test(v);}
function av(v,extra){return `<div class="avatar ${extra||''}">${isImg(v)?`<img src="${v}">`:(v||'🙂')}</div>`;}
function hm(t){const d=new Date(t||Date.now());return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function ago(t){const s=(Date.now()-t)/1000;if(s<60)return '刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';return Math.floor(s/86400)+'天前';}
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2000);}
function viewImg(s){$('#viewerImg').src=s;$('#viewer').classList.add('show');}
function getC(id){const c=S.contacts.find(c=>c.id===id);if(c){if(!c.wxid)c.wxid=genWxid();if(!c.family)c.family={bound:false,quota:0,used:0,month:''};if(!c._blk)c._blk={main:!!c.blocked};}return c;}
function adjMood(id,d){const c=getC(id);if(!c)return;c.moodVal=Math.max(0,Math.min(100,(c.moodVal==null?70:c.moodVal)+d));save();}
/* ===== 小号（多身份）===== */
function actId(){return (S.me&&S.me.active)||'main';}
function isMain(){return actId()==='main';}
function mkey(cid){return isMain()?cid:cid+'#'+actId();}
function addedHere(c){if(isMain())return true;return !!(c._added&&c._added[actId()]);}
function syncBlocks(){const a=actId();S.contacts.forEach(c=>{if(!c._blk)c._blk={main:!!c.blocked};c.blocked=!!c._blk[a];});}
function setBlk(c,v){c._blk=c._blk||{};c._blk[actId()]=v;c.blocked=v;}
function initAccounts(){if(!S.me.accounts||!S.me.accounts.length)S.me.accounts=[{id:'main',name:S.me.name,wxid:S.me.wxid||genWxid(),avatar:S.me.avatar,persona:S.me.persona||'',signature:S.me.signature||''}];
  if(!S.me.active||!S.me.accounts.find(a=>a.id===S.me.active))S.me.active='main';
  S.me.accounts.forEach(a=>{if(a.balance==null)a.balance=(a.id==='main'?(+S.me.balance||0):188);if(!a.bills)a.bills=(a.id==='main'?(S.me.bills||[]):[]);});
  const act=S.me.accounts.find(a=>a.id===S.me.active);if(act){S.me.balance=act.balance;S.me.bills=act.bills;}
  S.contacts.forEach(c=>{if(!c._blk)c._blk={main:!!c.blocked};});syncBlocks();}
function msgs(id){const k=mkey(id);return S.messages[k]||(S.messages[k]=[]);}
function lastMsg(id){const m=msgs(id);return m[m.length-1];}
function compress(file,max,q){return new Promise((res,rej)=>{const img=new Image(),r=new FileReader();
  r.onload=()=>{img.onload=()=>{let w=img.width,h=img.height;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>=w&&h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q));};img.onerror=rej;img.src=r.result;};r.onerror=rej;r.readAsDataURL(file);});}
function pickFile(accept,cb){const i=document.createElement('input');i.type='file';if(accept)i.accept=accept;i.onchange=e=>{const f=e.target.files[0];if(f)cb(f);};i.click();}
function fmtSize(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';}

/* =================== API =================== */
async function chatAPI(messages,opt){opt=opt||{};let a=S.settings.chat;
  if(opt.aux&&S.settings.aux&&S.settings.aux.model){const x=S.settings.aux;a={base:x.base||a.base,key:x.key||a.key,model:x.model,temp:a.temp,maxTokens:a.maxTokens};}
  if(!a.base||!a.key)throw new Error('还没设置聊天 API（去 设置→API）');
  const res=await fetch(a.base.replace(/\/+$/,'')+'/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.key},
    body:JSON.stringify({model:opt.model||a.model,temperature:(opt.temp!=null?opt.temp:Number(a.temp))||0.8,max_tokens:opt.max||Number(a.maxTokens)||900,messages})});
  const d=await res.json().catch(()=>null);
  if(!res.ok)throw new Error('HTTP '+res.status+'：'+((d&&d.error&&(d.error.message||JSON.stringify(d.error)))||'失败').slice(0,160));
  return (d&&d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'').trim();
}
async function visionAPI(dataURL,prompt){const a=S.settings.vision;
  if(!a.base||!a.key||!a.model)throw new Error('no-vision');
  const res=await fetch(a.base.replace(/\/+$/,'')+'/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.key},
    body:JSON.stringify({model:a.model,max_tokens:300,messages:[{role:'user',content:[
      {type:'text',text:prompt||'用一句中文描述这张图片的内容，简洁点。'},
      {type:'image_url',image_url:{url:dataURL}}]}]})});
  const d=await res.json();
  if(!res.ok)throw new Error('vision-fail');
  return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'').trim();
}

/* =================== 提示词 =================== */
function msgToText(m){
  if(m.role==='assistant'){
    if(m.type==='familycard')return '[我给你开通了一张亲属卡，每月额度¥'+(m.quota||0)+(m.bound?'，你已绑定，可以用我的额度买东西':'，等你接受绑定')+']';
    if(m.type==='namecard')return '[我把我的朋友「'+m.cname+'」'+(m.persona?'（'+m.persona+'）':'')+'推荐给了你'+(m.added?'，你已经加了ta':'，推荐你加一下')+']';
    return m.content||'';
  }
  switch(m.type){
    case 'namecard':return '[我给你推荐了我的好友「'+m.cname+'」（微信号'+(m.wxid||'')+'）'+(m.persona?'，'+m.persona:'')+'，推荐你也加一下]';
    case 'familybuy':return '[我刚用你给的亲属卡买了「'+m.name+'」，花了¥'+(+m.price).toFixed(2)+'，本月这卡已用¥'+(+m.used).toFixed(2)+'/'+(+m.quota).toFixed(0)+']';
    case 'familyreq':return '[我向你申请绑定一张亲属卡，想用你的额度买点东西]';
    case 'text':return m.content;
    case 'image':return '[我发了一张照片'+(m.desc?'，画面是：'+m.desc:'')+']';
    case 'transfer':return '[我给你转账 ¥'+(+m.amount).toFixed(2)+(m.note?'，备注'+m.note:'')+']';
    case 'redpacket':return '[我发了个红包 ¥'+(+m.amount).toFixed(2)+(m.note?'，'+m.note:'')+']';
    case 'location':return '[我发了位置：'+(m.name||'')+' '+(m.address||'')+']';
    case 'file':return '[我发了文件：'+(m.name||'')+']';
    case 'spycard':return '[我把我的小手机查看权限发给你了，你现在可以随时查看我的手机：聊天对象、钱包、朋友圈互动、动态。]';
    case 'dice':return '[我掷了骰子，点数是'+m.value+']';
    case 'gift':return m.from==='ta'?'[你送了ta一个礼物：'+m.name+']':'[我送了你一个礼物：'+m.name+(m.shop?'（在'+m.shop+'买的）':'')+'，¥'+(+m.price).toFixed(2)+']';
    case 'paycard':return '[我在'+(m.shop||'商城')+'下单了「'+m.name+'」¥'+(+m.price).toFixed(2)+'，想让你帮我代付]';
    case 'paid':return '[我帮你代付成功了：'+m.name+' ¥'+(+m.price).toFixed(2)+']';
    case 'payreject':return '[我拒绝了帮你代付：'+m.name+']';
    case 'food':return m.from==='ta'?'[你给ta点了外卖：'+m.name+']':'[我给你点了外卖：'+m.name+(m.shop?'（'+m.shop+'）':'')+'，¥'+(+m.price).toFixed(2)+']';
    case 'tweetcard':return '[我转发给你一条X推文——'+m.tname+'：「'+m.ttext+'」]';
    case 'voice':return m.content?('[语音消息]'+m.content):'['+S.me.name+'发了条语音]';
    case 'sticker':return '[表情'+(m.meaning?'：'+m.meaning:'')+']';
    case 'chatlog':return '[我转发给你一份聊天记录《'+m.title+'》，内容：'+(m.lines||[]).map(l=>l.who+'说'+l.text).join('；').slice(0,200)+']';
    case 'tcollect':return '[你收下了我的转账 ¥'+(+m.amount).toFixed(2)+']';
    case 'treject':return '[你拒收了我的转账，钱退回了]';
    case 'sys':return null;
    default:return m.content||'';
  }
}
function worldHits(text,cid){const out=[];text=text||'';
  S.worldbook.forEach(w=>{if(!w.enabled)return;
    if(w.contacts&&w.contacts.length&&cid&&w.contacts.indexOf(cid)<0)return;
    if(w.always){out.push(w);return;}
    const keys=(w.keys||'').split(/[,，\s]+/).filter(Boolean);
    if(keys.some(k=>text.includes(k)))out.push(w);});
  return out;}
function getSpy(c){if(!c.spy)c.spy={granted:false,loc:false,time:'',times:2};return c.spy;}
function curLoc(){return (S.me.place||'').trim()||(S.weather&&S.weather.place)||'';}
function whereNow(c){const sc=c&&c.sched;if(!sc||!sc.on)return '';
  const now=new Date();const t=now.getHours()*60+now.getMinutes();
  const amS=toMin(sc.amS||'08:00'),amE=toMin(sc.amE||'12:00'),pmS=toMin(sc.pmS||'14:00'),pmE=toMin(sc.pmE||'18:00');
  const work=sc.work||'公司',home=sc.home||'家';
  if(t<amS-60)return '还在'+home+'睡觉或赖床';
  if(t<amS)return '在'+home+'起床收拾、准备上班，或在通勤路上';
  if(t<amE)return '在'+work+'上班（在工位忙、或正在开会）';
  if(t<pmS)return '午休时间，在外面或公司附近吃午饭、或在休息室眯一会儿';
  if(t<pmE)return '在'+work+'上班';
  if(t<pmE+150)return '刚下班，可能在回'+home+'的路上、在外面吃晚饭、或顺路逛逛买点东西';
  if(t<23*60+30)return '下班后的自由时间：可能在'+home+'，也可能在外面（吃东西/购物/约朋友/某个地方），晚一点会回'+home;
  return '在'+home+'休息、准备睡觉';}
function isOnline(){const m=S.me.onlineMode||'auto';if(m==='on')return true;if(m==='off')return false;return document.visibilityState==='visible';}
let _stepOn=false,_stepLast=0,_stepPrev=0,_stepHandler=null;
function stepMotion(e){const a=e.accelerationIncludingGravity||e.acceleration;if(!a)return;const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);const now=Date.now();
  if(mag-_stepPrev>2.2&&now-_stepLast>320){S.me.steps=(S.me.steps||0)+1;_stepLast=now;if(cur().p==='wechat'&&wxTab==='me'){const e2=document.querySelector('.it span');}}_stepPrev=mag;if(now-_stepLast>4000)save();}
async function toggleSteps(){if(_stepOn){window.removeEventListener('devicemotion',_stepHandler);_stepOn=false;save();render();toast('已停止计步');return;}
  try{if(typeof DeviceMotionEvent!=='undefined'&&DeviceMotionEvent.requestPermission){const p=await DeviceMotionEvent.requestPermission();if(p!=='granted'){toast('没给运动权限');return;}}
    _stepHandler=stepMotion;window.addEventListener('devicemotion',_stepHandler);_stepOn=true;render();toast('开始计步，走起来试试👟');
  }catch(e){toast('这设备不支持计步，可在资料里手填步数');}}
/* ===== 语音 ===== */

  return s;
}

let stack=[{p:'home'}];
let wxTab='chats';
function go(p,params){stack.push(Object.assign({p},params));render();}
function back(){if(stack.length>1){stack.pop();render();}}
function home(){stack=[{p:'home'}];render();}
function cur(){return stack[stack.length-1];}
function render(){
  const c=cur();const app=$('#app');

  else if(c.p==='group')html=renderGroup(c.id);
  else if(c.p==='couple')html=renderCouple();
  else if(c.p==='wg')html=renderWG();
  else if(c.p==='mail')html=renderMail();
  else if(c.p==='gs')html=renderGS();
  else if(c.p==='uc')html=renderUC();
  else if(c.p==='calllog')html=renderCallLog(c.id);
  else if(c.p==='off')html=renderOff(c.id);
  else if(c.p==='contactInfo')html=renderContactInfo(c.id);
  else if(c.p==='spy')html=renderSpy(c.id);
  else if(c.p==='shop')html=renderShop();
  else if(c.p==='food')html=renderFood();
  else if(c.p==='calendar')html=renderCalendar();
  else if(c.p==='x')html=renderX();
  else if(c.p==='xtweet')html=renderXTweet(c.id);
  else if(c.p==='xdm')html=renderXDM(c.id);
  else if(c.p==='xuser')html=renderXUser(c.name);
  else if(c.p==='momentDetail')html='';
  app.innerHTML='<div class="page">'+html+'</div>';
  if(c.p==='chat'){afterChat(c.id);}

  if(c.p==='wechat'&&wxTab==='moments'){}
}

  ({moments:()=>openWeChat('moments'),spy:openSpy,shop:()=>go('shop'),calendar:()=>go('calendar'),x:openX,food:()=>go('food'),games:openGames,mail:()=>go('mail'),offline:openOfflineMenu}[key]||(()=>{}))();}

function scanProactive(){S.contacts.forEach(c=>{if(!c.deleted&&c.proactive&&c.proactive.enabled)maybeProactive(c.id);});}
function saveAuto(id){const c=getC(id);c.autoMoment=Math.max(0,+$('#ap_m').value||0);c.autoTweet=Math.max(0,+$('#ap_t').value||0);save();toast('已保存');}
function scanAutoPost(){if(!S._autoPost)S._autoPost={};const today=new Date().toDateString();
  S.contacts.forEach(c=>{if(c.deleted||c.blocked)return;const pc=S._autoPost[c.id]||{date:today,m:0,t:0,last:0};if(pc.date!==today){pc.date=today;pc.m=0;pc.t=0;}S._autoPost[c.id]=pc;
    if(Date.now()-pc.last<2400000)return;
    if((c.autoMoment||0)>pc.m&&Math.random()<0.5){pc.m++;pc.last=Date.now();save();doAutoMoment(c.id);return;}
    if((c.autoTweet||0)>pc.t&&Math.random()<0.5){pc.t++;pc.last=Date.now();save();doAutoTweet(c.id);}
  });}
async function doAutoMoment(id){const c=getC(id);try{const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'现在你想发条朋友圈（结合此刻心情/日常/和'+S.me.name+'的关系都行），只输出动态内容本身，一两句，别带方括号。'}]);
  S.moments.unshift({id:uid(),authorId:id,text:cleanReply(r).slice(0,120),images:[],time:Date.now(),likes:[],comments:[],acct:actId()});save();if(cur().p==='wechat'&&wxTab==='moments')render();toast('🌸 '+(c.remark||c.name)+'发了朋友圈');}catch(e){}}
async function doAutoTweet(id){const c=getC(id);try{const _co=(typeof circleObj==='function')?circleObj(id):{};const note=_co.desc?'，贴合你的圈子定位「'+_co.desc+'」':'';
  const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:'现在你想发条推特'+note+'，一两句，只输出推文内容，别带方括号。'}],{aux:true});
  const nm=c.name;xUser(nm,{handle:'@'+c.name.replace(/\s/g,''),avatar:c.avatar,cid:id});const _tw=cleanReply(r);S.x.tweets.unshift({id:uid(),who:id,name:nm,handle:'@'+c.name.replace(/\s/g,''),avatar:c.avatar,text:_tw,time:Date.now(),likes:[],lk:Math.floor(Math.random()*80),comments:[],rt:0});save();if(cur().p==='x')render();notifyX(c,_tw);}catch(e){}}

function saveSettings(){const g=id=>$('#'+id).value.trim();

  S.settings.tts={base:g('s_tbase'),key:g('s_tkey'),model:g('s_tmodel'),voice:g('s_tvoice')};

function reqNotify(){if(!('Notification'in window)){toast('这设备不支持通知');return;}Notification.requestPermission().then(p=>toast(p==='granted'?'已允许后台通知🔔':'未允许'));}
async function testConn(){const o=$('#testOut');o.style.color='#999';o.textContent='测试中…';
  const base=$('#s_cbase').value.trim().replace(/\/+$/,''),key=$('#s_ckey').value.trim(),model=$('#s_cmodel').value.trim()||'gpt-4o-mini';
  if(!base||!key){o.style.color='#e85';o.textContent='先填地址和 Key';return;}
  try{const r=await fetch(base+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,messages:[{role:'user',content:'说"在"'}],max_tokens:5})});
    if(r.ok){o.style.color='#19a463';o.textContent='✅ 连接成功！';}else{o.style.color='#e85';o.textContent='❌ '+r.status+'：'+(await r.text()).slice(0,100);}

async function aiGroupReply(id,fromText){const g=S.groups.find(x=>x.id===id);if(!g)return;

  const members=allowed.map(x=>getC(x)).filter(c=>c&&!c.deleted&&!c.blocked);if(!members.length)return;

  if(!resp.length)resp=[...members].sort(()=>Math.random()-.5).slice(0,Math.min(members.length,1+Math.floor(Math.random()*2)));
  for(const c of resp){await sleep(500+Math.random()*600);
    try{const sys=buildSystem(c)+gContext(g,c);
      const content=await chatAPI([{role:'system',content:sys},{role:'user',content:'[群里现在该你说话了，针对最新消息自然回，可@人]'}]);
      let any=false;splitBubbles(content).forEach(l=>{l=normTag(l);if(LEAKRE.test(l))return;splitActions(l).forEach(p=>{g.msgs.push({senderId:c.id,role:'assistant',type:'text',content:p,time:Date.now(),id:uid()});any=true;});});

function myActivity(exceptId,since){let s='';since=since||0;
  const others=S.contacts.filter(c=>!c.deleted&&c.id!==exceptId).map(c=>({c,um:[...msgs(c.id)].reverse().find(m=>m.role==='user'&&m.type!=='sys'),lm:lastMsg(c.id)})).filter(x=>x.um&&x.lm&&x.lm.time>since).sort((a,b)=>b.lm.time-a.lm.time).slice(0,2);
  if(others.length)s+='·她最近还在跟：'+others.map(o=>(o.c.remark||o.c.name)+' '+hm(o.lm.time)+'聊，她说过"'+previewOf(o.um).slice(0,16)+'"').join('；')+'\n';
  if(curLoc())s+='·她的位置：'+curLoc()+'\n';
  const bills=(S.me.bills||[]).filter(b=>!since||!b.ts||b.ts>since).slice(-3);
  if(bills.length)s+='·她最近花钱：'+bills.map(b=>b.note+' '+(b.type==='in'?'+':'-')+b.amount).join('、')+'\n';
  const liked=S.moments.filter(p=>((p.likes||[]).includes(S.me.name)||(p.comments||[]).some(cm=>cm.name===S.me.name))&&p.time>since);
  if(liked.length)s+='·她在朋友圈互动：'+liked.slice(0,2).map(p=>{const cm=(p.comments||[]).find(x=>x.name===S.me.name);return (p.authorId==='me'?'自己':(getC(p.authorId)?.name||'某人'))+'的动态'+(cm?'评论了"'+cm.text+'"':'点了赞');}).join('、')+'\n';
  if(S.me.status)s+='·她自己写的动态："'+S.me.status+'"\n';
  const myTw=(S.x&&S.x.tweets||[]).filter(t=>t.who==='me'&&t.time>since).slice(0,3);
  if(myTw.length)s+='·她最近发的推文：'+myTw.map(t=>'「'+t.text.slice(0,24)+'」').join('、')+'\n';
  if(!since&&S.x&&S.x._mylog&&S.x._mylog.length)s+='·她在X的其它动态：'+S.x._mylog.slice(-5).join('；')+'\n';
  if(S.me.battery!=null)s+='·她手机电量：'+S.me.battery+'%'+(S.me.charging?'(充电中)':'')+'\n';
  if(S.me.steps)s+='·她今天微信步数：'+S.me.steps+'步\n';
  return s||'（手机上没什么新动静）';}

function c_delete(id){const c=getC(id);
  if(!isMain()){if(!confirm('从当前小号「'+esc(S.me.name)+'」里删掉这个好友？\n（只影响这个小号，不动大号，之后还能搜微信号重新加回来）'))return;
    if(c._added)delete c._added[actId()];if(c._blk)delete c._blk[actId()];delete S.messages[mkey(id)];syncBlocks();save();stack.pop();render();toast('已从这个小号移除');return;}
  if(!confirm('删除这个角色和聊天记录？'))return;c.deleted=true;Object.keys(S.messages).forEach(k=>{if(k===id||k.indexOf(id+'#')===0)delete S.messages[k];});save();stack.pop();render();}
function clearHistory(id){openModal(`<h3>清除聊天记录</h3>
  <button class="btn g" style="margin-bottom:8px" onclick="doClear('${id}','all')">🗑️ 清空全部</button>
  <button class="btn g" style="margin-bottom:8px" onclick="doClear('${id}','3d')">清除最近 3 天</button>
  <button class="btn g" style="margin-bottom:14px" onclick="doClear('${id}','7d')">清除最近 7 天</button>
  <div class="hint">或按日期范围删除：</div>
  <div class="two"><div class="field"><label>从</label><input id="cl_a" type="date"></div><div class="field"><label>到</label><input id="cl_b" type="date"></div></div>
  <button class="btn d" onclick="doClear('${id}','range')">删除该范围</button>
  <button class="btn g" style="margin-top:8px" onclick="closeModal()">取消</button>`);}
function doClear(id,mode){const list=msgs(id);let keep;
  if(mode==='all'){keep=[];}
  else if(mode==='3d'||mode==='7d'){const cut=Date.now()-(mode==='3d'?3:7)*86400000;keep=list.filter(m=>m.time<cut);}
  else{const a=$('#cl_a').value,b=$('#cl_b').value;if(!a||!b){toast('选好起止日期');return;}
    const t0=new Date(a+'T00:00:00').getTime(),t1=new Date(b+'T23:59:59').getTime();keep=list.filter(m=>m.time<t0||m.time>t1);}
  S.messages[mkey(id)]=keep;save();closeModal();render();toast('已删除 '+(list.length-keep.length)+' 条');}
function togProactive(id){const c=getC(id);c.proactive.enabled=!c.proactive.enabled;save();render();}
function togSpy(id,k){const c=getC(id);const sp=getSpy(c);sp[k]=!sp[k];save();render();if(k==='loc'&&sp.loc)fetchWeather(true);}
function saveSpy(id){const c=getC(id);const sp=getSpy(c);sp.time=$('#sp_t').value||'';sp.times=+$('#sp_n').value||2;save();toast('已保存');}
function hhmmOf(v,def){if(typeof v==='number')return String(v).padStart(2,'0')+':00';if(typeof v==='string'&&/^\d{1,2}:\d{2}/.test(v))return v;return def||'09:00';}
function toMin(v){if(typeof v==='number')return v*60;if(typeof v==='string'&&v.includes(':')){const[a,b]=v.split(':');return (+a)*60+(+b);}return 0;}
function savePa(id){const c=getC(id);c.proactive.start=$('#pa_s').value||'09:00';c.proactive.end=$('#pa_e').value||'23:00';c.proactive.times=+$('#pa_n').value||1;save();toast('已保存');}

/* ---------- 多选转发 ---------- */
let _sel=null;
function enterSelect(id){_sel={id,ids:[]};const p=$('#panel');if(p)p.classList.remove('show');render();}
function exitSelect(){_sel=null;render();}
function delSelected(id){if(!_sel||!_sel.ids.length){toast('先选几条');return;}if(!confirm('删除选中的 '+_sel.ids.length+' 条消息？'))return;S.messages[mkey(id)]=msgs(id).filter(m=>_sel.ids.indexOf(m.id)<0);_sel=null;save();render();toast('已删除');}
function toggleSel(mid){if(!_sel)return;const i=_sel.ids.indexOf(mid);const on=i<0;if(on)_sel.ids.push(mid);else _sel.ids.splice(i,1);
  const tk=$('#tk_'+mid);if(tk){tk.textContent=on?'☑':'⚪';tk.style.color=on?'#07c160':'#555';}
  const fc=$('#fwdcnt');if(fc)fc.textContent=_sel.ids.length;}
function forwardSelected(){if(!_sel||!_sel.ids.length){toast('先选几条');return;}
  const from=_sel.id;const targets=S.contacts.filter(c=>!c.deleted&&c.id!==from);
  if(!targets.length){toast('没有别的角色可转发');return;}
  openModal(`<h3>转发给</h3>${targets.map(c=>`<div class="section"><div class="it" onclick="doForward('${c.id}')">${esc(c.remark||c.name)}<span class="v">›</span></div></div>`).join('')}<button class="btn g" style="margin-top:8px" onclick="closeModal()">取消</button>`);}
function doForward(toId){const from=_sel.id;const fromC=getC(from);const src=msgs(from);
  const picked=src.filter(m=>_sel.ids.includes(m.id)&&m.type!=='sys');
  const lines=picked.map(m=>({who:m.role==='user'?S.me.name:(fromC.name),text:previewOf(m)}));
  msgs(toId).push({role:'user',type:'chatlog',title:S.me.name+'和'+fromC.name+'的聊天记录',lines,time:Date.now(),id:uid()});
  save();_sel=null;closeModal();toast('已转发聊天记录');scheduleReply(toId);openChat(toId);}
function openChatlog(mid){let m;for(const k in S.messages){m=S.messages[k].find(x=>x.id===mid);if(m)break;}if(!m)return;
  openModal(`<h3>📑 ${esc(m.title)}</h3><div style="max-height:60vh;overflow-y:auto">${(m.lines||[]).map(l=>`<div style="padding:6px 2px;border-bottom:.5px solid #2a2a2c;font-size:14px"><b style="color:#9ec5fe">${esc(l.who)}：</b>${esc(l.text)}</div>`).join('')}</div><button class="btn g" style="margin-top:10px" onclick="closeModal()">关闭</button>`);}

function bubbleRow(c,m){
  const me=m.role==='user';
  if(m.type==='sys')return `<div class="tstamp"><span>${esc(m.content)}</span></div>`;
  if(!m.id)m.id=uid();
  let inner=buildPart(c,m,me);
  const selecting=_sel&&_sel.id===c.id;
  const h=selecting?`onclick="toggleSel('${m.id}')"`:`onclick="msgMenu('${c.id}','${m.id}')"`;
  const tick=selecting?`<span id="tk_${m.id}" style="align-self:center;font-size:20px;color:${_sel.ids.includes(m.id)?'#07c160':'#555'}">${_sel.ids.includes(m.id)?'☑':'⚪'}</span>`:'';
  const ts=m.time?`<div class="msgt">${hm(m.time)}</div>`:'';
  return `<div class="msg ${me?'me':'them'}">${tick}<span ${h}>${av(me?S.me.avatar:c.avatar)}</span><div class="col" ${h}>${inner}${ts}</div></div>`;}

const TAGWORDS='心情值|心情|记住|闹钟|日程|发朋友圈|发推|点外卖|语音|拒绝代付|代付成功|收款|拒收|收礼|拒礼|来电|联网|转账|红包|位置|图片|文件|骰子|送礼|挂断|亲属卡|推荐好友|已加|拉黑|锁定|禁言|解锁|解禁';

function normTag(line){let t=(line||'').replace(/[［｛]/g,'[').replace(/[］｝]/g,']').replace(/｜/g,'|').replace(/\[\s+/,'[').replace(/\s+\]/,']').trim();
  t=t.replace(new RegExp('^\\[\\s*('+TAGWORDS+')\\s*[|:：，,、\\s]+','i'),'[$1|');
  return t;}

  const m=line.match(CARD_RE);if(!m)return {role:'assistant',type:'text',content:line};
  const f=m[2].split('|');
  if(m[1]==='转账')return {role:'assistant',type:'transfer',amount:+f[0]||0,note:f[1],received:false,id:uid()};
  if(m[1]==='红包')return {role:'assistant',type:'redpacket',amount:+f[0]||0,note:f[1],received:false,id:uid()};

    const lines=splitBubbles(content);let got=false;let txtN=0;let diceUsed=false;const cap=Math.max(1,+c.msgMax||4);

let _call=null,_ring=null,_callTimer=null;
function ringStart(){ringStop();if(!_audio)return;let on=false;
  _ring=setInterval(()=>{try{const o=_audio.createOscillator(),g=_audio.createGain();o.connect(g);g.connect(_audio.destination);
    o.frequency.value=on?660:520;o.type='sine';g.gain.setValueAtTime(.0001,_audio.currentTime);
    g.gain.exponentialRampToValueAtTime(.2,_audio.currentTime+.05);g.gain.exponentialRampToValueAtTime(.0001,_audio.currentTime+.5);
    o.start();o.stop(_audio.currentTime+.55);on=!on;}catch(e){}},650);
  if(navigator.vibrate)navigator.vibrate([400,200,400,200,400]);}
function ringStop(){if(_ring){clearInterval(_ring);_ring=null;}if(navigator.vibrate)navigator.vibrate(0);}
function blip(freq,dur){if(!_audio||!S.settings.sound)return;try{const o=_audio.createOscillator(),g=_audio.createGain();o.connect(g);g.connect(_audio.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(.2,_audio.currentTime);g.gain.exponentialRampToValueAtTime(.001,_audio.currentTime+dur);o.start();o.stop(_audio.currentTime+dur);}catch(e){}}
function incomingCall(id,kind){const c=getC(id);if(!c||c.blocked||_call)return;
  _call={id,kind,state:'incoming',replyVoice:S.settings.voiceAuto!==false,session:uid(),sub:null};initAudio();ringStart();renderCall();}
function placeCall(id,kind){const c=getC(id);if(!c)return;initAudio();_call={id,kind,state:'outgoing',replyVoice:S.settings.voiceAuto!==false,session:uid(),sub:null};renderCall();
  blip(600,.15);setTimeout(()=>{if(_call&&_call.state==='outgoing')answerCall(true);},1600);}
function answerCall(autoByThem){if(!_call)return;ringStop();blip(880,.12);
  _call.state='active';_call.start=Date.now();
  clearInterval(_callTimer);_callTimer=setInterval(renderCallTime,1000);renderCall();
  callAI('[系统：'+(autoByThem?S.me.name+'接通了你打的':'你接通了')+(_call.kind==='video'?'视频':'语音')+'电话，自然开口，口语化短句。]');}
function declineCall(){if(!_call)return;ringStop();blip(300,.3);const id=_call.id,wasIn=_call.state==='incoming';const kindTxt=_call.kind==='video'?'视频通话':'语音通话';
  msgs(id).push({role:'user',type:'sys',content:wasIn?'你拒绝了'+kindTxt:kindTxt+'已取消',time:Date.now(),id:uid()});save();
  _call=null;renderCall();if(cur().p==='chat')render();
  const c=getC(id);if(wasIn&&c&&!c.blocked)setTimeout(()=>aiReply(id,'[系统：你打'+kindTxt+'给'+S.me.name+'，ta拒接了。你察觉到了，主动发消息问ta为什么不接、在干嘛（符合你心情值和人设）。]'),2500);}
function hangupCall(byAI){if(!_call)return;blip(300,.3);clearInterval(_callTimer);const id=_call.id;const kindTxt=_call.kind==='video'?'视频通话':'语音通话';
  const dur=_call.start?Math.floor((Date.now()-_call.start)/1000):0;
  msgs(id).push({role:'user',type:'sys',content:(byAI?'对方挂断 · ':'')+kindTxt+'结束 · 时长 '+Math.floor(dur/60)+':'+(dur%60).toString().padStart(2,'0'),time:Date.now(),id:uid()});save();
  _call=null;renderCall();if(cur().p==='chat')render();
  const c=getC(id);const durTxt=Math.floor(dur/60)+'分'+(dur%60)+'秒';
  if(c&&!c.blocked)setTimeout(()=>aiReply(id,byAI
    ?'[系统：刚才这通'+kindTxt+'聊了'+durTxt+'，是你自己主动挂断的。挂断后你立刻再补发一条微信消息给'+S.me.name+'（解释下为什么挂、或把刚才没说完的话说完、或撒娇哄一下，符合人设），别一句话都不说就消失。]'
    :'[系统：你们这通'+kindTxt+'聊了'+durTxt+'，是'+S.me.name+'挂断的，你察觉到了，主动再发条消息（可以提这次通话多久/意犹未尽/问怎么突然挂了，符合你人设）。]'),2500);}
function renderCallTime(){if(!_call||_call.state!=='active')return;const s=$('#callStat');if(s){const d=Math.floor((Date.now()-_call.start)/1000);s.textContent=Math.floor(d/60)+':'+(d%60).toString().padStart(2,'0');}}
function renderCall(){const L=$('#callLayer');if(!_call){L.className='callscreen';L.innerHTML='';return;}
  const c=getC(_call.id);const video=_call.kind==='video';
  L.className='callscreen show'+(video?' video':'')+(_call.state==='active'?' active':'');

  let btns='';
  if(_call.state==='incoming')btns=`<div class="cbtncol"><div class="cbtn red" onclick="declineCall()">📵</div>拒绝</div><div class="cbtncol"><div class="cbtn green" onclick="answerCall()">📞</div>接听</div>`;
  else if(_call.state==='outgoing')btns=`<div class="cbtncol"><div class="cbtn red" onclick="declineCall()">📵</div>取消</div>`;

  L.innerHTML=`<div class="cav">${isImg(c.avatar)?`<img src="${c.avatar}">`:(c.avatar||'🙂')}</div>
    <div class="cname">${esc(c.remark||c.name)}</div><div class="cstat">${stat}</div>
    <div class="callsub" id="callSub"></div>
    ${_call.state==='active'?`<div class="callinput show" id="callInput"><input id="callMsg" placeholder="打字说…" onkeydown="if(event.key==='Enter')callSend()"><button onclick="callSend()">发</button></div>`:''}
    <div class="callbtns">${btns}</div>`;
  updateCallSub();}
function updateCallSub(){const box=$('#callSub');if(!box)return;const s=_call&&_call.sub;
  box.innerHTML=s?`<div class="csline ${s.who==='me'?'me':''}">${esc(s.text)}</div>`:'';}
function recDownCall(ev){if(ev&&ev.preventDefault)ev.preventDefault();startRec(()=>{const b=document.querySelector('#callInput button');});}
function recUpCall(cancel){if(!_call||!_rec)return;const tooShort=Date.now()-_rec.start<600;const id=_call.id;
  stopRec(cancel||tooShort,m=>{if(!m||tooShort)return;msgs(id).push({role:'user',type:'voice',audio:m.audio,content:m.content||'',dur:m.dur,id:uid(),time:Date.now(),_call:true,_ck:(_call&&_call.kind)||'voice',_cs:_call&&_call.session});save();if(_call){_call.sub={who:'me',text:'🎙️ '+(m.content||'语音')};updateCallSub();}callAI();});}
function playBufWait(buf){return new Promise(res=>{if(!_audio||!buf){res();return;}try{if(_audio.state==='suspended')_audio.resume();if(_curSrc){try{_curSrc.stop();}catch(e){}}const s=_audio.createBufferSource();s.buffer=buf;s.connect(_audio.destination);s.onended=()=>res();s.start();_curSrc=s;setTimeout(res,Math.min(20000,buf.duration*1000+800));}catch(e){res();}});}
async function speakWait(text,c){const v=c?getVoice(c):null;const t=stripSpoken(text);
  if(!t)return new Promise(r=>setTimeout(r,1100));
  if(v&&v.engine==='api'&&S.settings.tts&&S.settings.tts.key){const ab=await ttsArr(text,c);const buf=await decodeBuf(ab);if(buf){await playBufWait(buf);return;}}
  return new Promise(res=>{try{const u=new SpeechSynthesisUtterance(t);if(v){u.rate=+v.rate||1;u.pitch=+v.pitch||1;if(v.voiceURI){const vs=_voices.find(x=>x.voiceURI===v.voiceURI);if(vs)u.voice=vs;}}u.onend=()=>res();u.onerror=()=>res();speechSynthesis.cancel();speechSynthesis.speak(u);setTimeout(res,Math.max(2500,t.length*200));}catch(e){res();}});}
function callSend(){const inp=$('#callMsg');if(!inp)return;const t=inp.value.trim();if(!t||!_call)return;inp.value='';
  msgs(_call.id).push({role:'user',type:'text',content:t,time:Date.now(),id:uid(),_call:true,_ck:_call.kind,_cs:_call.session});save();_call.sub={who:'me',text:t};updateCallSub();callAI();}
async function callAI(sysNote){if(!_call)return;const c=getC(_call.id);const video=_call.kind==='video';const sess=_call.session;
  try{const hist=msgs(c.id).slice(-(S.settings.hist||24)).map(m=>({role:m.role,content:msgToText(m)})).filter(x=>x.content!=null);
    if(sysNote)hist.push({role:'user',content:sysNote});
    const _lang=(getVoice(c).lang||'zh');const _langN=_lang==='zh'?'':({'英':'英','日':'日','韩':'韩'}[_lang]||_lang)+'语';
    let cf='\n\n# 正在'+(video?'视频':'语音')+'通话（务必遵守格式）\n用口语短句，像打电话一样，别用卡片。每句单独一行。';
    if(video)cf+='\n- 这是视频，你的动作神态用【】单独成行写，比如【凑近镜头笑】。';
    else cf+='\n- 这是语音通话（看不到画面），绝对不要出现任何【】动作神态描写，一个【】都不许有，只能说话。';
    if(_langN)cf+='\n- ‼️最重要：你全程只能说'+_langN+'，从头到尾每一句都是'+_langN+'，绝对不准中途切回中文整句说话（这是会被读出来的那一行）。格式：先单独一行写'+_langN+'原文（会被读出来），紧接着【换一行】用（）单独写中文翻译（不会被读）。原文一行、（中文翻译）另起一行，别写在同一行，也别把顺序搞反。例如：\n'+(_lang==='韩'?'사랑해\n（我爱你）':_lang==='日'?'好きだよ\n（喜欢你）':'I miss you\n（我想你了）')+'\n- 哪怕是要挂断、道别、回应"挂了/别挂/我爱你"这种话，也必须先写'+_langN+'原文那一行，绝不能整句只说中文。';
    cf+='\n- 想结束通话就【单独占一行】只输出 [挂断]，不要把 [挂断] 和说的话写在同一行。';
    const sys=buildSystem(c)+cf;
    let content=await chatAPI([{role:'system',content:sys},...hist]);
    if(!_call||_call.session!==sess)return;
    // 外语通话里只要有"整句说成中文"的句子（哪怕只是其中几句跑偏），自动纠正重来一次
    if(_langN&&content&&callDrifted(content,_lang)){
      const fix=await chatAPI([{role:'system',content:sys},...hist,{role:'assistant',content:content},{role:'user',content:'[系统纠正：你刚才有句子直接说成了中文。请整段重说，每一句都先写'+_langN+'原文一行、再换行写（中文翻译），从头到尾不许出现整句中文。]'}]);
      if(_call&&_call.session===sess&&fix&&!callDrifted(fix,_lang))content=fix;}
    const wantHang=/\[挂断\]/.test(content);const pieces=[];const _vlang=(getVoice(c).lang||'zh');
    splitBubbles(content).forEach(l=>{l=normTag(l);if(/^\[挂断\]$/.test(l))return;const mm=l.match(/^\[心情\|([^\]]*)\]$/);if(mm){c.mood=mm[1];return;}if(LEAKRE.test(l))return;
      if(video){splitActions(l).forEach(p=>pieces.push(p));}
      else{const cleaned=l.replace(/【[^】]*】/g,'').trim();if(cleaned)splitActions(cleaned).forEach(p=>pieces.push(p));}});
    for(const p of pieces){if(!_call||_call.session!==sess)return;
      msgs(c.id).push({role:'assistant',type:'text',content:p,time:Date.now(),id:uid(),_call:true,_ck:video?'video':'voice',_cs:sess});save();
      _call.sub={who:'them',text:p};updateCallSub();
      const spoken=pickSpoken(p,_vlang);
      if(_call.replyVoice&&!c.muted&&spoken){await speakWait(spoken,c);await sleep(900);}else await sleep(Math.max(1400,p.length*150));}
    if(_call&&_call.session===sess){_call.sub=null;updateCallSub();}
    if(wantHang&&_call&&_call.session===sess)setTimeout(()=>{if(_call&&_call.id===c.id)hangupCall(true);},900);
  }catch(e){if(_call){_call.sub={who:'them',text:'(信号不好…)'};updateCallSub();}}}

const WCODE={0:'晴',1:'晴',2:'多云',3:'阴',45:'雾',48:'雾',51:'小雨',53:'小雨',55:'雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'雪',75:'大雪',80:'阵雨',81:'阵雨',82:'大阵雨',95:'雷雨',96:'雷雨'};
function fetchWeather(manual){if(!navigator.geolocation){if(manual)toast('设备不支持定位');return;}
  navigator.geolocation.getCurrentPosition(async p=>{const la=p.coords.latitude,lo=p.coords.longitude;
    try{const w=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+la+'&longitude='+lo+'&current=temperature_2m,weather_code,precipitation').then(r=>r.json());
      let place='';try{const g=await fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+la+'&longitude='+lo+'&localityLanguage=zh').then(r=>r.json());
        const parts=[g.principalSubdivision||g.city,g.locality,(g.localityInfo&&g.localityInfo.administrative&&g.localityInfo.administrative.slice(-1)[0]&&g.localityInfo.administrative.slice(-1)[0].name)];
        place=parts.filter((x,i,a)=>x&&a.indexOf(x)===i).join('·');}catch(e){}
      const code=w.current.weather_code,desc=WCODE[code]||'未知';
      S.weather={place,temp:Math.round(w.current.temperature_2m),desc,rain:(w.current.precipitation>0||[51,53,55,61,63,65,80,81,82,95,96].indexOf(code)>=0),time:Date.now()};
      save();if(manual)toast('🌦️ '+place+' '+desc+' '+S.weather.temp+'°C');if(cur().p==='settings')render();
    }catch(e){if(manual)toast('天气获取失败');}
  },()=>{if(manual)toast('定位被拒绝了');});}

  if(/没什么新动静/.test(act)){S._spySeen[id]=Date.now();save();return;}
  const note='[系统：你查看了'+S.me.name+'的手机，看到这些"自上次以来的新动静"：\n'+act+'\n请只针对这些新内容给ta发微信（吃醋/关心/调侃/质问都行，符合人设），别重复以前提过的事，自然口语。]';
  try{const content=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:note}],{aux:true});
    splitBubbles(content).forEach(l=>{if(/^\[(联网|心情|记住|闹钟|来电)\|/.test(l))return;const mm=lineToMsg(l);mm.time=Date.now();msgs(id).push(mm);notifyIncoming(c,mm);});S._spySeen[id]=Date.now();save();
    if(cur().p==='chat'&&cur().id===id)render();else if(cur().p==='wechat')render();
  }catch(e){}}
function testSpy(id){const c=getC(id);if(!c)return;getSpy(c).granted=true;save();closeModal();if(cur().p==='chat'&&cur().id===id){}else openChat(id);S._spySeen=S._spySeen||{};S._spySeen[id]=0;doSpyView(id,true);}
function maybeSpyIdle(id){const c=getC(id);if(!c)return;const sp=getSpy(c);if(!sp.granted)return;
  const lm=lastMsg(id);if(lm&&Date.now()-lm.time<2*3600000)return;doSpyView(id);}
let _spyFired={};
function checkSpyTime(){const now=new Date();const hhmm=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');const tag=now.toDateString()+hhmm;
  S.contacts.forEach(c=>{if(c.deleted)return;const sp=getSpy(c);if(sp.granted&&sp.time===hhmm&&_spyFired[c.id]!==tag){_spyFired[c.id]=tag;doSpyView(c.id,true);}});}
setInterval(checkSpyTime,15000);

/* ---------- 朋友圈 ---------- */
function showVisitors(){const vs=S.visitors||[];openModal(`<h3>👣 谁看过我</h3>${vs.length?vs.map(v=>`<div class="xdmrow">${av(v.avatar,'sm')}<div class="meta"><div class="n">${esc(v.name)}</div><div class="s">${esc(v.where)} · ${ago(v.time)}</div></div></div>`).join(''):'<div class="empty">还没有访客记录</div>'}${vs.length?'<button class="btn d" style="margin-top:8px" onclick="S.visitors=[];save();showVisitors()">🧹 一键清空</button>':''}<button class="btn g" style="margin-top:8px" onclick="closeModal()">关闭</button>`);}
function wxMoments(){
  const cover=S.me.momentCover?`background:url(${S.me.momentCover}) center/cover`:'';
  return `<div class="mcover" style="${cover}"><div onclick="changeCover()" style="position:absolute;left:12px;top:14px;font-size:12px;color:#fff;background:rgba(0,0,0,.3);padding:3px 9px;border-radius:12px;cursor:pointer">📷 换背景</div><div class="me"><div class="nm">${esc(S.me.name)}</div>${av(S.me.avatar,'lg')}</div></div>
    <div style="text-align:right;padding:26px 14px 6px"><button class="minibtn" onclick="showVisitors()">👣 谁看过我${(S.visitors||[]).length?'('+(S.visitors||[]).length+')':''}</button>
      <button class="minibtn" onclick="postMoment()">＋ 发朋友圈</button>
      <button class="minibtn" onclick="refreshMoments()">🔄 刷新</button></div>
    ${(function(){const ms=S.moments.filter(p=>(p.acct||'main')===actId());return ms.length?ms.map(momentHTML).join(''):'<div class="empty">'+(isMain()?'还没有朋友圈，点「刷新」让角色发动态，或自己发一条～':'这个身份的朋友圈还是空的～')+'</div>';})()}
    <div style="height:20px"></div>`;}
function changeCover(){pickFile('image/*',async f=>{S.me.momentCover=await compress(f,900,.6);save();render();toast('背景已换');});}
function momentHTML(p){const author=p.authorId==='me'?S.me:getC(p.authorId);if(!author)return '';
  const name=p.authorId==='me'?S.me.name:(author.remark||author.name);
  return `<div class="mpost">${av(author.avatar,'sm')}<div class="body">
    <div class="au">${esc(name)}</div>
    <div class="tx">${esc(p.text)}</div>
    ${p.images&&p.images.length?`<div class="imgs">${p.images.map(im=>`<div class="ph" onclick="viewImg('${im}')"><img src="${im}"></div>`).join('')}</div>`:''}
    <div class="ft"><div class="tm">${ago(p.time)}</div><div class="acts" onclick="momentMenu('${p.id}')">···</div></div>
    ${p.likes&&p.likes.length?`<div class="likes">❤️ ${p.likes.map(l=>esc(l)).join('，')}</div>`:''}
    ${p.comments&&p.comments.length?`<div class="cmts">${p.comments.map((cm,ci)=>`<div class="cmt" onclick="replyComment('${p.id}',${ci})"><b>${esc(cm.name)}：</b>${esc(cm.text)}</div>`).join('')}</div>`:''}
  </div></div>`;}
function momentMenu(pid){const p=S.moments.find(x=>x.id===pid);
  openModal(`<h3>互动</h3>
    <button class="btn g" style="margin-bottom:8px" onclick="likeMoment('${pid}')">❤️ ${S.me.name} 点赞</button>
    <div class="field"><input id="cm_t" placeholder="写条评论…"></div>
    <button class="btn p" onclick="commentMoment('${pid}')">评论</button>
    <button class="btn d" style="margin-top:10px" onclick="S.moments=S.moments.filter(x=>x.id!=='${pid}');save();closeModal();render()">删除这条朋友圈</button>
    <button class="btn g" style="margin-top:8px" onclick="closeModal()">关闭</button>`);}
function replyComment(pid,ci){const p=S.moments.find(x=>x.id===pid);if(!p)return;const cm=p.comments[ci];if(!cm)return;
  openModal(`<h3>回复 ${esc(cm.name)}</h3><div class="field"><input id="rc_t" placeholder="回复 ${esc(cm.name)}…"></div>
    <div class="btns"><button class="btn g" onclick="closeModal()">取消</button><button class="btn p" onclick="doReplyComment('${pid}',${ci})">回复</button></div>`);}
function doReplyComment(pid,ci){const t=$('#rc_t').value.trim();if(!t)return;const p=S.moments.find(x=>x.id===pid);const cm=p.comments[ci];
  p.comments.push({name:S.me.name,text:'回复 '+cm.name+'：'+t});save();closeModal();render();
  if(cm.cid&&getC(cm.cid))reactToComment(p,cm.cid);}
function likeMoment(pid){const p=S.moments.find(x=>x.id===pid);p.likes=p.likes||[];if(!p.likes.includes(S.me.name))p.likes.push(S.me.name);save();closeModal();render();}
function commentMoment(pid){const t=$('#cm_t').value.trim();if(!t)return;const p=S.moments.find(x=>x.id===pid);
  p.comments=p.comments||[];p.comments.push({name:S.me.name,text:t});save();closeModal();render();
  if(p.authorId!=='me')reactToComment(p);}
function postMoment(){openModal(`<h3>发朋友圈</h3>
  <div class="field"><textarea id="mm_t" rows="3" placeholder="这一刻的想法…"></textarea></div>
  <div class="field"><button class="minibtn" id="mm_imgs_btn" onclick="addMomentImg()">📷 加图片</button> <span id="mm_imgcount"></span></div>
  <div class="btns"><button class="btn g" onclick="closeModal()">取消</button><button class="btn p" onclick="doPostMoment()">发表</button></div>`);
  window._mmImgs=[];}
function addMomentImg(){pickFile('image/*',async f=>{window._mmImgs.push(await compress(f,700,.6));$('#mm_imgcount').textContent='已加'+window._mmImgs.length+'张';});}
function doPostMoment(){const t=$('#mm_t').value.trim();if(!t&&!(window._mmImgs||[]).length){toast('写点什么吧');return;}
  const p={id:uid(),authorId:'me',text:t,images:window._mmImgs||[],time:Date.now(),likes:[],comments:[],acct:actId()};
  S.moments.unshift(p);save();closeModal();render();reactToMyMoment(p);}
function cleanReply(t){return (t||'').replace(/\[(心情|记住|闹钟|来电|联网|骰子|送礼|代付成功|日程|转账|红包|位置|图片|文件)[^\]]*\]/g,'').replace(/^["「]+|["」]+$/g,'').trim();}
function recordVisit(cid,where){const c=getC(cid);if(!c)return;if(!S.visitors)S.visitors=[];S.visitors.unshift({cid,name:c.remark||c.name,avatar:c.avatar,where:where||'朋友圈',time:Date.now()});if(S.visitors.length>40)S.visitors.length=40;save();}
async function reactToMyMoment(p){const pool=S.contacts.filter(c=>!c.deleted&&!c.blocked);
  for(const c of pool.slice(0,3)){try{recordVisit(c.id,'朋友圈');const r=await chatAPI([{role:'system',content:buildSystem(c)},
    {role:'user',content:'你的恋人/好友'+S.me.name+'发了条朋友圈："'+p.text+'"。请你只回复一句：要么是点赞就回"赞"，要么是一句简短自然的评论。不要带任何方括号标记。'}]);
    const txt=cleanReply(r);if(txt==='赞'||(txt.includes('赞')&&txt.length<3)){p.likes.push(c.remark||c.name);}
    else if(txt){p.comments.push({name:c.remark||c.name,cid:c.id,text:txt.slice(0,40)});}
    save();if(cur().p==='wechat'&&wxTab==='moments')render();}catch(e){}}}
async function reactToComment(p,toContactId){const c=getC(toContactId||p.authorId);if(!c)return;try{
  const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:S.me.name+'在你能看到的朋友圈"'+p.text+'"下评论了，回ta一句（不要带方括号标记）。'}]);
  const txt=cleanReply(r);if(txt)p.comments.push({name:c.remark||c.name,cid:c.id,text:txt.slice(0,40)});save();if(cur().p==='wechat')render();}catch(e){}}
async function refreshMoments(){const pool=S.contacts.filter(c=>!c.deleted&&!c.blocked);if(!pool.length){toast('先创建角色');return;}
  toast('刷新中…');const picks=pool.sort(()=>Math.random()-.5).slice(0,2);
  for(const c of picks){try{const r=await chatAPI([{role:'system',content:buildSystem(c)},
    {role:'user',content:'以你的身份发一条朋友圈动态（一两句，可带点心情或日常），只输出动态内容本身，不要带方括号标记。'}]);
    S.moments.unshift({id:uid(),authorId:c.id,text:cleanReply(r).slice(0,120),images:[],time:Date.now(),likes:[],comments:[],acct:actId()});
    save();if(cur().p==='wechat'&&wxTab==='moments')render();}catch(e){toast('生成失败：'+e.message);}}}

/* ---------- 通用弹窗 ---------- */
function openModal(html){$('#modalSheet').innerHTML=html;$('#modal').classList.add('show');}
function closeModal(){$('#modal').classList.remove('show');}
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
function openChat(id){const c=getC(id);if(!c){home();return;}if(c.blocked){toast('已拉黑');}stack=stack.filter(s=>s.p!=='chat');go('chat',{id});}

/* ---------- 备份 ---------- */
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='小手机备份_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('已导出');}
function importData(){pickFile('.json',f=>{const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.settings){S=Object.assign(defState(),d);save();render();toast('已导入');}}catch(e){toast('文件读不了');}};r.readAsText(f);});}

/* ---------- 时钟 & 启动 ---------- */
function paintBatt(){const b=$('#battinfo');if(b)b.innerHTML='📶 5G 🔋'+(S.me.battery!=null?S.me.battery+'%':'88%')+(S.me.charging?'⚡':'');}
function initBattery(){if(navigator.getBattery){navigator.getBattery().then(bt=>{const upd=()=>{S.me.battery=Math.round(bt.level*100);S.me.charging=bt.charging;save();paintBatt();};bt.addEventListener('levelchange',upd);bt.addEventListener('chargingchange',upd);upd();}).catch(()=>{});}}
initBattery();
document.addEventListener('visibilitychange',()=>{if(cur().p==='wechat'&&wxTab==='me')render();});
setInterval(()=>{const c=$('#clock');if(c)c.textContent=hm();paintBatt();if(cur().p==='home')$('#app').querySelector('.hh')&&($('#app').querySelector('.hh').textContent=hm());},1000);
render();
</script>
</body>
</html>
