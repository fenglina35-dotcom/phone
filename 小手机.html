function autoAssignTasks(){if(!isMain())return;const c=taskC();if(!c||c.blocked)return;checkTaskPenalty(c);
  if(tasksToday(c)||_taskBusy)return;const a=S.settings&&S.settings.chat;if(!a||!a.key)return;// 没配模型就不自动生成
  const tt=c.taskTime||'09:00';const now=new Date();const hhmm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');if(hhmm<tt)return;// 没到设定的布置时间不自动发（避免凌晨布置）
  if(Date.now()-_autoTaskTry<60000)return;_autoTaskTry=Date.now();genTasks();}
setTimeout(autoAssignTasks,4000);

/* 主动消息 */
async function maybeProactive(id){if(!isMain())return;const c=getC(id);if(!c.proactive.enabled||c.blocked)return;
  const now=new Date().getHours()*60+new Date().getMinutes();const s=toMin(c.proactive.start),e=toMin(c.proactive.end);const inWin=s<=e?(now>=s&&now<e):(now>=s||now<e);
  if(!inWin)return;const lm=lastMsg(id);if(lm&&Date.now()-lm.time<(Number(S.settings.proactiveIdleMin)||20)*60000)return;
  const today=new Date().toDateString();const pc=S._proactiveCount[id]||{date:today,n:0};if(pc.date!==today){pc.date=today;pc.n=0;}
  if(pc.n>=(c.proactive.times||1))return;pc.n++;S._proactiveCount[id]=pc;save();
  const note='[系统：现在是'+hm()+'，'+S.me.name+'有一会儿没理你了，请你主动发起一段微信消息，自然一点。]';
  try{const content=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:note}]);
    applyAuxTags(content,c,id);splitBubbles(content).forEach(l=>{if(/^\[(联网)\|/.test(l)||CTLLEAK.test((l||'').trim()))return;const mm=lineToMsg(l);if(mm.type==='text'&&/^\[(心情|记住|闹钟|来电)\|/.test(mm.content))return;mm.time=Date.now();msgs(id).push(mm);notifyIncoming(c,mm);});save();
    if(cur().p==='chat'&&cur().id===id)render();else if(cur().p==='wechat')render();
  }catch(e){}}

/* ---------- 查岗（他看我的手机）---------- */
function spyBudget(id){const today=new Date().toDateString();const c=getSpy(getC(id));const pc=S._spyCount&&S._spyCount[id]||{date:today,n:0};if(pc.date!==today){pc.date=today;pc.n=0;}
  if(pc.n>=(c.times||2))return false;pc.n++;if(!S._spyCount)S._spyCount={};S._spyCount[id]=pc;save();return true;}
async function doSpyView(id,force,opts){opts=opts||{};if(!isMain())return;const c=getC(id);if(!c||c.blocked)return;const sp=getSpy(c);if(!sp.granted)return;
  if(!force&&!spyBudget(id))return;recordVisit(id,'查看手机');
  const fd=opts.intent?spyFocusData(id,opts.focus):null;const flab=fd?(fd.label||opts.focus||'手机'):'';
  const steps=opts.intent?['正在连接 '+(c.remark||c.name)+' 的查看请求…','正在查看 '+flab]:['正在连接 '+(c.remark||c.name)+' 的查看请求…','正在查看 微信聊天','正在查看 朋友圈','正在查看 钱包账单','正在查看 X浏览记录','正在查看 X私信'].concat(sp.loc?['正在查看 实时定位']:[]);
  const B=$('#spyBanner');B.className='spybanner show';
  for(let i=0;i<steps.length;i++){B.innerHTML=`👁️ <b>${esc(c.remark||c.name)}</b> ${esc(steps[i])}<span class="spydot">…</span>`;await sleep(900);}
  B.innerHTML=`✅ <b>${esc(c.remark||c.name)}</b> ${opts.intent?'看完了'+esc(flab):'结束查看'}`;await sleep(1100);B.className='spybanner';
  if(!S._spySeen)S._spySeen={};const since=S._spySeen[id]||0;let note;
  if(opts.intent){
    // 按他意愿查：一次只查一项（他明确说要查的那项），没数据就如实说没查到，绝不许编
    const lab=flab;const has=!!(fd.data&&fd.data.trim());
    note='[系统：你'+(opts.bySheTold?'应'+S.me.name+'的要求':'主动')+'翻看了'+S.me.name+'手机里的【'+lab+'】这一项（这次你只看了这一项，别的没看）。'+(has?('真实记录如下（只有这些）：\n'+fd.data+'\n\n【铁律】只能依据上面这些真实记录说话，针对它们用你的人设反应（占有欲/吃醋/追问/调侃/心疼都行）。绝不许编造上面没有的聊天、人名、内容。'):('但这一项后台【没有任何记录】。\n\n【铁律】你这次什么都没查到——就如实、自然地跟ta说"我翻了你的'+lab+'，没看到什么/挺干净的"之类，绝对不许编造任何聊天、人名、记录来诈ta。'))+'\n【说话要求】简短、直接、戳重点：一两句话点破/质问你最在意的那条，别啰嗦长篇大论、别逐条念。别复述系统提示、别带方括号、自然口语。]';
  }else{
    let act=myActivity(id,since);
    if(/没什么新动静/.test(act)){S._spySeen[id]=Date.now();save();return;}
    note='[系统：你查看了'+S.me.name+'的手机，看到这些"自上次以来的新动静"：\n'+act+'\n请只针对这些新内容给ta发微信（吃醋/关心/调侃/质问都行，符合人设），别重复以前提过的事。\n【说话要求】简短直接、戳重点，一两句就够，别啰嗦一大堆。自然口语。\n【铁律】只能依据上面真实内容，不许编造没有的记录。]';
  }
  try{const content=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:note}],{aux:true});
    applyAuxTags(content,c,id);splitBubbles(content).forEach(l=>{if(/^\[(联网|心情|记住|闹钟|来电)\|/.test(l)||CTLLEAK.test((l||'').trim()))return;const mm=lineToMsg(l);mm.time=Date.now();msgs(id).push(mm);notifyIncoming(c,mm);});if(!opts.intent)S._spySeen[id]=Date.now();save();
    if(cur().p==='chat'&&cur().id===id)render();else if(cur().p==='wechat')render();
  }catch(e){}}
// 按他意愿单项查岗时取某一类的真实数据；没有就返回空（绝不让他编）
function spyFocusData(id,focus){const f=focus||'';
  if(/抖音/.test(f)){let s='';const hist=(S.dy&&S.dy.history||[]).slice(0,8);if(hist.length)s+='【抖音搜索记录】'+hist.join('、')+'\n';
    const liked=(S.dy&&S.dy.liked||[]).slice(0,8);if(liked.length)s+='【抖音点赞】'+liked.map(v=>'@'+(v.author||'')+'「'+(v.desc||'').slice(0,18)+'」').join('；')+'\n';
    const dms=(S.dy&&S.dy.dms||[]).filter(d=>(d.msgs||[]).length);if(dms.length)s+='【抖音私信】'+dms.slice(0,6).map(d=>d.name+'：'+(d.msgs.slice(-2).map(m=>(m.from==='me'?S.me.name:d.name)+'"'+m.text+'"').join(' / '))).join('；')+'\n';
    return {label:'抖音（搜索/点赞/私信）',data:s};}
  if(/朋友圈/.test(f)){const inter=S.moments.filter(p=>(p.likes||[]).includes(S.me.name)||(p.comments||[]).some(cm=>cm.name===S.me.name)).slice(0,4).map(p=>{const cm=(p.comments||[]).find(x=>x.name===S.me.name);return (p.authorId==='me'?'自己':(getC(p.authorId)&&getC(p.authorId).name||'某人'))+'的动态'+(cm?'评论"'+cm.text+'"':'点赞');});
    const mine=S.moments.filter(p=>p.authorId==='me').slice(0,3).map(p=>'发了"'+(p.text||'').slice(0,20)+'"');return {label:'朋友圈',data:inter.concat(mine).join('；')};}
  if(/钱包|账单|花钱|消费|买/.test(f)){const bills=(S.me.bills||[]).slice(-6);return {label:'钱包账单',data:bills.map(b=>b.note+' '+(b.type==='in'?'+':'-')+b.amount).join('、')};}
  if(/定位|位置|在哪|在干|在做/.test(f)){return {label:'实时定位/状态',data:[curLoc()?'位置：'+curLoc():'',S.me.status?'她写的状态："'+S.me.status+'"':''].filter(Boolean).join('；')};}
  if(/(X|x|推特|微博)/.test(f)){const tw=(S.x&&S.x.tweets||[]).filter(t=>t.who==='me').slice(0,4);return {label:'X动态',data:tw.map(t=>'「'+t.text.slice(0,24)+'」').join('、')};}
  if(/浏览|百度|网页/.test(f)){const h=(S.browser&&S.browser.history||[]).slice(0,5).map(x=>x.q);return {label:'浏览器搜索',data:h.join('、')};}
  if(/微信|聊天|跟谁|消息|谁聊|谁说|联系人/.test(f)){const others=S.contacts.filter(c=>!c.deleted&&c.id!==id).map(c=>({c,um:[...msgs(c.id)].reverse().find(m=>m.role==='user'&&m.type!=='sys'),lm:lastMsg(c.id)})).filter(x=>x.um&&x.lm).sort((a,b)=>(cWeight(b.c)-cWeight(a.c))||(b.lm.time-a.lm.time)).slice(0,4);
    return {label:'微信聊天',data:others.map(o=>{const nm=(o.c.remark||o.c.name);const recent=msgs(o.c.id).slice(-8).map(m=>{const t=msgToText(m);return t?((m.role==='user'?S.me.name:nm)+'：'+t.replace(/\n/g,' ').slice(0,50)):'';}).filter(Boolean).join('\n');return '【她和 '+nm+cMark(o.c)+' 的聊天（'+hm(o.lm.time)+'）完整内容】\n'+recent;}).join('\n\n')};}
  // 没指明具体看啥 → 只瞄一眼大概（位置+状态）
  return {label:'',data:[curLoc()?'她此刻在'+curLoc():'',S.me.status?'她写的状态："'+S.me.status+'"':''].filter(Boolean).join('；')};}
// 查岗自由化：他口头说要看 / 她让他看 → 当场触发一次查手机（不占固定次数，按他的意愿来）
let _spyIntentT={};
function maybeSpyIntent(reply,c,id,lu){const sp=getSpy(c);if(!sp.granted||c.blocked||!isMain())return;
  const now=Date.now();if(now-(_spyIntentT[id]||0)<45000)return;
  const userText=lu?(msgToText(lu)||''):'';
  const VERB='(看看|瞧瞧|查查?|检查|翻看|翻翻|翻一[下翻]|盯着?看|搜搜?)';
  const OBJ='(你的?手机|你的?微信|聊天记录|朋友圈|抖音|你的?定位|你的?位置|你的?钱包|你的?账单|你跟谁(在?聊|说)|你在(干|做)(什么|啥|嘛|什么))';
  const heWants=new RegExp(VERB+'[^。！!？?\\n]{0,8}'+OBJ).test(reply)||new RegExp(OBJ+'[^。！!？?\\n]{0,8}'+VERB).test(reply)||/(手机|微信)\s*(给我|拿来|发我)[^。\n]{0,4}(看|查)/.test(reply);
  const sheInvites=/(查|看看?)[^。！!？?\n]{0,3}(我的?手机|我的?微信|我的?聊天|我的?朋友圈|我的?抖音)|(我的?(手机|微信))[^。\n]{0,4}给你(看|查)|你(就)?(查|看)吧|随(便)?(你)?(查|看)|想查就查|我没(什么)?(好)?藏/.test(userText);
  if(!heWants&&!sheInvites)return;
  const ft=reply+' '+userText;const focus=(ft.match(/微信(聊天|消息)?|聊天记录|朋友圈|抖音|钱包|账单|定位|位置|跟谁(聊|说)/)||[''])[0]||'';
  _spyIntentT[id]=now;
  setTimeout(()=>doSpyView(id,true,{intent:true,bySheTold:sheInvites&&!heWants,focus}),900);}
// 他口头额外布置任务/惩罚（聊天或通话里都行）：识别后真的加进任务便签
let _taskIntentT={};
async function maybeTaskIntent(reply,c){if(!reply||!c||c.blocked||!isMain())return;const tm=taskC();if(!tm||tm.id!==c.id)return;
  if(!/罚你|惩罚|罚抄|罚款|(加|布置|再来|多)(个|条|一个|一条)?任务|任务[:：]|今晚?.{0,4}(不准|不许|必须|得给我|要给我)|今天.{0,6}(不准|不许|必须|得给我|要给我)|写(篇|个|段|一篇|一段)?.{0,3}(检讨|小作文|保证书|情书)|不准(玩|刷|聊|睡)/.test(reply))return;
  const now=Date.now();if(now-(_taskIntentT[c.id]||0)<8000)return;_taskIntentT[c.id]=now;
  try{const sys='判断"'+(c.remark||c.name)+'"这句话是不是在给'+S.me.name+'【额外布置一个具体任务或惩罚】（要ta去做某件事）。是就提取成一条任务；只是普通调情/威胁/抱怨但没真布置具体任务，就当没有。\n只输出JSON：{"task":{"text":"任务描述(用ta的口吻,简短)","verify":"essay或moment或tweet或douyin或real","target":数字或0}} 或 {"task":null}。\nverify：essay=要她写东西(target填字数上限)；moment/tweet/douyin=要她发朋友圈/推/抖音；real=其它现实或暧昧小事。';
    const r=await chatAPI([{role:'system',content:sys},{role:'user',content:reply}],{max:160,aux:true});
    const d=parseObj(r);if(!d||!d.task||!d.task.text)return;const t=d.task;
    if(!c.tasks||c.tasks.date!==todayStr())c.tasks={date:todayStr(),assignTs:Date.now(),list:[],rewarded:false,penalized:false};
    c.tasks.list.push({id:uid(),text:(''+t.text).slice(0,140),kind:t.verify==='real'?'real':'app',verify:['essay','moment','tweet','douyin','real'].indexOf(t.verify)>=0?t.verify:'real',target:+t.target||0,done:false,extra:true});
    save();toast('📋 '+(c.remark||c.name)+'给你加了个任务');if(cur().p==='tasks')render();
  }catch(e){}}
function testSpy(id){const c=getC(id);if(!c)return;getSpy(c).granted=true;save();closeModal();if(cur().p==='chat'&&cur().id===id){}else openChat(id);S._spySeen=S._spySeen||{};S._spySeen[id]=0;doSpyView(id,true);}
function maybeSpyIdle(id){const c=getC(id);if(!c)return;const sp=getSpy(c);if(!sp.granted)return;
  const lm=lastMsg(id);if(lm&&Date.now()-lm.time<2*3600000)return;doSpyView(id);}
let _spyFired={};
function checkSpyTime(){const now=new Date();const hhmm=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');const tag=now.toDateString()+hhmm;
  S.contacts.forEach(c=>{if(c.deleted)return;const sp=getSpy(c);if(sp.granted&&sp.time===hhmm&&_spyFired[c.id]!==tag){_spyFired[c.id]=tag;doSpyView(c.id,true);}});}

  <div class="btns"><button class="btn g" onclick="closeModal()">取消</button><button class="btn p" onclick="doPostMoment()">发表</button></div>`);
  window._mmImgs=[];}
function addMomentImg(){pickFile('image/*',async f=>{window._mmImgs.push(await compress(f,700,.6));$('#mm_imgcount').textContent='已加'+window._mmImgs.length+'张';});}
function doPostMoment(){const t=$('#mm_t').value.trim();if(!t&&!(window._mmImgs||[]).length){toast('写点什么吧');return;}
  const visible=[...document.querySelectorAll('[data-mv].on')].map(e=>e.getAttribute('data-mv'));
  const p={id:uid(),authorId:'me',text:t,images:window._mmImgs||[],time:Date.now(),likes:[],comments:[],acct:actId(),visible};
  S.moments.unshift(p);save();closeModal();render();reactToMyMoment(p);}
function cleanReply(t){return (t||'').replace(/\[(心情|记住|闹钟|来电|联网|骰子|送礼|代付成功|日程|转账|红包|位置|图片|文件)[^\]]*\]/g,'').replace(/^["「]+|["」]+$/g,'').trim();}
function recordVisit(cid,where){const c=getC(cid);if(!c)return;if(!S.visitors)S.visitors=[];S.visitors.unshift({cid,name:c.remark||c.name,avatar:c.avatar,where:where||'朋友圈',time:Date.now()});if(S.visitors.length>40)S.visitors.length=40;save();}
function momentVisibleTo(p,cid){if(!p||p.authorId!=='me')return true;if(!p.visible||!p.visible.length)return true;return p.visible.indexOf(cid)>=0;}
async function reactToMyMoment(p){const pool=S.contacts.filter(c=>!c.deleted&&!c.blocked&&momentVisibleTo(p,c.id));
  for(const c of pool.slice(0,3)){try{recordVisit(c.id,'朋友圈');const r=await chatAPI([{role:'system',content:buildSystem(c)},
    {role:'user',content:'你的恋人/好友'+S.me.name+'发了条朋友圈："'+p.text+'"。请你只回复一句：要么是点赞就回"赞"，要么是一句简短自然的评论。不要带任何方括号标记。'}]);
    const txt=cleanReply(r);if(txt==='赞'||(txt.includes('赞')&&txt.length<3)){p.likes.push(c.remark||c.name);}
    else if(txt){p.comments.push({name:c.remark||c.name,cid:c.id,text:txt.slice(0,40)});}
    save();if(cur().p==='wechat'&&wxTab==='moments')render();}catch(e){}}}
async function reactToComment(p,toContactId){const c=getC(toContactId||p.authorId);if(!c)return;try{
  const r=await chatAPI([{role:'system',content:buildSystem(c)},{role:'user',content:S.me.name+'在你能看到的朋友圈"'+p.text+'"下评论了，回ta一句（不要带方括号标记）。'}]);
  const txt=cleanReply(r);if(txt)p.comments.push({name:c.remark||c.name,cid:c.id,text:txt.slice(0,40)});save();if(cur().p==='wechat')render();}catch(e){}}
async function refreshMoments(){const pool=S.contacts.filter(c=>!c.deleted&&!c.blocked);if(!pool.length){toast('先创建角色');return;}
  toast('刷新中…');const picks=pool.sort(()=>Math.random()-.5).slice(0,2);
  for(const c of picks){try{const r=await chatAPI([{role:'system',content:buildSystem(c)},
    {role:'user',content:'以你的身份发一条朋友圈动态（一两句，可带点心情或日常），只输出动态内容本身，不要带方括号标记。'}]);
    S.moments.unshift({id:uid(),authorId:c.id,text:cleanReply(r).slice(0,120),images:[],time:Date.now(),likes:[],comments:[],acct:actId()});
    save();if(cur().p==='wechat'&&wxTab==='moments')render();}catch(e){toast('生成失败：'+e.message);}}}

/* ---------- 通用弹窗 ---------- */
function openModal(html){$('#modalSheet').innerHTML=html;$('#modal').classList.add('show');}
function closeModal(){$('#modal').classList.remove('show');}
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
function openChat(id){const c=getC(id);if(!c){home();return;}if(c.blocked){toast('已拉黑');}stack=stack.filter(s=>s.p!=='chat');go('chat',{id});}

/* ---------- 备份 ---------- */
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='小手机备份_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('已导出');}
function importData(){pickFile('.json',f=>{const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.settings){S=Object.assign(defState(),d);save();render();toast('已导入');}}catch(e){toast('文件读不了');}};r.readAsText(f);});}
/* ---------- 存储用量 ---------- */
function storageInfo(){let bytes=0;try{const s=localStorage.getItem(KEY);bytes=new Blob([s||JSON.stringify(S)]).size;}catch(e){try{bytes=(JSON.stringify(S)||'').length*2;}catch(_){}}
  const CAP=5*1024*1024;return {bytes,mb:bytes/1048576,capMb:5,pct:Math.min(100,Math.round(bytes/CAP*100))};}
function storageMeter(){const si=storageInfo();const col=si.pct>=80?'#fa5151':si.pct>=60?'#ffb83b':'#19a463';
  return `<div class="section"><div style="padding:12px 14px"><div style="display:flex;justify-content:space-between;font-size:13px;color:#ccc"><span>💾 存储用量</span><span style="color:${col};font-weight:600">${si.mb.toFixed(2)} / ${si.capMb}MB（${si.pct}%）</span></div>
    <div style="height:8px;background:#2c2c2e;border-radius:5px;margin-top:8px;overflow:hidden"><div style="height:100%;width:${si.pct}%;background:${col};transition:.3s"></div></div>
    <div class="hint" style="padding:7px 0 0">${si.pct>=80?'⚠️ 快满了！赶紧导出备份，再删点旧图片/聊天。':'最占地方的是上传的图片。记得常点「💾 导出备份」存一份最保险。'}</div></div></div>`;}
let _storeWarned=false;
function checkStorageWarn(){if(_storeWarned)return;const si=storageInfo();if(si.pct<80)return;_storeWarned=true;
  openModal(`<h3>⚠️ 手机存储快满了</h3><div style="font-size:14px;line-height:1.9;color:#333">已经用了 <b style="color:#fa5151">${si.mb.toFixed(2)}MB / ${si.capMb}MB（${si.pct}%）</b>。<br>快满了的话新消息、新照片可能存不进去。<br><br>现在建议你：<br>1️⃣ 先导出一份备份存好<br>2️⃣ 删掉一些旧图片或用不到的聊天</div>
    <div class="btns" style="margin-top:14px"><button class="btn g" onclick="closeModal()">知道了</button><button class="btn p" onclick="closeModal();exportData()">💾 立即导出备份</button></div>`);}
function storageFullAlert(){openModal(`<h3>🚨 存储已经满了！</h3><div style="font-size:14px;line-height:1.9;color:#333">刚才有内容没能存进去。<br><br>赶紧：<br>1️⃣ 点下面导出备份（别让数据丢了）<br>2️⃣ 删掉一些旧照片/旧聊天腾地方</div>
  <div class="btns" style="margin-top:14px"><button class="btn g" onclick="closeModal()">知道了</button><button class="btn p" onclick="closeModal();exportData()">💾 立即导出备份</button></div>`);}

/* ---------- 时钟 & 启动 ---------- */
function paintBatt(){const b=$('#battinfo');if(b)b.innerHTML='📶 5G 🔋'+(S.me.battery!=null?S.me.battery+'%':'88%')+(S.me.charging?'⚡':'');}
function initBattery(){if(navigator.getBattery){navigator.getBattery().then(bt=>{const upd=()=>{S.me.battery=Math.round(bt.level*100);S.me.charging=bt.charging;save();paintBatt();};bt.addEventListener('levelchange',upd);bt.addEventListener('chargingchange',upd);upd();}).catch(()=>{});}}
initBattery();
document.addEventListener('visibilitychange',()=>{if(document.hidden){_storeWarned=false;}else{ensureAudio();if(cur().p==='wechat'&&wxTab==='me')render();setTimeout(checkStorageWarn,600);setTimeout(autoAssignTasks,800);}});
setInterval(()=>{const c=$('#clock');if(c)c.textContent=hm();paintBatt();if(cur().p==='home')$('#app').querySelector('.hh')&&($('#app').querySelector('.hh').textContent=hm());},1000);
render();
setTimeout(checkStorageWarn,1200);
</script>
</body>
